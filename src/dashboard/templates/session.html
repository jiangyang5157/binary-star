<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Detail - Singularity</title>
<link rel="stylesheet" href="/static/dashboard.css">
<script src="/static/i18n.js"></script>
<script src="/static/dashboard-utils.js"></script>
<script src="/static/session-detail.js"></script>
</head>
<body class="dark">
<header class="app-header">
  <h1>Singularity</h1>
  <nav>
    <a href="/performance" class="nav-link" data-i18n="nav.performance">Performance</a>
    <a href="/live" class="nav-link" data-i18n="nav.live">Live</a>
    <a href="/development" class="nav-link" data-i18n="nav.development">Development</a>
    <span class="nav-link active" data-i18n="nav.session">Session Detail</span>
  </nav>
  <div class="header-controls">
    <button id="lang-toggle" class="lang-toggle" onclick="toggleLang()">
      <span class="lang-en active">EN</span>
      <span class="lang-sep">│</span>
      <span class="lang-zh">中文</span>
    </button>
  </div>
</header>

<main class="container" id="app-main">
  <div class="loading-spinner" data-i18n="msg.loading">Loading session...</div>
</main>

<script>
const DATA_ROOT = '{{ data_root }}';
(function () {
  const tag = document.createElement('span');
  tag.className = 'data-root-tag';
  tag.textContent = DATA_ROOT;
  document.querySelector('.app-header').insertBefore(tag, document.querySelector('.app-header nav'));
})();
const filename = window.location.pathname.split('/sessions/')[1];

function apiUrl(path, extra = {}) {
  const p = new URLSearchParams();
  const pageParams = new URLSearchParams(window.location.search);
  const user = pageParams.get('user');
  if (user) p.set('user', user);
  for (const [k, v] of Object.entries(extra)) p.set(k, v);
  const qs = p.toString();
  return qs ? `${path}?${qs}` : path;
}

async function loadSession() {
  const main = document.getElementById('app-main');
  try {
    const resp = await fetch(apiUrl(`/api/sessions/${encodeURIComponent(filename)}`));
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const session = await resp.json();
    if (!session || session.error) throw new Error(session?.error || 'Invalid session data');

    main.innerHTML = `
      <div class="session-header">
        <h2>${session.observation?.symbol || 'Unknown'} Session</h2>
        <span class="session-time">${formatLocalTime(session.observation?.observed_at)}</span>
      </div>
      ${renderDecisionCard(session.final_decision || {})}
      ${renderDebateRounds(session.debate_history)}
      ${renderCharts(session.observation?.visual_context)}
      ${renderMetadata(session.metadata)}
    `;
  } catch (err) {
    main.innerHTML = `<div class="card error-card"><h2>Error</h2><p>${err.message}</p><a href="/live" class="btn-sm" style="margin-top:1rem;display:inline-block">&larr; Back to Live</a></div>`;
  }
}

loadSession();
</script>
</body>
</html>
