<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Development — Singularity</title>
<link rel="stylesheet" href="/static/dashboard.css">
<script src="/static/session-progress.js"></script>
</head>
<body class="dark">
<header class="app-header">
  <h1>Singularity</h1>
  <nav>
    <a href="/performance" class="nav-link">Performance</a>
    <a href="/live" class="nav-link">Live</a>
    <a href="/development" class="nav-link active">Development</a>
  </nav>
</header>

<main class="container">

  <!-- ═══════ Backtest ═══════ -->
  {% if "run_backtest" in permissions %}
<section class="card backtest-card">
    <div class="section-header">
      <h2>Backtest</h2>
    </div>

    <!-- Mode Toggle -->
    <div class="bt-mode-row">
      <label class="bt-mode-option">
        <input type="radio" name="bt-mode" value="timestamp" onchange="switchMode('timestamp')" checked>
        <span class="bt-mode-label">Single Timestamp</span>
      </label>
      <label class="bt-mode-option">
        <input type="radio" name="bt-mode" value="range" onchange="switchMode('range')">
        <span class="bt-mode-label">Date Range</span>
      </label>
    </div>

    <!-- Symbol -->
    <div class="bt-param-row">
      <label class="bt-field bt-field-wide">
        <span class="bt-label">Trading Pair</span>
        <span class="input-group" id="bt-symbol-group">
          <input type="text" id="bt-symbol" class="input-group-field"
                 placeholder="BTC" maxlength="10" autocomplete="off"
                 oninput="clearBacktestErrors()">
          <span class="input-group-suffix quote-suffix">USDT</span>
        </span>
      </label>
    </div>

    <!-- Shared config area: show/hide fields by mode -->
    <div class="bt-param-row" id="bt-timestamp-row">
      <label class="bt-field bt-field-wide">
        <span class="bt-label">Timestamp</span>
        <input type="text" id="bt-timestamp" class="filter-input bt-date-input"
               placeholder="2026-06-01T12:34:00Z" autocomplete="off"
               oninput="clearBacktestErrors()">
      </label>
    </div>

    <div id="bt-range-rows" style="display:none">
      <div class="bt-param-row bt-range-grid">
        <label class="bt-field">
          <span class="bt-label">Start</span>
          <input type="text" id="bt-start" class="filter-input bt-date-input"
                 placeholder="T-15d" autocomplete="off"
                 oninput="clearBacktestErrors()">
        </label>
        <label class="bt-field">
          <span class="bt-label">End</span>
          <input type="text" id="bt-end" class="filter-input bt-date-input"
                 placeholder="T-1d" autocomplete="off"
                 oninput="clearBacktestErrors()">
        </label>
        <label class="bt-field bt-field-sm">
          <span class="bt-label">Samples</span>
          <input type="number" id="bt-samples" class="filter-input bt-samples-input"
                 placeholder="14" min="1" max="200" step="1"
                 oninput="clearBacktestErrors()">
        </label>
      </div>
    </div>

    <!-- Format hint -->
    <p class="bt-hint">Format: <code>T-Nd</code>, <code>T-Nh</code>, <code>YYYY-MM-DD HH:MM:SS</code>, or ISO&#8209;8601 &nbsp;·&nbsp; Valid window: last 28 days &nbsp;·&nbsp; Start must be before End</p>

    <!-- Preview button -->
    <button id="bt-preview-btn" class="btn-sm" onclick="previewSamples()">Preview Samples</button>
    <span id="bt-preview-status" class="audit-status" style="display:none"></span>

    <!-- Sample List -->
    <div id="bt-sample-list" class="bt-sample-list" style="display:none">
      <div class="bt-sample-header">
        <span id="bt-sample-count"></span>
        <button id="bt-run-btn" class="btn-sm" onclick="triggerBacktest()">▶ Run</button>
      </div>
      <div class="bt-sample-body" id="bt-sample-body"></div>
    </div>

    <!-- Global Progress Bar -->
    <div id="bt-global-bar-container" style="display:none"></div>

    <!-- Run Status -->
    <div id="bt-run-status" class="run-status-box" style="display:none"></div>
  </section>
{% endif %}

</main>

{% if "run_backtest" in permissions %}
<script>
const DATA_ROOT = '{{ data_root }}';
(function () {
  const tag = document.createElement('span');
  tag.className = 'data-root-tag';
  tag.textContent = DATA_ROOT;
  document.querySelector('.app-header').insertBefore(tag, document.querySelector('.app-header nav'));
})();

function apiUrl(path) {
  return path;
}

const $ = id => document.getElementById(id);

// ── Dynamic config from backend ──
let QUOTE = 'USDT';
(async function initConfig() {
  try {
    const resp = await fetch(apiUrl('/api/config'));
    const data = await resp.json();
    if (data.quote_currency) {
      QUOTE = data.quote_currency;
      document.querySelectorAll('.quote-suffix').forEach(el => { el.textContent = QUOTE; });
    }
  } catch (e) { /* keep fallback */ }
})();

// ── State ──
let currentMode = 'timestamp';
let sampleTimestamps = [];
let backtestPollInterval = null;
let previewAbortController = null;

// ── Mode Switching ──
function switchMode(mode) {
  currentMode = mode;
  $('bt-timestamp-row').style.display = mode === 'timestamp' ? '' : 'none';
  $('bt-range-rows').style.display = mode === 'range' ? '' : 'none';
  clearBacktestErrors();
}

function clearBacktestErrors() {
  // Clear field-level errors
  ['bt-symbol', 'bt-timestamp', 'bt-start', 'bt-end', 'bt-samples'].forEach(id => {
    const el = $(id);
    if (el) el.classList.remove('bt-field-error');
  });
  const group = $('bt-symbol-group');
  if (group) { group.classList.remove('has-error'); group.removeAttribute('data-error'); }
  // Clear error tooltips on bt-field labels
  document.querySelectorAll('.bt-field.has-error').forEach(el => {
    el.classList.remove('has-error');
    el.removeAttribute('data-error');
  });
  // Clear transient UI — keep sample list visible
  $('bt-run-status').style.display = 'none';
  $('bt-preview-status').style.display = 'none';
}

// ── Error tooltip helper ──
function showFieldError(inputId, msg) {
  const input = $(inputId);
  if (input) {
    input.classList.add('bt-field-error');
    const field = input.closest('.bt-field');
    if (field) { field.classList.add('has-error'); field.setAttribute('data-error', msg); }
  }
}

// ── Validation ──
function validateFields() {
  clearBacktestErrors();

  const group = $('bt-symbol-group');

  const symbol = $('bt-symbol').value.trim();
  if (!symbol || symbol.length < 2 || !/^[A-Za-z0-9]+$/.test(symbol)) {
    if (group) { group.classList.add('has-error'); group.setAttribute('data-error', 'Enter at least 2 characters (e.g. BTC)'); }
    $('bt-symbol').focus();
    return false;
  }

  if (currentMode === 'timestamp') {
    const ts = $('bt-timestamp').value.trim();
    if (!ts) {
      showFieldError('bt-timestamp', 'Timestamp is required');
      $('bt-timestamp').focus();
      return false;
    }
  } else {
    const start = $('bt-start').value.trim();
    const end = $('bt-end').value.trim();
    const samplesRaw = $('bt-samples').value.trim();
    if (!start) {
      showFieldError('bt-start', 'Start date is required');
      $('bt-start').focus();
      return false;
    }
    if (!end) {
      showFieldError('bt-end', 'End date is required');
      $('bt-end').focus();
      return false;
    }
    if (!samplesRaw) {
      showFieldError('bt-samples', 'Number of samples is required');
      $('bt-samples').focus();
      return false;
    }
    const samples = parseInt(samplesRaw, 10);
    if (!Number.isInteger(samples) || samples < 1) {
      showFieldError('bt-samples', 'Must be ≥ 1');
      $('bt-samples').focus();
      return false;
    }
    if (samples > 200) {
      showFieldError('bt-samples', 'Max 200 samples');
      $('bt-samples').focus();
      return false;
    }
  }
  return true;
}

// ── Preview ──
function setFieldsDisabled(disabled) {
  document.querySelectorAll('input[name="bt-mode"]').forEach(r => r.disabled = disabled);
  ['bt-symbol', 'bt-timestamp', 'bt-start', 'bt-end', 'bt-samples'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = disabled;
  });
}

async function previewSamples() {
  const statusEl = $('bt-preview-status');
  const btn = $('bt-preview-btn');

  // Toggle: if already previewing, STOP
  if (previewAbortController) {
    previewAbortController.abort();
    return;
  }

  const valid = validateFields();
  if (!valid) return;  // field-level hints already shown by validateFields()

  // Clear old samples before generating new ones
  sampleTimestamps = [];
  $('bt-sample-list').style.display = 'none';
  statusEl.style.display = 'none';

  // Enter preview mode
  previewAbortController = new AbortController();
  setFieldsDisabled(true);
  btn.textContent = '⏹ Stop';
  btn.classList.add('danger');

  const symbol = $('bt-symbol').value.trim().toUpperCase();
  const body = {
    mode: currentMode,
    symbol_prefix: symbol,
  };

  if (currentMode === 'timestamp') {
    body.timestamp = $('bt-timestamp').value.trim();
  } else {
    body.start = $('bt-start').value.trim();
    body.end = $('bt-end').value.trim();
    body.samples = parseInt($('bt-samples').value) || 14;
  }

  try {
    const resp = await fetch(apiUrl('/api/backtest/preview'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: previewAbortController.signal,
    });

    const data = await resp.json();
    if (!resp.ok) {
      statusEl.style.display = 'inline';
      statusEl.textContent = '⚠ ' + (data.detail || 'preview failed');
      statusEl.className = 'audit-status audit-error';
      return;
    }

    sampleTimestamps = data.timestamps || [];
    renderSampleList(data);
  } catch (e) {
    if (e.name !== 'AbortError') {
      statusEl.style.display = 'inline';
      statusEl.textContent = '⚠ Request failed';
      statusEl.className = 'audit-status audit-error';
    }
  } finally {
    previewAbortController = null;
    setFieldsDisabled(false);
    btn.textContent = 'Preview Samples';
    btn.classList.remove('danger');
  }
}

function renderSampleList(data) {
  const list = $('bt-sample-list');
  const body = $('bt-sample-body');
  const countEl = $('bt-sample-count');

  list.style.display = 'block';
  countEl.textContent = `● ${data.count} selected`;

  body.innerHTML = data.timestamps.map((ts, i) => {
    const dt = formatTimestamp(ts);
    return `<div class="bt-sample-row" id="bt-sample-${i}">
      <div class="bt-sample-info">
        <span class="bt-sample-idx">${i + 1}</span>
        <span class="bt-sample-ts">${dt}</span>
        <span class="bt-sample-status-icon pending">○</span>
        <span class="bt-sample-result"></span>
        <span class="bt-sample-meta"></span>
        <span class="bt-sample-error"></span>
      </div>
      <div class="bt-sample-progress" id="bt-sp-${i}"></div>
    </div>`;
  }).join('');

  // Reset progress instances
  window._btProgressInstances = {};
}

function formatTimestamp(isoStr) {
  try {
    const d = new Date(isoStr);
    const Y = d.getUTCFullYear();
    const M = String(d.getUTCMonth() + 1).padStart(2, '0');
    const D = String(d.getUTCDate()).padStart(2, '0');
    const h = String(d.getUTCHours()).padStart(2, '0');
    const m = String(d.getUTCMinutes()).padStart(2, '0');
    const s = String(d.getUTCSeconds()).padStart(2, '0');
    return `${Y}-${M}-${D} ${h}:${m}:${s}`;
  } catch { return isoStr; }
}

function formatElapsed(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

// ── Run Backtest ──
async function triggerBacktest() {
  const statusEl = $('bt-run-status');
  const btn = $('bt-run-btn');

  // Toggle: if running, STOP
  if (backtestPollInterval) {
    btn.disabled = true;
    btn.textContent = '…';
    try {
      const resp = await fetch(apiUrl('/api/backtest/stop'), { method: 'POST' });
      if (!resp.ok) {
        const err = await resp.json();
        statusEl.style.display = 'block';
        statusEl.className = 'run-status-box run-error';
        statusEl.textContent = '✗ ' + (err.detail || 'stop failed');
        btn.disabled = false;
        btn.textContent = '⏹ Stop';
        return;
      }
    } catch (e) {
      statusEl.style.display = 'block';
      statusEl.className = 'run-status-box run-error';
      statusEl.textContent = '✗ Request failed';
      btn.disabled = false;
      btn.textContent = '⏹ Stop';
    }
    return;
  }

  if (!sampleTimestamps.length) {
    statusEl.style.display = 'block';
    statusEl.className = 'run-status-box run-error';
    statusEl.textContent = '✗ Preview samples first';
    return;
  }

  const symbol = $('bt-symbol').value.trim().toUpperCase();
  const body = {
    mode: currentMode,
    symbol_prefix: symbol,
    sample_timestamps: sampleTimestamps,
  };
  if (currentMode === 'timestamp') {
    body.timestamp = $('bt-timestamp').value.trim();
  } else {
    body.start = $('bt-start').value.trim();
    body.end = $('bt-end').value.trim();
    body.samples = parseInt($('bt-samples').value) || 14;
  }

  setFieldsDisabled(true);
  $('bt-preview-btn').disabled = true;
  btn.disabled = true;
  btn.textContent = '…';

  try {
    const resp = await fetch(apiUrl('/api/backtest/run'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const err = await resp.json();
      statusEl.style.display = 'block';
      statusEl.className = 'run-status-box run-error';
      statusEl.textContent = '✗ ' + (err.detail || 'request failed');
      setFieldsDisabled(false);
      $('bt-preview-btn').disabled = false;
      btn.disabled = false;
      btn.textContent = '▶ Run';
      return;
    }

    updateRunUI('running');
    statusEl.style.display = 'block';
    statusEl.className = 'run-status-box run-active';
    statusEl.textContent = '⟳ Running ' + symbol + QUOTE + '…';
    backtestPollInterval = setInterval(checkBacktestStatus, 2000);
    checkBacktestStatus();
  } catch (e) {
    statusEl.style.display = 'block';
    statusEl.className = 'run-status-box run-error';
    statusEl.textContent = '✗ Request failed';
    setFieldsDisabled(false);
    $('bt-preview-btn').disabled = false;
    btn.disabled = false;
    btn.textContent = '▶ Run';
  }
}

function updateRunUI(state) {
  const btn = $('bt-run-btn');
  const previewBtn = $('bt-preview-btn');

  if (state === 'running') {
    setFieldsDisabled(true);
    previewBtn.disabled = true;
    btn.textContent = '⏹ Stop';
    btn.classList.add('danger');
  } else {
    setFieldsDisabled(false);
    previewBtn.disabled = false;
    btn.textContent = '▶ Run';
    btn.classList.remove('danger');
    backtestPollInterval = null;
  }
}

async function checkBacktestStatus() {
  try {
    const resp = await fetch(apiUrl('/api/backtest/status'));
    const data = await resp.json();

    if (data.running) {
      updateRunUI('running');
      const statusEl = $('bt-run-status');
      const done = data.done_count || 0;
      const total = data.total_count || 0;
      const elapsed = formatElapsed(data.elapsed_seconds || 0);
      const symbol = data.symbol || '';

      // Update sample list with statuses
      if (data.samples) {
        updateSampleStatuses(data.samples);
      }

      // Update global bar
      const globalContainer = $('bt-global-bar-container');
      if (data.overall) {
        globalContainer.style.display = 'block';
        const ov = data.overall;
        const donePct = ov.total > 0 ? Math.round((ov.completed / ov.total) * 100) : 0;
        globalContainer.innerHTML =
          '<div class="bt-global-bar">' +
            '<div class="sp-bar-row">' +
              '<div class="sp-bar">' +
                '<div class="sp-bar-fill" style="width:' + donePct + '%"></div>' +
              '</div>' +
            '</div>' +
            '<div class="bt-global-summary">' +
              '<span>' + (ov.completed + ov.failed) + '/' + ov.total + ' done</span>' +
              (ov.running > 0 ? '<span class="running-count">◉ ' + ov.running + ' running</span>' : '') +
              '<span class="done-count">✓ ' + ov.completed + '</span>' +
              (ov.failed > 0 ? '<span class="failed-count">✗ ' + ov.failed + '</span>' : '') +
              '<span>○ ' + ov.pending + '</span>' +
            '</div>' +
          '</div>';
      }

      // Keep run-status minimal
      statusEl.style.display = 'block';
      statusEl.className = 'run-status-box run-active';
      statusEl.innerHTML = '⟳ ' + symbol + ' · ' +
        done + '/' + total + ' samples · elapsed ' + elapsed;
    } else {
      if (backtestPollInterval) {
        clearInterval(backtestPollInterval);
        backtestPollInterval = null;

        const statusEl = $('bt-run-status');

        if (data.stopped) {
          statusEl.style.display = 'block';
          statusEl.className = 'run-status-box run-ok';
          statusEl.textContent = '✓ Stopped';
        } else if (data.error) {
          statusEl.style.display = 'block';
          statusEl.className = 'run-status-box run-error';
          statusEl.textContent = '✗ ' + data.error;
        } else {
          // Check if all completed
          const done = data.done_count || 0;
          const total = data.total_count || 0;
          const failed = (data.samples || []).filter(s => s.status === 'failed').length;

          statusEl.style.display = 'block';
          let cls = 'run-status-box run-ok';
          let msg = '✓ Completed ' + done + '/' + total + ' samples';
          if (failed > 0) {
            cls = 'run-status-box run-error';
            msg += ' · ' + failed + ' failed';
          }
          statusEl.className = cls;
          statusEl.textContent = msg;
        }

        updateRunUI('idle');
        setTimeout(() => {
          statusEl.style.display = 'none';
        }, 5000);

        // Update global bar for final state
        if (data.overall) {
          const globalContainer = $('bt-global-bar-container');
          globalContainer.style.display = 'block';
          const ov = data.overall;
          globalContainer.innerHTML =
            '<div class="bt-global-bar">' +
              '<div class="sp-bar-row">' +
                '<div class="sp-bar">' +
                  '<div class="sp-bar-fill" style="width:100%"></div>' +
                '</div>' +
              '</div>' +
              '<div class="bt-global-summary">' +
                '<span>' + ov.total + '/' + ov.total + ' done</span>' +
                '<span class="done-count">✓ ' + ov.completed + ' passed</span>' +
                (ov.failed > 0 ? '<span class="failed-count">✗ ' + ov.failed + ' failed</span>' : '') +
              '</div>' +
            '</div>';
        }
      }
    }
  } catch (e) { /* polling failed silently */ }
}

function updateSampleStatuses(samples) {
  samples.forEach((s, i) => {
    const row = document.getElementById('bt-sample-' + i);
    if (!row) return;

    const iconEl = row.querySelector('.bt-sample-status-icon');
    const resultEl = row.querySelector('.bt-sample-result');
    const metaEl = row.querySelector('.bt-sample-meta');
    const errorEl = row.querySelector('.bt-sample-error');
    const progContainer = document.getElementById('bt-sp-' + i);

    const progress = s.progress;

    if (s.status === 'running') {
      if (iconEl) { iconEl.textContent = '◉'; iconEl.className = 'bt-sample-status-icon running'; }
      if (resultEl) resultEl.textContent = '';
      if (metaEl) metaEl.textContent = '';
      if (errorEl) errorEl.textContent = '';

      if (progress && progContainer) {
        if (!window._btProgressInstances[i]) {
          window._btProgressInstances[i] = new SessionProgress(progContainer, {
            size: 'compact', context: 'backtest'
          });
        }
        window._btProgressInstances[i].update(progress);
      }
    } else if (s.status === 'completed') {
      if (iconEl) { iconEl.textContent = '✓'; iconEl.className = 'bt-sample-status-icon ok'; }
      if (progContainer && window._btProgressInstances[i]) {
        window._btProgressInstances[i].update(progress || { status: 'completed', result: {}, elapsed_seconds: 0 });
      }
      if (progress && progress.result) {
        const r = progress.result;
        if (resultEl) resultEl.textContent = (r.direction || '?') + ' ' + (r.confidence || 0) + '%';
        if (metaEl) {
          let meta = formatElapsed(progress.elapsed_seconds || 0);
          if (r.debate_path) meta += ' · ' + r.debate_path;
          metaEl.textContent = meta;
        }
      } else if (resultEl) {
        resultEl.textContent = 'completed';
      }
      if (errorEl) errorEl.textContent = '';
    } else if (s.status === 'failed') {
      if (iconEl) { iconEl.textContent = '✗'; iconEl.className = 'bt-sample-status-icon err'; }
      if (progContainer && window._btProgressInstances[i]) {
        window._btProgressInstances[i].update(progress || { status: 'failed', error: s.error || 'Failed' });
      }
      if (resultEl) resultEl.textContent = '';
      if (metaEl) metaEl.textContent = '';
      if (errorEl) errorEl.textContent = s.error || (progress && progress.error) || 'Failed';
    } else {
      // pending — reset
      if (progContainer && window._btProgressInstances[i]) {
        window._btProgressInstances[i].destroy();
        delete window._btProgressInstances[i];
        progContainer.innerHTML = '';
      }
    }
  });
}

// ── Init: check if backtest is already running ──
(async function initBacktestStatus() {
  try {
    const resp = await fetch(apiUrl('/api/backtest/status'));
    const data = await resp.json();
    if (data.running) {
      // Resume: backtest is actively running
      const symbol = data.symbol || '';
      $('bt-symbol').value = symbol.replace(new RegExp(QUOTE + '$', 'i'), '');

      if (data.mode) {
        currentMode = data.mode;
        document.querySelector('input[name="bt-mode"][value="' + data.mode + '"]').checked = true;
        switchMode(data.mode);
      }

      if (data.samples) {
        sampleTimestamps = data.samples.map(s => s.timestamp);
        renderSampleList({ count: sampleTimestamps.length, timestamps: sampleTimestamps });
        updateSampleStatuses(data.samples);
      }

      updateRunUI('running');
      $('bt-run-status').style.display = 'block';
      $('bt-run-status').className = 'run-status-box run-active';
      backtestPollInterval = setInterval(checkBacktestStatus, 2000);
      checkBacktestStatus();
    }
  } catch (e) { /* ignore */ }
})();
</script>
{% endif %}
</body>
</html>
