<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live — Singularity</title>
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body class="dark">
<header class="app-header">
  <h1>Singularity</h1>
  <nav>
    <a href="/" class="nav-link">Performance</a>
    <a href="/active" class="nav-link active">Live</a>
  </nav>
</header>

<main class="container">

  <!-- ═══════ New Session ═══════ -->
  <section class="card run-section">
    <div class="section-header">
      <h2>New Session</h2>
    </div>
    <div class="run-controls">
      <div class="run-input-group">
        <input type="text" id="symbol-prefix" class="filter-input run-symbol-input"
               placeholder="Symbol" maxlength="10" autocomplete="off"
               oninput="document.getElementById('run-status').style.display='none'">
        <span class="run-suffix">USDT</span>
      </div>
      <button id="run-session-btn" class="btn-sm" onclick="triggerRun()">▶ Run</button>
      <span id="run-status" class="run-status-text" style="display:none"></span>
    </div>
  </section>

  <!-- ═══════ Sniper Control ═══════ -->
  <section class="card run-section">
    <div class="section-header">
      <h2>Sniper Control</h2>
    </div>
    <div class="run-controls">
      <div class="run-input-group">
        <input type="text" id="sniper-symbol" class="filter-input run-symbol-input"
               placeholder="Symbol" maxlength="10" autocomplete="off"
               oninput="document.getElementById('sniper-status').style.display='none'">
        <span class="run-suffix">USDT</span>
      </div>
      <label class="toggle-label" for="sniper-trade-toggle">
        <span class="toggle-text">Trade</span>
        <input type="checkbox" id="sniper-trade-toggle" class="toggle-input">
        <span class="toggle-slider"></span>
      </label>
      <input type="number" id="sniper-balance" class="filter-input"
             placeholder="Balance" min="0" step="any"
             style="width:100px">
      <span class="run-suffix" style="font-size:0.8rem">USDT</span>
      <button id="sniper-btn" class="btn-sm" onclick="triggerSniper()">▶ Start</button>
      <span id="sniper-status" class="run-status-text" style="display:none"></span>
    </div>
  </section>

  <!-- ═══════ Active Sessions Table ═══════ -->
  <section class="card">
    <div class="section-header">
      <h2>Active Sessions</h2>
      <div class="section-controls">
        <button id="refresh-active-btn" class="btn-sm" onclick="refreshActive()" title="Refresh">⟳ Refresh</button>
        <span id="refresh-active-status" class="audit-status" style="display:none"></span>
        <label class="toggle-label" for="neutral-toggle">
          <span class="toggle-text">Neutral</span>
          <input type="checkbox" id="neutral-toggle" class="toggle-input" onchange="loadActive()">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    <div class="table-wrapper">
      <table id="active-table">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Observed At</th>
            <th>Direction</th>
            <th>Conf</th>
            <th>Entry</th>
            <th>TP</th>
            <th>SL</th>
            <th>RR Ratio</th>
            <th>Waiting (h)</th>
            <th>Holding (h)</th>
            <th>Time Left</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="active-body">
          <tr><td colspan="12" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="card-footer"><span id="active-count"></span></div>
  </section>

</main>

<script>
const DATA_ROOT = new URLSearchParams(window.location.search).get('data_root') || '';
const DR = DATA_ROOT ? `data_root=${encodeURIComponent(DATA_ROOT)}` : '';

function apiUrl(path) {
  return DR ? `${path}?${DR}` : path;
}

// ── Session Run Trigger ──
let runPollInterval = null;

function formatElapsed(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function updateRunUI(state) {
  const input = document.getElementById('symbol-prefix');
  const btn = document.getElementById('run-session-btn');

  if (state === 'running') {
    input.disabled = true;
    btn.disabled = true;
    btn.textContent = '▶ Run';
  } else {
    input.disabled = false;
    btn.disabled = false;
    btn.textContent = '▶ Run';
    runPollInterval = null;
  }
}

async function checkRunStatus() {
  try {
    const resp = await fetch(apiUrl('/api/session/run-status'));
    const data = await resp.json();

    if (data.running) {
      updateRunUI('running');
      const statusEl = document.getElementById('run-status');
      const elapsed = formatElapsed(data.elapsed_seconds || 0);
      statusEl.textContent = `⟳ Running ${data.symbol}… ${elapsed}`;
    } else {
      if (runPollInterval) {
        clearInterval(runPollInterval);
        runPollInterval = null;

        const statusEl = document.getElementById('run-status');
        statusEl.style.display = 'inline';
        const last = data.last_run;
        if (last) {
          if (last.result === 'success') {
            statusEl.className = 'run-status-text run-ok';
            statusEl.textContent = `✓ ${last.symbol} completed`;
            loadActive();
            setTimeout(() => {
              statusEl.style.display = 'none';
              updateRunUI('idle');
            }, 3000);
          } else {
            statusEl.className = 'run-status-text run-error';
            const msg = last.error_message || 'unknown error';
            statusEl.textContent = `✗ ${last.symbol} failed: ${msg}`;
            updateRunUI('idle');
            loadActive();
          }
        } else {
          updateRunUI('idle');
          statusEl.style.display = 'none';
        }
      }
    }
  } catch (e) {
    // polling failed silently
  }
}

async function triggerRun() {
  const input = document.getElementById('symbol-prefix');
  let prefix = input.value.trim();

  // Strip trailing "USDT" if user accidentally included it
  if (prefix.toUpperCase().endsWith('USDT')) {
    prefix = prefix.slice(0, -4).trim();
    input.value = prefix;
  }

  if (!prefix || prefix.length < 2) {
    const statusEl = document.getElementById('run-status');
    statusEl.style.display = 'inline';
    statusEl.className = 'run-status-text run-error';
    statusEl.textContent = '✗ Enter at least 2 characters';
    return;
  }

  const btn = document.getElementById('run-session-btn');
  btn.disabled = true;
  btn.textContent = '…';

  try {
    const resp = await fetch(apiUrl('/api/session/run'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol_prefix: prefix }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      const statusEl = document.getElementById('run-status');
      statusEl.style.display = 'inline';
      statusEl.className = 'run-status-text run-error';
      statusEl.textContent = `✗ ${err.detail || 'request failed'}`;
      updateRunUI('idle');
      return;
    }

    const data = await resp.json();
    updateRunUI('running');
    const statusEl = document.getElementById('run-status');
    statusEl.style.display = 'inline';
    statusEl.className = 'run-status-text';
    statusEl.textContent = `⟳ Running ${data.symbol}…`;
    runPollInterval = setInterval(checkRunStatus, 2000);
  } catch (e) {
    const statusEl = document.getElementById('run-status');
    statusEl.style.display = 'inline';
    statusEl.className = 'run-status-text run-error';
    statusEl.textContent = '✗ Request failed';
    updateRunUI('idle');
  }
}

// On page load, check if a run is already in progress
(async function initRunStatus() {
  try {
    const resp = await fetch(apiUrl('/api/session/run-status'));
    const data = await resp.json();
    if (data.running) {
      updateRunUI('running');
      document.getElementById('run-status').style.display = 'inline';
      runPollInterval = setInterval(checkRunStatus, 2000);
      checkRunStatus();
    }
  } catch (e) { /* ignore */ }
})();

// ── Sniper Control ──
let sniperPollInterval = null;

function updateSniperUI(state) {
	const input = document.getElementById('sniper-symbol');
	const tradeToggle = document.getElementById('sniper-trade-toggle');
	const balanceInput = document.getElementById('sniper-balance');
	const btn = document.getElementById('sniper-btn');

	if (state === 'running') {
		input.disabled = true;
		tradeToggle.disabled = true;
		balanceInput.disabled = true;
		btn.textContent = '⏹ Stop';
		btn.style.color = 'var(--accent-red)';
	} else {
		input.disabled = false;
		tradeToggle.disabled = false;
		balanceInput.disabled = false;
		btn.textContent = '▶ Start';
		btn.style.color = '';
		sniperPollInterval = null;
	}
}

async function checkSniperStatus() {
	try {
		const resp = await fetch(apiUrl('/api/sniper/status'));
		const data = await resp.json();

		if (data.running) {
			updateSniperUI('running');
			const statusEl = document.getElementById('sniper-status');
			const elapsed = formatElapsed(data.elapsed_seconds || 0);
			statusEl.textContent = `⟳ Running ${data.symbol}… ${elapsed}`;
		} else {
			if (sniperPollInterval) {
				clearInterval(sniperPollInterval);
				sniperPollInterval = null;
				const statusEl = document.getElementById('sniper-status');
				statusEl.style.display = 'inline';
				statusEl.className = 'run-status-text run-ok';
				statusEl.textContent = '✓ Stopped';
				updateSniperUI('idle');
				setTimeout(() => {
					statusEl.style.display = 'none';
				}, 3000);
			}
		}
	} catch (e) { /* polling failed silently */ }
}

async function triggerSniper() {
	const statusEl = document.getElementById('sniper-status');
	const btn = document.getElementById('sniper-btn');

	// Check if currently running — if so, STOP
	if (sniperPollInterval) {
		btn.disabled = true;
		btn.textContent = '…';
		try {
			const resp = await fetch(apiUrl('/api/sniper/stop'), { method: 'POST' });
			if (!resp.ok) {
				const err = await resp.json();
				statusEl.style.display = 'inline';
				statusEl.className = 'run-status-text run-error';
				statusEl.textContent = `✗ ${err.detail || 'stop failed'}`;
				btn.disabled = false;
				btn.textContent = '⏹ Stop';
				return;
			}
			// Status polling will catch the transition to idle
		} catch (e) {
			statusEl.style.display = 'inline';
			statusEl.className = 'run-status-text run-error';
			statusEl.textContent = '✗ Request failed';
			btn.disabled = false;
			btn.textContent = '⏹ Stop';
		}
		return;
	}

	// START
	const input = document.getElementById('sniper-symbol');
	let prefix = input.value.trim();

	if (prefix.toUpperCase().endsWith('USDT')) {
		prefix = prefix.slice(0, -4).trim();
		input.value = prefix;
	}

	if (!prefix || prefix.length < 2) {
		statusEl.style.display = 'inline';
		statusEl.className = 'run-status-text run-error';
		statusEl.textContent = '✗ Enter at least 2 characters';
		return;
	}

	const trade = document.getElementById('sniper-trade-toggle').checked;
	const balanceRaw = document.getElementById('sniper-balance').value.trim();
	const balance = balanceRaw ? parseFloat(balanceRaw) : null;

	btn.disabled = true;
	btn.textContent = '…';

	try {
		const resp = await fetch(apiUrl('/api/sniper/start'), {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({
				symbol_prefix: prefix,
				trade: trade,
				balance: balance,
			}),
		});

		if (!resp.ok) {
			const err = await resp.json();
			statusEl.style.display = 'inline';
			statusEl.className = 'run-status-text run-error';
			statusEl.textContent = `✗ ${err.detail || 'request failed'}`;
			updateSniperUI('idle');
			return;
		}

		const data = await resp.json();
		updateSniperUI('running');
		statusEl.style.display = 'inline';
		statusEl.className = 'run-status-text';
		statusEl.textContent = `⟳ Running ${data.symbol}…`;
		sniperPollInterval = setInterval(checkSniperStatus, 2000);
	} catch (e) {
		statusEl.style.display = 'inline';
		statusEl.className = 'run-status-text run-error';
		statusEl.textContent = '✗ Request failed';
		updateSniperUI('idle');
	}
}

// On page load, check if sniper is already running
(async function initSniperStatus() {
	try {
		const resp = await fetch(apiUrl('/api/sniper/status'));
		const data = await resp.json();
		if (data.running) {
			updateSniperUI('running');
			document.getElementById('sniper-status').style.display = 'inline';
			sniperPollInterval = setInterval(checkSniperStatus, 2000);
			checkSniperStatus();
		}
	} catch (e) { /* ignore */ }
})();

function opinionBadge(o) {
  const cls = o === 'BULLISH' ? 'badge-green' : o === 'BEARISH' ? 'badge-red' : 'badge-gray';
  return `<span class="badge ${cls}">${o}</span>`;
}

function formatLocalTime(isoStr) {
  if (!isoStr) return '&mdash;';
  try {
    return new Date(isoStr + (isoStr.endsWith('Z') ? '' : 'Z')).toLocaleString();
  } catch { return isoStr; }
}

function formatPrice(v) {
  return (v == null || v === 0) ? '&mdash;' : parseFloat(v).toFixed(2);
}

function timeRemainingClass(seconds) {
  if (seconds > 43200) return 'time-safe';       // > 12h
  if (seconds > 3600) return 'time-warning';      // 1-12h
  return 'time-critical';                          // < 1h
}

async function loadActive() {
  const tbody = document.getElementById('active-body');
  const countEl = document.getElementById('active-count');

  try {
    const includeNeutral = document.getElementById('neutral-toggle').checked;
    let url = apiUrl('/api/active');
    url += (url.includes('?') ? '&' : '?') + `include_neutral=${includeNeutral}`;
    const resp = await fetch(url);
    const data = await resp.json();
    const sessions = data.active || [];

    countEl.textContent = `${sessions.length} record${sessions.length !== 1 ? 's' : ''}`;

    if (!sessions.length) {
      tbody.innerHTML = '<tr><td colspan="12" class="empty">No records — all clear</td></tr>';
      return;
    }

    tbody.innerHTML = sessions.map(s => {
      const isNeutral = s.opinion === 'NEUTRAL';
      const trClass = isNeutral ? '' : timeRemainingClass(s.time_remaining_seconds);
      return `<tr>
        <td><strong>${s.symbol}</strong></td>
        <td>${formatLocalTime(s.observed_at)}</td>
        <td>${opinionBadge(s.opinion)}</td>
        <td>${s.confidence != null ? s.confidence.toFixed(1) + '%' : '&mdash;'}</td>
        <td class="mono">${isNeutral ? '&mdash;' : formatPrice(s.entry)}</td>
        <td class="mono">${isNeutral ? '&mdash;' : formatPrice(s.take_profit)}</td>
        <td class="mono">${isNeutral ? '&mdash;' : formatPrice(s.stop_loss)}</td>
        <td>${isNeutral ? '&mdash;' : (s.rr_ratio != null ? s.rr_ratio.toFixed(2) : '&mdash;')}</td>
        <td>${s.projected_waiting_hours}h</td>
        <td>${s.projected_holding_hours}h</td>
        <td><span class="time-remaining ${trClass}">${s.time_remaining}</span></td>
        <td><a href="/sessions/${encodeURIComponent(s.filename)}${DR ? '?' + DR : ''}" class="btn-sm">View</a></td>
      </tr>`;
    }).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="12" class="error">Failed to load records</td></tr>';
  }
}

// ── Refresh button ──
async function refreshActive() {
  const btn = document.getElementById('refresh-active-btn');
  const status = document.getElementById('refresh-active-status');
  btn.disabled = true;
  btn.textContent = '⟳ Refreshing...';
  status.style.display = 'none';

  try {
    await loadActive();
    status.textContent = '✓ Updated';
    status.className = 'audit-status audit-ok';
    btn.style.display = 'none';
  } catch {
    status.textContent = '⚠ Failed';
    status.className = 'audit-status audit-error';
  }
  status.style.display = 'inline';
  setTimeout(() => {
    status.style.display = 'none';
    btn.style.display = '';
  }, 3000);
  btn.disabled = false;
  btn.textContent = '⟳ Refresh';
}

// Initial load
loadActive();
</script>
</body>
</html>
