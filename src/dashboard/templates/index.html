<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance — BinaryStar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/dashboard.css">
  <script src="/static/i18n.js"></script>
  <script src="/static/dashboard-utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>

<body class="dark">
  <header class="app-header">
    <h1>BinaryStar</h1>
    <nav>
      <a href="/performance" class="nav-link active" data-i18n="nav.performance"></a>
      <a href="/live" class="nav-link" data-i18n="nav.live"></a>
      <a href="/development" class="nav-link" data-i18n="nav.development"></a>
    </nav>
    <div class="header-controls">
      {% if data_root %}
      <span class="env-badge">{{ data_root }}</span>
      {% endif %}
      <button id="lang-toggle" class="lang-toggle" onclick="toggleLang()">
        <span class="lang-en active">EN</span>
        <span class="lang-sep">│</span>
        <span class="lang-zh">中文</span>
      </button>
    </div>
  </header>

  <main class="container">

    <!-- ═══════ KPI Cards ═══════ -->
    <section class="kpi-grid" id="kpi-grid">
      <div class="kpi-card" data-kpi="pnl">
        <div class="kpi-top-row">
          <span class="kpi-label" data-i18n="kpi.net_pnl"></span>
          <span class="kpi-all-ref mono" id="kpi-pnl-all">--</span>
        </div>
        <span class="kpi-value" id="kpi-pnl">--</span>
        <svg class="kpi-spark" id="kpi-pnl-spark" viewBox="0 0 200 44" preserveAspectRatio="none"></svg>
      </div>
      <div class="kpi-card" data-kpi="winrate">
        <div class="kpi-top-row">
          <span class="kpi-label" data-i18n="kpi.win_rate"></span>
          <span class="kpi-all-ref mono" id="kpi-winrate-all">--</span>
        </div>
        <span class="kpi-value" id="kpi-winrate">--</span>
        <svg class="kpi-spark" id="kpi-winrate-spark" viewBox="0 0 200 44" preserveAspectRatio="none"></svg>
      </div>
      <div class="kpi-card" data-kpi="winloss">
        <div class="kpi-top-row">
          <span class="kpi-label" data-i18n="kpi.win_loss"></span>
          <span class="kpi-all-ref mono" id="kpi-winloss-all">--</span>
        </div>
        <span class="kpi-value" id="kpi-winloss">--</span>
        <svg class="kpi-spark" id="kpi-winloss-spark" viewBox="0 0 200 44" preserveAspectRatio="none"></svg>
      </div>
      <div class="kpi-card" data-kpi="fillrate">
        <div class="kpi-top-row">
          <span class="kpi-label" data-i18n="kpi.fill_rate"></span>
          <span class="kpi-all-ref mono" id="kpi-fillrate-all">--</span>
        </div>
        <span class="kpi-value" id="kpi-fillrate">--</span>
        <svg class="kpi-spark" id="kpi-fillrate-spark" viewBox="0 0 200 44" preserveAspectRatio="none"></svg>
      </div>
      <div class="kpi-card" data-kpi="mfeeff">
        <div class="kpi-top-row">
          <span class="kpi-label" data-i18n="kpi.mfe_efficiency"></span>
          <span class="kpi-all-ref mono" id="kpi-mfeeff-all">--</span>
        </div>
        <span class="kpi-value" id="kpi-mfeeff">--</span>
        <svg class="kpi-spark" id="kpi-mfeeff-spark" viewBox="0 0 200 44" preserveAspectRatio="none"></svg>
      </div>
      <div class="kpi-card" data-kpi="maestress">
        <div class="kpi-top-row">
          <span class="kpi-label" data-i18n="kpi.mae_stress"></span>
          <span class="kpi-all-ref mono" id="kpi-maestress-all">--</span>
        </div>
        <span class="kpi-value" id="kpi-maestress">--</span>
        <svg class="kpi-spark" id="kpi-maestress-spark" viewBox="0 0 200 44" preserveAspectRatio="none"></svg>
      </div>
      <div class="kpi-card" data-kpi="mdd">
        <div class="kpi-top-row">
          <span class="kpi-label" data-i18n="kpi.max_drawdown"></span>
          <span class="kpi-all-ref mono" id="kpi-mdd-all">--</span>
        </div>
        <span class="kpi-value" id="kpi-mdd">--</span>
        <svg class="kpi-spark" id="kpi-mdd-spark" viewBox="0 0 200 44" preserveAspectRatio="none"></svg>
      </div>
    </section>

    <!-- ═══════ Decision Timeline ═══════ -->
    <section class="card chart-card">
      <div class="chart-header">
        <h2 data-i18n="section.decision_timeline"></h2>
        <div class="chart-controls">
          <label class="slider-label" data-i18n="chart.min_confidence"></label>
          <input type="range" id="confSlider" min="0" max="100" value="0" class="slider">
          <span id="confVal" class="slider-value">50</span>
        </div>
      </div>
      <p class="chart-hint" data-i18n="chart.click_hint"></p>
      <div class="chart-wrap"><canvas id="timelineChart"></canvas></div>
    </section>



    <!-- ═══════ Session Table ═══════ -->
    <section class="card">
      <div class="section-header">
        <h2 data-i18n="section.trade_ledger"></h2>
        <div class="section-controls">
          <div class="filter-bar">
            <div class="filter-group">
              <span class="filter-label" data-i18n="filter.symbol"></span>
              <span class="input-clear-wrap">
                <input type="text" id="symbol-filter" class="filter-input" placeholder=" " style="width:110px">
                <button class="input-clear-btn" onclick="clearFilter('symbol-filter')" tabindex="-1">&times;</button>
              </span>
            </div>
            <div class="filter-sep"></div>
            <div class="filter-group">
              <span class="filter-label" data-i18n="filter.version"></span>
              <span class="input-clear-wrap">
                <input type="text" id="version-filter" class="filter-input" placeholder=" " style="width:110px">
                <button class="input-clear-btn" onclick="clearFilter('version-filter')" tabindex="-1">&times;</button>
              </span>
            </div>
          </div>
          <button id="run-audit-btn" class="btn-sm" onclick="runAudit()" data-i18n="btn.audit"
            data-i18n-title="btn.audit.title"></button>
          <span id="run-audit-status" class="feedback-inline" style="display:none"></span>
        </div>
      </div>
      <div class="table-wrapper" id="trade-ledger-wrapper">
        <table id="sessions-table">
          <thead>
            <tr>
              <th data-i18n="th.symbol"></th>
              <th class="sortable" data-sort="observed_at" data-i18n="th.observed_at"></th>
              <th data-i18n="th.direction"></th>
              <th class="sortable" data-sort="confidence" data-i18n="th.conf"></th>
              <th data-i18n="th.entry"></th>
              <th data-i18n="th.tp"></th>
              <th data-i18n="th.sl"></th>
              <th class="sortable col-rr" data-sort="rr_ratio" data-i18n="th.rr"></th>
              <th data-i18n="th.result"></th>
              <th data-i18n="th.pnl"></th>
              <th class="col-version" data-i18n="th.version"></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="sessions-body">
            <tr>
              <td colspan="12" class="loading">Loading sessions...</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="card-footer"><span id="session-count"></span></div>
    </section>

  </main>

  <script>
    const $ = id => document.getElementById(id);

    // ── KPI value animation ──
    let _prevKpiValues = {};
    let _kpiAnimDuration = 600; // first load uses longer animation, then 300ms

    function setKpiWithAnimation(elId, endText, duration) {
      const el = $(elId);
      if (!el) return;

      const match = endText.match(/^([+-]?)([\d.]+)(.*)$/);
      if (!match) { el.textContent = endText; _prevKpiValues[elId] = null; return; }

      const forceSign = match[1];
      const endNum = parseFloat(match[2]);
      const actualEndNum = forceSign === '-' ? -endNum : endNum;
      const suffixText = match[3];

      const prevRaw = _prevKpiValues[elId];
      const startNum = (prevRaw != null && !isNaN(prevRaw)) ? prevRaw : 0;
      _prevKpiValues[elId] = actualEndNum;

      if (Math.abs(actualEndNum - startNum) < 0.005) { el.textContent = endText; return; }

      const decimalPlaces = (endText.match(/\.(\d+)/) || [])[1]?.length || 0;
      const startTime = performance.now();

      function tick(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = startNum + (actualEndNum - startNum) * eased;

        const curSign = (forceSign === '+' && current >= 0.005) ? '+' : (current <= -0.005 ? '-' : '');
        const formatted = Math.abs(current).toFixed(decimalPlaces);
        el.textContent = curSign + formatted + suffixText;

        if (progress < 1) requestAnimationFrame(tick);
        else el.textContent = endText;
      }
      requestAnimationFrame(tick);
    }

    // ── Chart config ──
    const gridColor = '#1f2d3d', textMuted = '#6e7d91', textBright = '#8898ac';
    let timelineChart = null, _firstChartRender = true;
    let _tableStaggerEnabled = true;
    let allTrades = [], filteredTrades = [], allSessions = [], _totalSessions = 0, sortKey = 'observed_at', sortDir = -1;
    let confThreshold = 0;  // start unfiltered, user adjusts slider to explore

    // ── Helpers ──
    function resultBadge(r) {
      if (!r) return '<span class="text-muted">&mdash;</span>';
      if (r === 'TP_HIT') return '<span class="badge result-tp">' + t('status.tp_hit') + '</span>';
      if (r === 'SL_HIT') return '<span class="badge result-sl">' + t('status.sl_hit') + '</span>';
      if (r === 'NEITHER') {
        return '<span class="badge result-neither">' + t('status.expired') + '</span>';
      }
      return `<span class="text-muted">${r}</span>`;
    }
    function pnlSpan(p) {
      if (p == null) return '<span class="text-muted">&mdash;</span>';
      const cls = p > 0 ? 'pnl-positive' : p < 0 ? 'pnl-negative' : 'text-muted';
      return `<span class="mono ${cls}">${p.toFixed(2)}%</span>`;
    }

    // ── Load trades + render charts ──
    async function loadTrades(symbol) {
      const resp = await fetch(apiUrl('/api/trades', symbol ? { symbol } : {}));
      const data = await resp.json();
      allTrades = (data.trades || []).sort((a, b) => new Date(a.time) - new Date(b.time));
      _allKpiBaselines = {};  // reset sparkline baseline cache
      _allRefsCache = null;
    }

    // ── KPI health: set card border colour based on thresholds ──
    function _setKpiHealth(id, health) {
      const el = $(id);
      if (!el) return;
      const card = el.closest('.kpi-card');
      if (card) {
        card.className = 'kpi-card' + (health ? ' health-' + health : '');
      }
    }

    // ── Sparkline helpers ──────────────────────────────────────────
    // KPI accent colors for sparkline strokes
    // Color groups: warm (results), cool (execution), warning (risk)
    const _kpiSparkAccent = {
      pnl: '#40a85f', winrate: '#d4a348', winloss: '#c9953a',
      fillrate: '#4a8fe0', mfeeff: '#9488d8',
      maestress: '#d98c2e', mdd: '#e0554a',
    };

    // Baselines computed once over ALL filled trades (independent of threshold)
    let _allKpiBaselines = {};
    // Cached all-trades reference text values — invalidated alongside _allKpiBaselines
    let _allRefsCache = null;

    /** Compute cumulative KPI values over sorted filled trades.
     *  Returns array of {x, y} where x = session index, y = cumulative KPI at that point. */
    function _computeCumulativeKpi(filledTradesSorted, kpiKey) {
      const points = [];
      if (!filledTradesSorted.length) return points;

      switch (kpiKey) {
        case 'pnl': {
          let eq = 1.0;
          filledTradesSorted.forEach((t, i) => {
            eq *= (1 + t.pnl_pct / 100);
            points.push({ x: i + 1, y: (eq - 1) * 100 });
          });
          break;
        }
        case 'winrate': {
          let wins = 0;
          filledTradesSorted.forEach((t, i) => {
            if (t.tp_sl_result === 'TP_HIT') wins++;
            points.push({ x: i + 1, y: (wins / (i + 1)) * 100 });
          });
          break;
        }
        case 'winloss': {
          let wPnl = [], lPnl = [];
          filledTradesSorted.forEach((t, i) => {
            if (t.tp_sl_result === 'TP_HIT') wPnl.push(t.pnl_pct);
            else if (t.tp_sl_result === 'SL_HIT') lPnl.push(Math.abs(t.pnl_pct));
            const avgW = wPnl.length ? wPnl.reduce((a, b) => a + b, 0) / wPnl.length : 0;
            const avgL = lPnl.length ? lPnl.reduce((a, b) => a + b, 0) / lPnl.length : 0;
            points.push({ x: i + 1, y: avgL > 0 ? avgW / avgL : (wPnl.length > 0 ? avgW : 0) });
          });
          break;
        }
        case 'fillrate': {
          let filled = 0, total = 0;
          filledTradesSorted.forEach((t, i) => {
            if (t.opinion !== 'NEUTRAL') total++;
            if (t.is_filled) filled++;
            points.push({ x: i + 1, y: total > 0 ? (filled / total) * 100 : 0 });
          });
          break;
        }
        case 'mfeeff': {
          let sum = 0, count = 0;
          filledTradesSorted.forEach((t, i) => {
            if (t.mfe_efficiency_pct != null) { sum += t.mfe_efficiency_pct; count++; }
            points.push({ x: i + 1, y: count > 0 ? sum / count : 0 });
          });
          break;
        }
        case 'maestress': {
          let protected_ = 0, count = 0;
          filledTradesSorted.forEach((t, i) => {
            if (t.mae_stress_tier) { count++; if (t.mae_stress_tier === 'PINPOINT' || t.mae_stress_tier === 'STANDARD') protected_++; }
            points.push({ x: i + 1, y: count > 0 ? (protected_ / count) * 100 : 0 });
          });
          break;
        }
        case 'mdd': {
          let eq = 1.0, peak = 1.0, dd = 0;
          filledTradesSorted.forEach((t, i) => {
            eq *= (1 + t.pnl_pct / 100);
            if (eq > peak) peak = eq;
            dd = Math.max(dd, (peak - eq) / peak);
            points.push({ x: i + 1, y: dd * 100 });
          });
          break;
        }
      }
      return points;
    }

    /** Convert point array to SVG polyline points string.
     *  Maps data coords into the 200×44 viewBox. */
    function _pointsToPolyline(points) {
      if (!points.length) return '';
      const xMax = points[points.length - 1].x || 1;
      const yVals = points.map(p => p.y);
      const yMin = yVals.reduce((a, b) => Math.min(a, b), 0);
      const yMax = yVals.reduce((a, b) => Math.max(a, b), 1);
      const yRange = yMax - yMin || 1;
      const pad = 4; // px padding inside viewBox
      return points.map(p => {
        const sx = pad + ((p.x - 1) / Math.max(xMax - 1, 1)) * (200 - 2 * pad);
        const sy = 44 - pad - ((p.y - yMin) / yRange) * (44 - 2 * pad);
        return `${sx.toFixed(1)},${sy.toFixed(1)}`;
      }).join(' ');
    }

    /** Render all 7 KPI sparklines */
    function renderAllSparklines(threshold, filledTradesSorted, allTradesSorted) {
      // Compute all-trades baselines once (static)
      if (!Object.keys(_allKpiBaselines).length && allTradesSorted.length) {
        for (const key of ['pnl', 'winrate', 'winloss', 'fillrate', 'mfeeff', 'maestress', 'mdd']) {
          const tradesForKpi = (key === 'fillrate') ? allTradesSorted : filledTradesSorted;
          _allKpiBaselines[key] = _computeCumulativeKpi(tradesForKpi, key);
        }
      }

      for (const key of ['pnl', 'winrate', 'winloss', 'fillrate', 'mfeeff', 'maestress', 'mdd']) {
        const svgEl = document.getElementById(`kpi-${key}-spark`);
        if (!svgEl) continue;

        const allPoints = _allKpiBaselines[key] || [];
        const sourceTrades = (key === 'fillrate') ? allTradesSorted : filledTradesSorted;
        const filteredPoints = _computeCumulativeKpi(sourceTrades.filter(t => t.confidence >= threshold), key);
        const accent = _kpiSparkAccent[key] || '#8898ac';

        // Build SVG content: gray line (all) + colored line (filtered)
        const allPoly = _pointsToPolyline(allPoints);
        const filtPoly = _pointsToPolyline(filteredPoints);

        svgEl.innerHTML = '';
        if (allPoly) {
          const grayLine = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
          grayLine.setAttribute('points', allPoly);
          grayLine.setAttribute('fill', 'none');
          grayLine.setAttribute('stroke', 'rgba(136,152,172,0.3)');
          grayLine.setAttribute('stroke-width', '1.2');
          svgEl.appendChild(grayLine);
        }
        if (filtPoly) {
          const colorLine = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
          colorLine.setAttribute('points', filtPoly);
          colorLine.setAttribute('fill', 'none');
          colorLine.setAttribute('stroke', accent);
          colorLine.setAttribute('stroke-width', '2');
          svgEl.appendChild(colorLine);
        }
      }
    }

    function updateAllCharts(threshold) {
      const trades = filteredTrades;
      const filledTrades = trades.filter(t => t.is_filled);
      filledTrades.sort((a, b) => new Date(a.time) - new Date(b.time));
      const filledSorted = filledTrades;

      if (!filledTrades.length) {
        for (const key of ['pnl', 'winrate', 'winloss', 'fillrate', 'mfeeff', 'maestress', 'mdd']) {
          const valEl = document.getElementById(`kpi-${key}`);
          const allEl = document.getElementById(`kpi-${key}-all`);
          const svgEl = document.getElementById(`kpi-${key}-spark`);
          if (valEl) valEl.textContent = key === 'fillrate' ? (trades.filter(t => t.opinion !== 'NEUTRAL').length > 0 ? '0%' : '—') : '—';
          if (allEl) allEl.textContent = '—';
          if (svgEl) svgEl.innerHTML = '';
          _setKpiHealth(`kpi-${key}`, null);
          _prevKpiValues[`kpi-${key}`] = null;
        }
        $('confVal').textContent = threshold;
        renderTimeline(trades, threshold);
        return;
      }

      const activeTrades = filledTrades.filter(t => t.confidence >= threshold);

      // ── Compute KPI values from activeTrades ──
      let eq = 1.0, peak = 1.0, dd = 0;
      activeTrades.forEach(t => {
        eq *= (1 + t.pnl_pct / 100);
        if (eq > peak) peak = eq;
        dd = Math.max(dd, (peak - eq) / peak);
      });

      const netPnL = (eq - 1) * 100, mddPct = dd * 100;
      const tpWins = activeTrades.filter(t => t.tp_sl_result === 'TP_HIT');
      const slLosses = activeTrades.filter(t => t.tp_sl_result === 'SL_HIT');
      const winRate = activeTrades.length ? (tpWins.length / activeTrades.length * 100) : 0;
      const avgWin = tpWins.length ? tpWins.reduce((a, b) => a + b.pnl_pct, 0) / tpWins.length : 0;
      const avgLoss = slLosses.length ? Math.abs(slLosses.reduce((a, b) => a + b.pnl_pct, 0) / slLosses.length) : 0;
      const wlRatio = avgLoss > 0 ? avgWin / avgLoss : 0;

      // Fill Rate: among confidence-filtered directional sessions, what % filled?
      const filteredForRate = trades.filter(t => t.confidence >= threshold && t.opinion !== 'NEUTRAL');
      const filteredFilled = filteredForRate.filter(t => t.is_filled);
      const fillRate = filteredForRate.length > 0 ? filteredFilled.length / filteredForRate.length * 100 : 0;

      const mfeValues = activeTrades.map(t => t.mfe_efficiency_pct).filter(v => v != null);
      const mfeEfficiency = mfeValues.length > 0 ? mfeValues.reduce((a, b) => a + b, 0) / mfeValues.length : null;

      const stressTiers = activeTrades.map(t => t.mae_stress_tier).filter(Boolean);
      const protectedCount = stressTiers.filter(t => t === 'PINPOINT' || t === 'STANDARD').length;
      const maeStress = stressTiers.length > 0 ? protectedCount / stressTiers.length * 100 : null;

      // ── Set all-trades reference values (computed once, cached) ──
      if (!_allRefsCache) {
        let allEq = 1.0, allPeak = 1.0, allDd = 0;
        filledTrades.forEach(t => {
          allEq *= (1 + t.pnl_pct / 100);
          if (allEq > allPeak) allPeak = allEq;
          allDd = Math.max(allDd, (allPeak - allEq) / allPeak);
        });
        const allMdd = allDd * 100;
        const allReturns = filledTrades.map(t => t.pnl_pct);
        const allTpWins = filledTrades.filter(t => t.tp_sl_result === 'TP_HIT');
        const allSlLosses = filledTrades.filter(t => t.tp_sl_result === 'SL_HIT');
        const allWinRate = allReturns.length ? (allTpWins.length / filledTrades.length * 100) : 0;
        const allAvgWin = allTpWins.length ? allTpWins.reduce((a, b) => a + b.pnl_pct, 0) / allTpWins.length : 0;
        const allAvgLoss = allSlLosses.length ? Math.abs(allSlLosses.reduce((a, b) => a + b.pnl_pct, 0) / allSlLosses.length) : 0;
        const allWlRatio = allAvgLoss > 0 ? allAvgWin / allAvgLoss : 0;
        const allMfeVals = filledTrades.map(t => t.mfe_efficiency_pct).filter(v => v != null);
        const allMfe = allMfeVals.length > 0 ? allMfeVals.reduce((a, b) => a + b, 0) / allMfeVals.length : null;
        const allStressTiers = filledTrades.map(t => t.mae_stress_tier).filter(Boolean);
        const allProtected = allStressTiers.filter(t => t === 'PINPOINT' || t === 'STANDARD').length;
        const allMae = allStressTiers.length > 0 ? allProtected / allStressTiers.length * 100 : null;
        // Fill rate over all trades
        const frDir = trades.filter(t => t.opinion !== 'NEUTRAL');
        const frFilled = frDir.filter(t => t.is_filled);
        const allFillRate = frDir.length > 0 ? (frFilled.length / frDir.length * 100).toFixed(0) + '%' : '—';

        _allRefsCache = [
          ((allEq - 1) * 100).toFixed(2) + '%',
          allWinRate.toFixed(0) + '%',
          allWlRatio > 0 ? allWlRatio.toFixed(2) : '—',
          allFillRate,
          allMfe != null ? allMfe.toFixed(0) + '%' : '—',
          allMae != null ? allMae.toFixed(0) + '%' : '—',
          allMdd > 0 ? '−' + allMdd.toFixed(2) + '%' : '0.00%',
        ];
      }

      $('kpi-pnl-all').textContent = _allRefsCache[0];
      $('kpi-winrate-all').textContent = _allRefsCache[1];
      $('kpi-winloss-all').textContent = _allRefsCache[2];
      $('kpi-fillrate-all').textContent = _allRefsCache[3];
      $('kpi-mfeeff-all').textContent = _allRefsCache[4];
      $('kpi-maestress-all').textContent = _allRefsCache[5];
      $('kpi-mdd-all').textContent = _allRefsCache[6];

      // ── Set filtered KPI values with animation ──
      const animMs = _kpiAnimDuration;
      _kpiAnimDuration = 300;

      _setKpiHealth('kpi-pnl', netPnL >= 0 ? 'green' : 'red');
      setKpiWithAnimation('kpi-pnl', netPnL.toFixed(2) + '%', animMs);

      _setKpiHealth('kpi-winrate', winRate >= 60 ? 'green' : winRate >= 40 ? 'amber' : 'red');
      setKpiWithAnimation('kpi-winrate', winRate.toFixed(0) + '%', animMs);

      _setKpiHealth('kpi-winloss', avgLoss > 0
        ? (wlRatio >= 2.0 ? 'green' : wlRatio >= 1.0 ? 'amber' : 'red')
        : null);
      setKpiWithAnimation('kpi-winloss', avgLoss > 0 ? wlRatio.toFixed(2) : '—', animMs);

      _setKpiHealth('kpi-fillrate', fillRate >= 80 ? 'green' : fillRate >= 50 ? 'amber' : 'red');
      setKpiWithAnimation('kpi-fillrate', fillRate.toFixed(0) + '%', animMs);

      if (mfeEfficiency != null) {
        _setKpiHealth('kpi-mfeeff', mfeEfficiency >= 70 ? 'green' : mfeEfficiency >= 40 ? 'amber' : 'red');
        setKpiWithAnimation('kpi-mfeeff', mfeEfficiency.toFixed(0) + '%', animMs);
      } else {
        _setKpiHealth('kpi-mfeeff', null);
        $('kpi-mfeeff').textContent = '—';
      }

      if (maeStress != null) {
        _setKpiHealth('kpi-maestress', maeStress >= 70 ? 'green' : maeStress >= 40 ? 'amber' : 'red');
        setKpiWithAnimation('kpi-maestress', maeStress.toFixed(0) + '%', animMs);
      } else {
        _setKpiHealth('kpi-maestress', null);
        $('kpi-maestress').textContent = '—';
      }

      _setKpiHealth('kpi-mdd', mddPct < 5 ? 'green' : mddPct < 15 ? 'amber' : 'red');
      setKpiWithAnimation('kpi-mdd', (mddPct > 0 ? '−' : '') + mddPct.toFixed(2) + '%', animMs);

      $('confVal').textContent = threshold;

      // ── Render sparklines ──
      renderAllSparklines(threshold, filledSorted, trades);

      // ── Render bubble timeline (no PnL curve) ──
      renderTimeline(trades, threshold);
    }

    // ── Charts ──
    function renderTimeline(trades, threshold) {
      const ctx = $('timelineChart').getContext('2d');
      if (timelineChart) timelineChart.destroy();

      const points = trades.map(t => {
        let color = 'rgba(148, 163, 184, 0.08)';
        const above = t.confidence >= threshold;

        // NEUTRAL below threshold: hide entirely
        if (t.opinion === 'NEUTRAL' && !above) {
          color = 'rgba(0,0,0,0)';
        } else if (t.opinion !== 'NEUTRAL') {
          if (t.is_filled) {
            if (t.tp_sl_result === 'TP_HIT') color = above ? 'rgba(64, 168, 95, 0.85)' : 'rgba(0,0,0,0)';
            else if (t.tp_sl_result === 'SL_HIT') color = above ? 'rgba(224, 85, 74, 0.85)' : 'rgba(0,0,0,0)';
            else if (t.pnl_pct > 0) color = above ? 'rgba(64, 168, 95, 0.35)' : 'rgba(0,0,0,0)';
            else if (t.pnl_pct < 0) color = above ? 'rgba(224, 85, 74, 0.35)' : 'rgba(0,0,0,0)';
            else color = above ? 'rgba(136, 152, 172, 0.45)' : 'rgba(0,0,0,0)';
          } else {
            color = above ? 'rgba(136, 152, 172, 0.35)' : 'rgba(0,0,0,0)';
          }
        }
        return {
          x: t.time ? new Date(t.time) : null,
          y: t.confidence,
          pnlPct: t.pnl_pct != null ? t.pnl_pct : null,
          r: Math.max(4, Math.min(16, 4 + Math.abs(t.pnl_pct || 0) * 8)),
          op: t.opinion, symbol: t.symbol || '',
          holding: t.projected_holding_hours, timeLabel: formatLocalTimeShort(t.time),
          sessionFile: t.session_filename || '',
          version: t.version || '',
          backgroundColor: color, borderColor: above ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0)',
        };
      });

      // Threshold reference line
      var thresholdPlugin = {
        id: 'thresholdLine',
        beforeDatasetsDraw: function (chart) {
          var yScale = chart.scales.y;
          var area = chart.chartArea;
          if (!yScale || confThreshold <= 0) return;
          if (confThreshold < yScale.min || confThreshold > yScale.max) return;
          var y = yScale.getPixelForValue(confThreshold);
          if (y < area.top || y > area.bottom) return;
          var c = chart.ctx;
          c.save();
          c.beginPath();
          c.setLineDash([6, 4]);
          c.strokeStyle = 'rgba(212, 163, 72, 0.45)';
          c.lineWidth = 1.5;
          c.moveTo(area.left, y);
          c.lineTo(area.right, y);
          c.stroke();
          c.setLineDash([]);
          c.fillStyle = 'rgba(212, 163, 72, 0.7)';
          c.font = '11px "SF Mono", "Fira Code", Consolas, monospace';
          c.textAlign = 'right';
          c.fillText('≥ ' + confThreshold + '%', area.right - 4, y - 6);
          c.restore();
        }
      };

      timelineChart = new Chart(ctx, {
        type: 'bubble',
        data: {
          datasets: [
            { data: points, backgroundColor: points.map(p => p.backgroundColor), borderColor: points.map(p => p.borderColor), borderWidth: 1 }
          ]
        },
        plugins: [thresholdPlugin],
        options: {
          responsive: true, maintainAspectRatio: false,
          animation: _firstChartRender
            ? { duration: 800, easing: 'easeOutQuart' }
            : false,
          animations: _firstChartRender
            ? { x: { duration: 0 }, y: { duration: 0 } }
            : undefined,
          scales: {
            x: { type: 'time', time: { displayFormats: { hour: 'MMM dd HH:mm', day: 'MMM dd' } }, ticks: { color: textMuted, maxTicksLimit: 12, maxRotation: 45 }, grid: { color: gridColor } },
            y: { ticks: { color: textBright }, grid: { color: gridColor } }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              displayColors: false,
              callbacks: {
                title: (items) => {
                  const d = items[0].raw;
                  return `${d.symbol || '&mdash;'}  ·  ${d.timeLabel}`;
                },
                label: (ctx) => {
                  const d = ctx.raw;
                  const lines = [`${d.op}  ·  ${t('chart.conf_tooltip')} ${d.y != null ? d.y.toFixed(0) : '—'}%`];
                  if (d.pnlPct != null) lines.push(`PnL ${d.pnlPct.toFixed(2)}%`);
                  if (d.holding) lines.push(`${t('chart.holding_tooltip')} ${d.holding}h`);
                  if (d.version) lines.push(`v${d.version}`);
                  return lines;
                }
              }
            }
          },
          onClick: (e) => {
            const points = timelineChart.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
            if (points.length) {
              const d = timelineChart.data.datasets[0].data[points[0].index];
              if (d.sessionFile) {
                window.location = `/audits/${encodeURIComponent(d.sessionFile)}`;
              }
            }
          },
          onHover: (e) => {
            e.native.target.style.cursor = timelineChart.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false).length ? 'pointer' : 'default';
          }
        }
      });
      _firstChartRender = false;
    }

    function getSortValue(session, key) {
      const tp = session.tactical || {};
      switch (key) {
        case 'symbol': return session.symbol || '';
        case 'observed_at': return session.observed_at || '';
        case 'opinion': return session.opinion || '';
        case 'confidence': return session.confidence != null ? session.confidence : -1;
        case 'entry': return tp.entry || tp.current_price || 0;
        case 'take_profit': return tp.take_profit || 0;
        case 'stop_loss': return tp.stop_loss || 0;
        case 'rr_ratio': return tp.rr_ratio != null ? tp.rr_ratio : -1;
        default: return '';
      }
    }

    function sortSessions(sessions, key, dir) {
      return [...sessions].sort((a, b) => {
        const va = getSortValue(a, key), vb = getSortValue(b, key);
        if (typeof va === 'number' && typeof vb === 'number') {
          if (va === -1 && vb === -1) return 0; if (va === -1) return 1; if (vb === -1) return -1;
          return (va - vb) * dir;
        }
        return String(va).localeCompare(String(vb)) * dir;
      });
    }

    function renderTable(sessions) {
      const tbody = $('sessions-body');
      // Stagger fade-in only on initial page load, not on filter/sort/audit refresh
      if (_tableStaggerEnabled) {
        tbody.classList.add('stagger');
        _tableStaggerEnabled = false;
      } else {
        tbody.classList.remove('stagger');
      }
      const count = sessions.length === _totalSessions
        ? `${_totalSessions} ${t('fmt.records')}`
        : `${sessions.length} / ${_totalSessions} ${t('fmt.records')}`;
      $('session-count').textContent = count;
      if (!sessions.length) { tbody.innerHTML = '<tr><td colspan="12" class="empty">' + t('msg.no_records_match') + '</td></tr>'; return; }
      tbody.innerHTML = sessions.map((s, i) => {
        const tp = s.tactical || {}, audit = s.audit;
        const entry = tp.entry || tp.current_price;
        // Row accent color matches result
        let rowCls = '';
        if (audit) {
          if (!audit.is_filled) rowCls = 'row-unfilled';
          else if (audit.tp_sl_result === 'TP_HIT') rowCls = 'row-tp';
          else if (audit.tp_sl_result === 'SL_HIT') rowCls = 'row-sl';
          else rowCls = 'row-expired';
        }
        return `<tr class="${rowCls}" style="--row-index: ${i}">
      <td><strong>${s.symbol}</strong></td>
      <td>${formatLocalTimeShort(s.observed_at)}</td>
      <td>${opinionBadge(s.opinion)}</td>
      <td>${s.confidence != null ? s.confidence.toFixed(1) + '%' : '&mdash;'}</td>
      <td class="mono">${formatPrice(entry)}</td>
      <td class="mono">${formatPrice(tp.take_profit)}</td>
      <td class="mono">${formatPrice(tp.stop_loss)}</td>
      <td class="mono col-rr">${tp.rr_ratio != null ? tp.rr_ratio.toFixed(2) : '&mdash;'}</td>
      <td>${audit && !audit.is_filled ? '<span class="badge badge-gray">' + t('status.unfilled') + '</span>' : resultBadge(audit?.tp_sl_result)}</td>
      <td>${pnlSpan(audit?.pnl_pct)}</td>
      <td class="col-version"><span class="text-muted">${s.version || '&mdash;'}</span></td>
      <td><a href="/audits/${encodeURIComponent(s.filename)}" class="btn-sm">View</a></td>
    </tr>`;
      }).join('');
    }

    function applyFilters() {
      const sym = $('symbol-filter').value.trim().toUpperCase();
      const ver = $('version-filter').value.trim();
      let f = allSessions;
      if (sym) f = f.filter(s => (s.symbol || '').includes(sym));
      if (ver) f = f.filter(s => (s.version || '').includes(ver));
      renderTable(sortSessions(f, sortKey, sortDir));

      // Drive KPIs and charts from the same filtered set
      const visibleFiles = new Set(f.map(s => s.filename));
      filteredTrades = (allTrades || []).filter(t => t.session_filename && visibleFiles.has(t.session_filename));
      _allKpiBaselines = {};  // reset sparkline baselines when filter changes
      _allRefsCache = null;
      updateAllCharts(confThreshold);
    }

    async function loadSessions() {
      const tbody = $('sessions-body');
      const loadingTimer = setTimeout(() => {
        tbody.innerHTML = '<tr><td colspan="12" class="loading">' + t('msg.loading_sessions') + '</td></tr>';
      }, 200);
      const resp = await fetch(apiUrl('/api/audits', { limit: '200' }));
      const data = await resp.json();
      clearTimeout(loadingTimer);
      allSessions = data.sessions || [];
      _totalSessions = data.total || 0;
      applyFilters();
    }


    // ── Re-render on language switch ──
    document.addEventListener('langchange', function () {
      applyFilters();
    });

    // ── Sort indicator: show ↕ / ↑ / ↓ on the active column ──
    function updateSortIndicator() {
      document.querySelectorAll('th.sortable').forEach(el => {
        el.classList.remove('sort-asc', 'sort-desc');
        if (el.dataset.sort === sortKey) {
          el.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
        }
      });
    }

    // ── Events ──
    $('symbol-filter').addEventListener('input', function () { localStorage.setItem('symbolFilter', this.value); applyFilters(); });
    $('version-filter').addEventListener('input', function () { localStorage.setItem('versionFilter', this.value); applyFilters(); });
    let _debounceRaf = null;
    $('confSlider').addEventListener('input', function () { const v = parseInt(this.value); confThreshold = v; localStorage.setItem('dashboardConfThreshold', v); if (_debounceRaf) cancelAnimationFrame(_debounceRaf); _debounceRaf = requestAnimationFrame(() => updateAllCharts(v)); });
    document.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', function () {
        sortDir = (sortKey === this.dataset.sort) ? sortDir * -1 : 1;
        sortKey = this.dataset.sort;
        updateSortIndicator();
        applyFilters();
      });
    });

    // ── Run Audit (trigger backend audit then refresh) ──
    async function runAudit() {
      const btn = $('run-audit-btn');
      const status = $('run-audit-status');
      btn.disabled = true;
      btn.textContent = t('btn.auditing');
      status.style.display = 'none';

      try {
        const resp = await fetch(apiUrl('/api/audits/run'), { method: 'POST' });
        const data = await resp.json();

        if (data.error) {
          status.textContent = '⚠ ' + data.error;
          status.className = 'feedback-inline feedback-err';
        } else {
          const done = (data.audited || 0) + (data.skipped || 0);
          status.textContent = `✓ ${done}/${data.total || 0}`;
          status.className = 'feedback-inline feedback-ok';
          btn.style.display = 'none';
        }
        status.style.display = 'inline';
        setTimeout(() => {
          status.style.display = 'none';
          btn.style.display = '';
        }, 2000);
      } catch (e) {
        status.textContent = '⚠ ' + t('error.request_failed');
        status.className = 'feedback-inline feedback-err';
        status.style.display = 'inline';
      } finally {
        btn.disabled = false;
        btn.textContent = t('btn.audit');
      }

      // Refresh table and charts regardless of outcome
      await loadTrades();
      await loadSessions();
      updateSortIndicator();
    }

    // ── Init ──
    // Slider always starts at 0 — config min_conf is for production trade gating,
    // not for the dashboard. User can explore all sessions and use the slider
    // to study confidence vs P&amp;L trade-offs.
    (function initSlider() {
      const saved = localStorage.getItem('dashboardConfThreshold');
      if (saved !== null) {
        confThreshold = parseInt(saved);
      }
      $('confSlider').value = confThreshold;
      $('confVal').textContent = confThreshold;
    })();

    // Restore filter inputs from localStorage, defaulting version to project version
    const savedSymbol = localStorage.getItem('symbolFilter');
    if (savedSymbol) $('symbol-filter').value = savedSymbol;
    const savedVersion = localStorage.getItem('versionFilter');
    if (savedVersion) {
      $('version-filter').value = savedVersion;
    }

    (async function () {
      if (!localStorage.getItem('versionFilter')) {
        // First visit — fire version fetch in parallel (don't block data loading)
        fetch(apiUrl('/api/config'))
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.project_version) {
              $('version-filter').value = data.project_version;
            }
          })
          .catch(function () { /* keep empty */ });
      }
      await loadTrades();
      await loadSessions();
      updateSortIndicator();
    })();
  </script>
</body>
