<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singularity Dashboard</title>
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body class="dark">
<header class="app-header">
  <h1>Singularity</h1>
  <nav>
    <a href="/" class="nav-link active">Sessions</a>
    <a href="/ledger" class="nav-link">Ledger</a>
  </nav>
  <div class="header-controls">
    <input type="text" id="symbol-filter" placeholder="Filter symbol..." class="filter-input">
  </div>
</header>

<main class="container">
  <section class="card">
    <h2>Trading Sessions</h2>
    <div class="table-wrapper">
      <table id="sessions-table">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Observed At</th>
            <th>Opinion</th>
            <th>Confidence</th>
            <th>Entry</th>
            <th>Take Profit</th>
            <th>Stop Loss</th>
            <th>RR</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="sessions-body">
          <tr><td colspan="9" class="loading">Loading sessions...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="card-footer">
      <span id="session-count"></span>
    </div>
  </section>
</main>

<script>
const DATA_ROOT = new URLSearchParams(window.location.search).get('data_root') || 'data/prod';

function opinionBadge(opinion) {
  const cls = opinion === 'BULLISH' ? 'badge-green' : opinion === 'BEARISH' ? 'badge-red' : 'badge-gray';
  return `<span class="badge ${cls}">${opinion}</span>`;
}

function formatPrice(v) {
  if (v == null || v === 0) return '&mdash;';
  return parseFloat(v).toFixed(2);
}

async function loadSessions(symbol) {
  const tbody = document.getElementById('sessions-body');
  tbody.innerHTML = '<tr><td colspan="9" class="loading">Loading sessions...</td></tr>';
  const params = new URLSearchParams({ data_root: DATA_ROOT, limit: '200' });
  if (symbol) params.set('symbol', symbol);
  try {
    const resp = await fetch('/api/sessions?' + params.toString());
    const data = await resp.json();
    const sessions = data.sessions || [];
    document.getElementById('session-count').textContent = `${data.total} total sessions`;
    if (sessions.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="empty">No sessions found</td></tr>';
      return;
    }
    tbody.innerHTML = sessions.map(s => {
      const tp = s.tactical || {};
      return `<tr>
        <td><strong>${s.symbol}</strong></td>
        <td>${s.observed_at || '&mdash;'}</td>
        <td>${opinionBadge(s.opinion)}</td>
        <td>${s.confidence != null ? s.confidence.toFixed(1) + '%' : '&mdash;'}</td>
        <td class="mono">${formatPrice(tp.current_price || tp.entry)}</td>
        <td class="mono">${formatPrice(tp.take_profit)}</td>
        <td class="mono">${formatPrice(tp.stop_loss)}</td>
        <td class="mono">${tp.rr_ratio != null ? tp.rr_ratio.toFixed(2) : '&mdash;'}</td>
        <td><a href="/sessions/${encodeURIComponent(s.filename)}?data_root=${encodeURIComponent(DATA_ROOT)}" class="btn-sm">View</a></td>
      </tr>`;
    }).join('');
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="9" class="error">Failed to load: ${err.message}</td></tr>`;
  }
}

document.getElementById('symbol-filter').addEventListener('input', function(e) {
  loadSessions(e.target.value.trim() || null);
});

loadSessions();
</script>
</body>
</html>
