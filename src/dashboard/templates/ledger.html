<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Ledger - Singularity</title>
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body class="dark">
<header class="app-header">
  <h1>Singularity</h1>
  <nav>
    <a href="/" class="nav-link">Sessions</a>
    <a href="/ledger" class="nav-link active">Ledger</a>
  </nav>
  <div class="header-controls">
    <input type="text" id="symbol-filter" placeholder="Filter symbol..." class="filter-input">
    <select id="opinion-filter" class="filter-select">
      <option value="">All Opinions</option>
      <option value="BULLISH">BULLISH</option>
      <option value="BEARISH">BEARISH</option>
      <option value="NEUTRAL">NEUTRAL</option>
    </select>
  </div>
</header>

<main class="container">
  <section class="card">
    <h2>Trade Ledger</h2>
    <div class="table-wrapper">
      <table id="ledger-table">
        <thead>
          <tr>
            <th class="sortable" data-sort="symbol">Symbol &#x25B2;&#x25BC;</th>
            <th class="sortable" data-sort="observed_at">Date &#x25B2;&#x25BC;</th>
            <th class="sortable" data-sort="opinion">Opinion &#x25B2;&#x25BC;</th>
            <th class="sortable" data-sort="confidence">Conf &#x25B2;&#x25BC;</th>
            <th class="sortable" data-sort="entry">Entry &#x25B2;&#x25BC;</th>
            <th class="sortable" data-sort="take_profit">Take Profit &#x25B2;&#x25BC;</th>
            <th class="sortable" data-sort="stop_loss">Stop Loss &#x25B2;&#x25BC;</th>
            <th class="sortable" data-sort="rr_ratio">RR &#x25B2;&#x25BC;</th>
            <th class="sortable" data-sort="holding_hours">Holding &#x25B2;&#x25BC;</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="ledger-body">
          <tr><td colspan="10" class="loading">Loading ledger...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="card-footer">
      <span id="ledger-count"></span>
    </div>
  </section>

  <section class="card">
    <h2>Summary Statistics</h2>
    <div class="stats-grid" id="stats-grid">
      <div class="stat-item"><span class="stat-label">Total Sessions</span><span class="stat-value" id="stat-total">-</span></div>
      <div class="stat-item"><span class="stat-label">BULLISH</span><span class="stat-value bullish" id="stat-bullish">-</span></div>
      <div class="stat-item"><span class="stat-label">BEARISH</span><span class="stat-value bearish" id="stat-bearish">-</span></div>
      <div class="stat-item"><span class="stat-label">NEUTRAL</span><span class="stat-value neutral" id="stat-neutral">-</span></div>
      <div class="stat-item"><span class="stat-label">Avg Confidence</span><span class="stat-value" id="stat-avg-conf">-</span></div>
      <div class="stat-item"><span class="stat-label">Avg RR Ratio</span><span class="stat-value" id="stat-avg-rr">-</span></div>
    </div>
  </section>
</main>

<script>
const DATA_ROOT = new URLSearchParams(window.location.search).get('data_root') || 'data/prod';

let allSessions = [];
let sortKey = 'observed_at';
let sortDir = -1; // descending by default (newest first)

function opinionBadge(opinion) {
  const cls = opinion === 'BULLISH' ? 'badge-green' : opinion === 'BEARISH' ? 'badge-red' : 'badge-gray';
  return `<span class="badge ${cls}">${opinion}</span>`;
}

function formatPrice(v) {
  if (v == null || v === 0) return '&mdash;';
  return parseFloat(v).toFixed(2);
}

function getSortValue(session, key) {
  const tp = session.tactical || {};
  switch (key) {
    case 'symbol': return session.symbol || '';
    case 'observed_at': return session.observed_at || '';
    case 'opinion': return session.opinion || '';
    case 'confidence': return session.confidence != null ? session.confidence : -1;
    case 'entry': return tp.current_price || tp.entry || 0;
    case 'take_profit': return tp.take_profit || 0;
    case 'stop_loss': return tp.stop_loss || 0;
    case 'rr_ratio': return tp.rr_ratio != null ? tp.rr_ratio : -1;
    case 'holding_hours': return tp.projected_holding_hours != null ? tp.projected_holding_hours : -1;
    default: return '';
  }
}

function sortSessions(sessions, key, dir) {
  return [...sessions].sort((a, b) => {
    const va = getSortValue(a, key);
    const vb = getSortValue(b, key);
    if (typeof va === 'number' && typeof vb === 'number') {
      if (va === -1 && vb === -1) return 0;
      if (va === -1) return 1;
      if (vb === -1) return -1;
      return (va - vb) * dir;
    }
    return String(va).localeCompare(String(vb)) * dir;
  });
}

function renderLedger(sessions) {
  const tbody = document.getElementById('ledger-body');
  document.getElementById('ledger-count').textContent = `${sessions.length} sessions`;
  if (sessions.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty">No sessions match filters</td></tr>';
    return;
  }
  tbody.innerHTML = sessions.map(s => {
    const tp = s.tactical || {};
    return `<tr>
      <td><strong>${s.symbol}</strong></td>
      <td>${s.observed_at || '&mdash;'}</td>
      <td>${opinionBadge(s.opinion)}</td>
      <td>${s.confidence != null ? s.confidence.toFixed(1) + '%' : '&mdash;'}</td>
      <td class="mono">${formatPrice(tp.current_price || tp.entry)}</td>
      <td class="mono profit">${formatPrice(tp.take_profit)}</td>
      <td class="mono loss">${formatPrice(tp.stop_loss)}</td>
      <td class="mono">${tp.rr_ratio != null ? tp.rr_ratio.toFixed(2) : '&mdash;'}</td>
      <td>${tp.projected_holding_hours != null ? tp.projected_holding_hours.toFixed(1) + 'h' : '&mdash;'}</td>
      <td><a href="/sessions/${encodeURIComponent(s.filename)}?data_root=${encodeURIComponent(DATA_ROOT)}" class="btn-sm">View</a></td>
    </tr>`;
  }).join('');
}

function renderStats(sessions) {
  const total = sessions.length;
  const bullish = sessions.filter(s => s.opinion === 'BULLISH').length;
  const bearish = sessions.filter(s => s.opinion === 'BEARISH').length;
  const neutral = sessions.filter(s => s.opinion === 'NEUTRAL').length;
  const confidences = sessions.filter(s => s.confidence != null && s.confidence > 0).map(s => s.confidence);
  const rrRatios = sessions.filter(s => s.tactical?.rr_ratio != null && s.tactical.rr_ratio > 0).map(s => s.tactical.rr_ratio);

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-bullish').textContent = bullish;
  document.getElementById('stat-bearish').textContent = bearish;
  document.getElementById('stat-neutral').textContent = neutral;
  document.getElementById('stat-avg-conf').textContent = confidences.length ? (confidences.reduce((a, b) => a + b, 0) / confidences.length).toFixed(1) + '%' : '&mdash;';
  document.getElementById('stat-avg-rr').textContent = rrRatios.length ? (rrRatios.reduce((a, b) => a + b, 0) / rrRatios.length).toFixed(2) : '&mdash;';
}

function applyFiltersAndSort() {
  const symbolFilter = document.getElementById('symbol-filter').value.trim().toUpperCase();
  const opinionFilter = document.getElementById('opinion-filter').value;
  let filtered = allSessions;
  if (symbolFilter) filtered = filtered.filter(s => (s.symbol || '').includes(symbolFilter));
  if (opinionFilter) filtered = filtered.filter(s => s.opinion === opinionFilter);
  const sorted = sortSessions(filtered, sortKey, sortDir);
  renderLedger(sorted);
  renderStats(filtered);
}

async function loadLedger() {
  const tbody = document.getElementById('ledger-body');
  tbody.innerHTML = '<tr><td colspan="10" class="loading">Loading ledger...</td></tr>';
  const params = new URLSearchParams({ data_root: DATA_ROOT, limit: '200' });
  try {
    const resp = await fetch('/api/sessions?' + params.toString());
    const data = await resp.json();
    allSessions = data.sessions || [];
    applyFiltersAndSort();
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="10" class="error">Failed to load: ${err.message}</td></tr>`;
  }
}

// Filter handlers
document.getElementById('symbol-filter').addEventListener('input', applyFiltersAndSort);
document.getElementById('opinion-filter').addEventListener('change', applyFiltersAndSort);

// Sort handlers
document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', function() {
    const key = this.dataset.sort;
    if (sortKey === key) {
      sortDir *= -1;
    } else {
      sortKey = key;
      sortDir = 1;
    }
    applyFiltersAndSort();
  });
});

loadLedger();
</script>
</body>
</html>
