<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Detail - Singularity</title>
<link rel="stylesheet" href="/static/dashboard.css">
<script src="/static/session-detail.js"></script>
</head>
<body class="dark">
<header class="app-header">
  <h1>Singularity</h1>
  <nav>
    <a href="/performance" class="nav-link">Performance</a>
    <a href="/live" class="nav-link">Live</a>
  </nav>
</header>

<main class="container" id="app-main">
  <div class="loading-spinner">Loading session...</div>
</main>

<script>
const DATA_ROOT = new URLSearchParams(window.location.search).get('data_root') || '';
const DR = DATA_ROOT ? `data_root=${encodeURIComponent(DATA_ROOT)}` : '';
const filename = window.location.pathname.split('/audits/')[1];

function apiUrl(path, extra = {}) {
  const p = new URLSearchParams(DR ? DR : '');
  for (const [k, v] of Object.entries(extra)) p.set(k, v);
  const qs = p.toString();
  return qs ? `${path}?${qs}` : path;
}

function renderAuditOutcome(audit) {
  if (!audit || audit.error) return '';

  const outcome = audit.market_outcome || {};
  const forensics = outcome.market_forensics || {};
  const metrics = outcome.trade_execution_metrics || {};
  const verdict = audit.forensic_verdict || {};

  const filled = outcome.is_filled;
  const result = outcome.tp_sl_result || 'NEITHER';

  // Compute P&L for display
  const session = audit.session || {};
  const decision = session.final_decision || {};
  const tp = decision.tactical_parameters || {};
  const entry = tp.entry || 0;
  let pnl = null;
  if (filled && entry > 0) {
    const exitPrice = forensics.price_at_t1 || entry;
    if (result === 'TP_HIT') pnl = Math.abs((tp.take_profit || entry) - entry) / entry * 100;
    else if (result === 'SL_HIT') pnl = -Math.abs(entry - (tp.stop_loss || entry)) / entry * 100;
    else {
      const delta = exitPrice - entry;
      pnl = (decision.opinion === 'BULLISH' ? delta : -delta) / entry * 100;
    }
  }

  const fillBadge = filled
    ? '<span class="badge badge-green">FILLED</span>'
    : '<span class="badge badge-gray">UNFILLED</span>';

  let resultBadge = '';
  if (filled && result === 'TP_HIT') {
    resultBadge = '<span class="badge result-tp">TP HIT</span>';
  } else if (filled && result === 'SL_HIT') {
    resultBadge = '<span class="badge result-sl">SL HIT</span>';
  } else if (filled) {
    resultBadge = '<span class="badge result-neither">EXPIRED</span>';
  }

  const pnlClass = pnl != null ? (pnl > 0 ? 'pnl-positive' : pnl < 0 ? 'pnl-negative' : '') : '';
  const pnlSign = pnl != null && pnl > 0 ? '+' : '';

  return `
    <section class="card audit-outcome">
      <h2>Trade Outcome</h2>
      <div class="audit-header">
        <div>${fillBadge}</div>
        <div>${resultBadge}</div>
        ${pnl != null ? `<div class="audit-pnl ${pnlClass}">${pnlSign}${pnl.toFixed(2)}%</div>` : ''}
      </div>
      <div class="tactical-grid">
        <div class="tactical-item">
          <span class="tactical-label">Exit Price (T1)</span>
          <span class="tactical-value mono">${formatPrice(forensics.price_at_t1)}</span>
        </div>
        <div class="tactical-item">
          <span class="tactical-label">Max Favorable Excursion</span>
          <span class="tactical-value mono profit">${forensics.max_favorable_runup_pct != null ? '+' + forensics.max_favorable_runup_pct.toFixed(2) + '%' : '&mdash;'}</span>
        </div>
        <div class="tactical-item">
          <span class="tactical-label">MFE Efficiency</span>
          <span class="tactical-value">${metrics.mfe_efficiency_pct != null ? metrics.mfe_efficiency_pct.toFixed(1) + '%' : '&mdash;'}</span>
        </div>
        <div class="tactical-item">
          <span class="tactical-label">Max Adverse Excursion</span>
          <span class="tactical-value mono loss">${forensics.max_adverse_drawdown_pct != null ? forensics.max_adverse_drawdown_pct.toFixed(2) + '%' : '&mdash;'}</span>
        </div>
        <div class="tactical-item">
          <span class="tactical-label">MAE Stress Level</span>
          <span class="tactical-value">${metrics.mae_stress_level_pct != null ? metrics.mae_stress_level_pct.toFixed(1) + '%' : '&mdash;'}</span>
        </div>
        <div class="tactical-item">
          <span class="tactical-label">Projected Holding</span>
          <span class="tactical-value">${tp.projected_holding_hours != null ? tp.projected_holding_hours.toFixed(1) + 'h' : '&mdash;'}</span>
        </div>
        <div class="tactical-item">
          <span class="tactical-label">Actual Holding</span>
          <span class="tactical-value">${metrics.actual_holding_hours != null ? metrics.actual_holding_hours.toFixed(1) + 'h' : '&mdash;'}</span>
        </div>
      </div>
      ${(verdict.is_justified_surrender || verdict.is_catastrophic_miss) ? `
      <div class="audit-verdicts">
        ${verdict.is_justified_surrender ? '<span class="badge badge-gray">Justified Surrender</span>' : ''}
        ${verdict.is_catastrophic_miss ? '<span class="badge badge-red">Catastrophic Miss</span>' : ''}
      </div>` : ''}
    </section>`;
}

async function loadSession() {
  const main = document.getElementById('app-main');
  try {
    const resp = await fetch(apiUrl(`/api/audits/${encodeURIComponent(filename)}`));
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const audit = await resp.json();
    if (audit.error) throw new Error(audit.error);

    // Response is the full audit bundle: { session, market_outcome, forensic_verdict, metadata }
    const session = audit.session || {};

    main.innerHTML = `
      <div class="session-header">
        <h2>${session.observation?.symbol || 'Unknown'} Trade</h2>
        <span class="session-time">${formatLocalTime(session.observation?.observed_at)}</span>
      </div>
      ${renderDecisionCard(session.final_decision || {})}
      ${renderAuditOutcome(audit)}
      ${renderDebateRounds(session.debate_history)}
      ${renderCharts(session.observation?.visual_context)}
      ${renderMetadata(session.metadata)}
    `;
  } catch (err) {
    main.innerHTML = `<div class="card error-card"><h2>Error</h2><p>${err.message}</p><a href="/performance" class="btn-sm">&larr; Back to Sessions</a></div>`;
  }
}

loadSession();
</script>
</body>
</html>
