<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live — Singularity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/dashboard.css">
  <script src="/static/i18n.js"></script>
  <script src="/static/dashboard-utils.js"></script>
  <script src="/static/session-progress.js"></script>
  {% from "_macros.html" import permission_gated with context %}
</head>

<body class="dark">
  <header class="app-header">
    <h1>Singularity</h1>
    <nav>
      <a href="/performance" class="nav-link" data-i18n="nav.performance"></a>
      <a href="/live" class="nav-link active" data-i18n="nav.live"></a>
      <a href="/development" class="nav-link" data-i18n="nav.development"></a>
    </nav>
    <div class="header-controls">
      {% if data_root %}
      <span class="env-badge">{{ data_root }}</span>
      {% endif %}
      <button id="lang-toggle" class="lang-toggle" onclick="toggleLang()">
        <span class="lang-en active">EN</span>
        <span class="lang-sep">│</span>
        <span class="lang-zh">中文</span>
      </button>
    </div>
  </header>

  <main class="container">

    <!-- ═══════ Sniper ═══════ -->
    <div class="run-panels">

      {% call permission_gated("run_sniper", permissions) %}
      <!-- Sniper -->
      <section class="card run-panel">
        <div class="section-header">
          <h2 data-i18n="section.sniper"></h2>
          <span id="sniper-pulse-badge" class="pulse-badge" style="display:none"></span>
          <span id="sniper-connection" class="sniper-connection" style="display:none">
            <span class="conn-dot" id="sniper-conn-dot"></span>
            <span id="sniper-conn-label">Connected</span>
          </span>
          <span class="sniper-header-actions">
            <button id="sniper-btn" class="btn-primary" onclick="triggerSniper()" data-i18n="btn.run"></button>
          </span>
        </div>
        <div class="bt-param-row">
          <label class="bt-field bt-field-wide">
            <span class="bt-label" data-i18n="bt.trading_pairs"></span>
            <span class="input-group" id="sniper-symbol-group">
              <input type="text" id="sniper-symbol" class="input-group-field" placeholder="XAUT, BTC" maxlength="50"
                autocomplete="off" oninput="clearSniperErrors()">
              <span class="input-group-suffix quote-suffix">USDT</span>
            </span>
          </label>
        </div>
        <div class="bt-param-row">
          <div class="bt-range-grid">
            <label class="toggle-label" for="sniper-trade-toggle" style="white-space:nowrap">
              <span class="toggle-text" data-i18n="sniper.enable_trading"></span>
              <input type="checkbox" id="sniper-trade-toggle" class="toggle-input" onchange="toggleCapEnabled()">
              <span class="toggle-slider"></span>
            </label>
            <label class="bt-field" id="sniper-cap-field" style="flex:1;min-width:160px">
              <span class="bt-label" data-i18n="sniper.cap_label"></span>
              <span class="input-group">
                <input type="number" id="sniper-cap" class="input-group-field" min="0" step="any" disabled
                  placeholder="Auto"
                  onkeydown="return event.key === 'Backspace' || event.key === 'Delete' || event.key === 'Tab' || event.key.startsWith('Arrow') || /^[0-9.]$/.test(event.key)"
                  oninput="if (!/^\d*\.?\d*$/.test(this.value)) this.value = this.value.replace(/[^0-9.]/g, '');clearSniperErrors()">
                <span class="input-group-suffix quote-suffix">USDT</span>
              </span>
            </label>
          </div>
        </div>
        <div id="sniper-signal-cards" class="signal-cards" style="display:none"></div>
        <div id="sniper-guardian-table-container"></div>
        <div id="sniper-progress-container"></div>
      </section>
      {% endcall %}

    </div>

    <!-- ═══════ Active Sessions Table ═══════ -->
    {% if "view_active_sessions" in permissions %}
    <section class="card">
      <div class="section-header">
        <h2 data-i18n="section.active_sessions"></h2>
        <div class="section-controls">
          <button id="refresh-active-btn" class="btn-sm" onclick="refreshActive()" data-i18n="btn.refresh" data-i18n-title="btn.refresh.title"></button>
          <span id="refresh-active-status" class="feedback-inline" style="display:none"></span>
        </div>
      </div>
      <div class="table-wrapper">
        <table id="active-table">
          <thead>
            <tr>
              <th data-i18n="th.symbol"></th>
              <th data-i18n="th.observed_at"></th>
              <th data-i18n="th.direction"></th>
              <th data-i18n="th.conf"></th>
              <th data-i18n="th.entry"></th>
              <th data-i18n="th.tp"></th>
              <th data-i18n="th.sl"></th>
              <th data-i18n="th.rr"></th>
              <th data-i18n="th.waiting"></th>
              <th data-i18n="th.holding"></th>
              <th data-i18n="th.time_left"></th>
              <th data-i18n="th.version"></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="active-body">
            <tr>
              <td colspan="13" class="loading">Loading sessions...</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="card-footer"><span id="active-count"></span></div>
    </section>
    {% endif %}

  </main>

  <script>
    function apiUrl(path, extra = {}) {
      const p = new URLSearchParams();
      const pageParams = new URLSearchParams(window.location.search);
      const user = pageParams.get('user');
      if (user) p.set('user', user);
      for (const [k, v] of Object.entries(extra)) p.set(k, v);
      const qs = p.toString();
      return qs ? `${path}?${qs}` : path;
    }

    // ── Dynamic config from backend ──
    let QUOTE = 'USDT'; // fallback, overwritten by /api/config
    (async function initConfig() {
      try {
        const resp = await fetch(apiUrl('/api/config'));
        const data = await resp.json();
        if (data.quote_currency) {
          QUOTE = data.quote_currency;
          document.querySelectorAll('.quote-suffix').forEach(el => { el.textContent = QUOTE; });
        }
      } catch (e) { /* keep fallback */ }
    })();

    // ── Sniper Control ──
    let sniperPollInterval = null;
    let sniperProgress = null;
    let _stopInFlight = false;  // guards against poll re-enabling button mid-stop
    let _sniperHadActiveSession = false;  // detect session completion → refresh active table
    let _sniperConnFailures = 0;  // consecutive poll failures for connection health
    let _lastSniperPulseAt = 0;   // timestamp of last successful pulse (ms)

    function clearSniperErrors() {
      ['sniper-symbol', 'sniper-cap'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('bt-field-error');
      });
      const group = document.getElementById('sniper-symbol-group');
      if (group) { group.classList.remove('has-error'); group.removeAttribute('data-error'); }
      // Clear cap input-group error too
      const capInput = document.getElementById('sniper-cap');
      if (capInput) {
        const capGroup = capInput.closest('.input-group');
        if (capGroup) { capGroup.classList.remove('has-error'); capGroup.removeAttribute('data-error'); }
      }
      const container = document.getElementById('sniper-progress-container');
      container.innerHTML = '';
      if (sniperProgress) { sniperProgress.destroy(); sniperProgress = null; }
    }

    function toggleCapEnabled() {
      const trade = document.getElementById('sniper-trade-toggle').checked;
      const capInput = document.getElementById('sniper-cap');
      capInput.disabled = !trade;
      if (!trade) {
        capInput.value = '';
      }
    }

    function updateSniperUI(state) {
      const input = document.getElementById('sniper-symbol');
      const tradeToggle = document.getElementById('sniper-trade-toggle');
      const capInput = document.getElementById('sniper-cap');
      const btn = document.getElementById('sniper-btn');

      if (state === 'running') {
        _stopInFlight = false;
        input.disabled = true;
        tradeToggle.disabled = true;
        capInput.disabled = true;
        btn.disabled = false;
        btn.textContent = TRANSLATIONS['btn.stop']?.[getLang()] || '⏹ Stop';
        btn.classList.add('danger');
        var connEl = document.getElementById('sniper-connection');
        if (connEl) connEl.style.display = '';
        _sniperConnFailures = 0;
      } else {
        _stopInFlight = false;
        input.disabled = false;
        tradeToggle.disabled = false;
        capInput.disabled = false;
        toggleCapEnabled();
        btn.disabled = false;
        btn.textContent = TRANSLATIONS['btn.run']?.[getLang()] || '▶ Run';
        btn.classList.remove('danger');
        sniperPollInterval = null;
        var statusEl = document.getElementById('sniper-pulse-badge');
        if (statusEl) statusEl.style.display = 'none';
        var connEl = document.getElementById('sniper-connection');
        if (connEl) connEl.style.display = 'none';
        var guardianEl = document.getElementById('sniper-guardian-table-container');
        if (guardianEl) guardianEl.innerHTML = '';
        var signalCardsEl = document.getElementById('sniper-signal-cards');
        if (signalCardsEl) { signalCardsEl.innerHTML = ''; signalCardsEl.style.display = 'none'; }
      }
    }

    // ── Render sniper status line (always visible while sniper runs) ──
    function _renderSniperStatusLine(data) {
      var el = document.getElementById('sniper-pulse-badge');
      if (!el) return;

      var pulseAge = data.pulse_seconds != null ? data.pulse_seconds : (data.elapsed_seconds || 0);
      var label = formatElapsed(pulseAge);
      var template = TRANSLATIONS['sniper.pulse_age']?.[getLang()] || 'Last pulse · {time}';
      el.innerHTML = '<span class="pulse-dot"></span>' + template.replace('{time}', label);
      el.style.display = '';
    }

    function _renderGuardianTable(container, data) {
      var guardian = data.guardian;
      var tradeOn = data.trade_enabled;
      if (!tradeOn || !guardian || !guardian.symbols) {
        container.innerHTML = '';
        return;
      }

      var symbols = Object.keys(guardian.symbols);
      if (symbols.length === 0) {
        container.innerHTML = '';
        return;
      }

      var html = '<table class="guardian-table"><thead><tr>';
      html += '<th>' + t('guardian.symbol') + '</th><th>' + t('guardian.position') + '</th><th>' + t('guardian.net_qty') + '</th><th>' + t('guardian.orders') + '</th><th>' + t('guardian.status') + '</th>';
      html += '</tr></thead><tbody>';

      for (var i = 0; i < symbols.length; i++) {
        var sym = symbols[i];
        var gs = guardian.symbols[sym] || {};
        var hasPos = gs.net_qty != null && Math.abs(gs.net_qty) > 1e-8;
        var posLabel = hasPos
          ? (gs.net_qty > 0 ? t('status.long') : t('status.short'))
          : '—';
        var statusLabel = hasPos
          ? (gs.active_orders > 0 ? t('status.protected') : t('status.naked'))
          : t('status.idle');

        html += '<tr>';
        html += '<td><strong>' + sym.replace(new RegExp(QUOTE + '$', 'i'), '') + '</strong></td>';
        html += '<td>' + posLabel + '</td>';
        html += '<td>' + ((gs.net_qty != null) ? gs.net_qty : '0.0') + '</td>';
        html += '<td>' + (gs.active_orders || 0) + '</td>';
        html += '<td>' + statusLabel + '</td>';
        html += '</tr>';
      }

      html += '</tbody></table>';

      if (guardian.account_balance != null) {
        html += '<div class="guardian-summary">' + t('guardian.balance') +
          guardian.account_balance.toLocaleString() + ' USDT</div>';
      }

      container.innerHTML = html;
    }

    function _renderPulseHistory(container, history, symbol) {
      if (!history || !history.length) {
        container.innerHTML = '';
        return;
      }

      // Adaptive N: fit as many bars as container allows
      var barStep = 12;  // 8px bar + 4px gap
      var maxBars = Math.max(1, Math.floor(container.offsetWidth / barStep));
      var slice = history.length > maxBars ? history.slice(-maxBars) : history;

      var bars = [];
      for (var i = 0; i < slice.length; i++) {
        var entry = slice[i];
        var s = entry.symbols && entry.symbols[symbol];
        if (!s) continue;

        var ratio = s.threshold > 0 ? Math.min(s.confluence_score / s.threshold, 1.0) : 0;
        var heightPx = Math.max(1, Math.round(ratio * 22));

        var color;
        if (s.direction === 'BULLISH') color = 'var(--accent-green)';
        else if (s.direction === 'BEARISH') color = 'var(--accent-red)';
        else color = 'var(--text-muted)';

        var wakeClass = ratio >= 1.0 ? ' wake' : '';
        var sessionClass = s.session_active ? ' session-active' : '';

        var timeLabel = '';
        if (entry.at) {
          var d = new Date(entry.at);
          if (!isNaN(d.getTime())) {
            timeLabel = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
          }
        }

        var tooltip = s.confluence_score.toFixed(2) + ' / ' + s.threshold.toFixed(2) + ' at ' + timeLabel;

        bars.push(
          '<div class="pulse-bar' + wakeClass + sessionClass + '"' +
          ' style="height:' + heightPx + 'px;background:' + color + '"' +
          ' data-tooltip="' + tooltip + '">' +
          '</div>'
        );
      }

      container.innerHTML = bars.join('');
    }

    function _renderSignalCards(data) {
      var container = document.getElementById('sniper-signal-cards');
      if (!container) return;

      var signals = data.pulse_signals;
      if (!signals || !signals.symbols || !Object.keys(signals.symbols).length) {
        container.style.display = 'none';
        return;
      }

      var symbols = data.symbols || Object.keys(signals.symbols);
      container.style.display = '';
      var html = '';

      for (var i = 0; i < symbols.length; i++) {
        var sym = symbols[i];
        var s = signals.symbols[sym];
        if (!s) continue;

        var stripped = sym.replace(new RegExp(QUOTE + '$', 'i'), '');

        html += '<div class="signal-card">';
        html += '<div class="signal-card-header">';
        html += '<span class="signal-card-symbol">' + stripped + '</span>';
        if (s.cooldown_active && s.cooldown_remaining_seconds > 0) {
          html += '<span class="signal-card-cooldown">&#10052; ' +
            formatElapsed(s.cooldown_remaining_seconds) + '</span>';
        }
        html += '</div>';

        // Pulse history bar chart
        html += '<div class="pulse-history-row" id="pulse-hist-' + stripped + '"></div>';

        // Compact signal strip (10 blocks, order matches _SIGNAL_TYPES)
        html += '<div class="signal-strip">';
        var allSignals = s.all_signals || [];
        for (var j = 0; j < allSignals.length; j++) {
          var sig = allSignals[j];
          var dir = sig.is_active ? sig.direction : 'NEUTRAL';
          var hasScore = sig.score > 0;
          var opacity = hasScore ? 1.0 : 0.25;
          var liveClass = hasScore ? ' live' : '';
          var tooltip = sig.type;
          html += '<div class="signal-strip-block' + liveClass + '"' +
            ' style="opacity:' + opacity + ';background:' +
            (dir === 'BULLISH' ? 'var(--accent-green)' :
              dir === 'BEARISH' ? 'var(--accent-red)' :
                'var(--badge-gray-bg)') + '"' +
            ' data-tooltip="' + tooltip + '">' +
            '</div>';
        }
        html += '</div>';

        html += '</div>';  // close signal-card
      }
      container.innerHTML = html;

      // Populate pulse history bars per symbol (deferred render after innerHTML)
      var historyData = data.pulse_history || [];
      for (var k = 0; k < symbols.length; k++) {
        var s2 = symbols[k];
        var histEl = document.getElementById('pulse-hist-' + s2.replace(new RegExp(QUOTE + '$', 'i'), ''));
        if (histEl) {
          _renderPulseHistory(histEl, historyData, s2);
        }
      }
    }

    function _updateConnHealth(state, label) {
      var dot = document.getElementById('sniper-conn-dot');
      var lbl = document.getElementById('sniper-conn-label');
      if (!dot || !lbl) return;
      dot.className = 'conn-dot ' + state;
      lbl.textContent = label || state;
    }

    async function checkSniperStatus() {
      try {
        const resp = await fetch(apiUrl('/api/sniper/status'));
        const data = await resp.json();

        // Connection healthy — reset failure counter
        _sniperConnFailures = 0;
        _lastSniperPulseAt = Date.now();

        if (data.running) {
          if (!_stopInFlight) {
            updateSniperUI('running');
          }
          _updateConnHealth('connected', t('status.connected'));
          const progressContainer = document.getElementById('sniper-progress-container');
          const guardianContainer = document.getElementById('sniper-guardian-table-container');

          // Status line — always visible while sniper runs
          _renderSniperStatusLine(data);

          // Guardian table (per-symbol position/order status) when trade enabled
          _renderGuardianTable(guardianContainer, data);

          // Signal cards — per-symbol pulse signal confluence
          _renderSignalCards(data);

          // Session progress — shown below status line when AI reasoning is active
          if (data.active_session && data.active_session.progress) {
            _sniperHadActiveSession = true;
            if (!sniperProgress) {
              sniperProgress = new SessionProgress(progressContainer, {
                size: 'full', context: 'sniper'
              });
            }
            var p = data.active_session.progress;
            p._symbol = data.active_session.symbol || '';
            p._triggered_at = data.active_session.triggered_at || '';
            sniperProgress.update(p);
          } else {
            if (_sniperHadActiveSession) {
              _sniperHadActiveSession = false;
              if (typeof loadActive === 'function') { loadActive(); }
            }
            if (sniperProgress) {
              sniperProgress.destroy();
              sniperProgress = null;
            }
            progressContainer.innerHTML = '';
          }
        } else {
          if (sniperPollInterval) {
            clearInterval(sniperPollInterval);
            sniperPollInterval = null;
            if (sniperProgress) { sniperProgress.destroy(); sniperProgress = null; }
            document.getElementById('sniper-pulse-badge').style.display = 'none';
            document.getElementById('sniper-guardian-table-container').innerHTML = '';
            document.getElementById('sniper-progress-container').innerHTML = '';
            updateSniperUI('idle');
          }
        }
      } catch (e) {
        _sniperConnFailures++;
        if (_sniperConnFailures >= 3) {
          _updateConnHealth('disconnected', t('status.disconnected'));
        } else {
          _updateConnHealth('stale', t('status.retrying'));
        }
      }
    }

    async function triggerSniper() {
      const container = document.getElementById('sniper-progress-container');
      const btn = document.getElementById('sniper-btn');

      // Disable immediately to prevent double-click races in both START and STOP paths
      btn.disabled = true;
      btn.textContent = '…';

      // Check if currently running — if so, STOP
      if (sniperPollInterval) {
        _stopInFlight = true;
        try {
          const resp = await fetch(apiUrl('/api/sniper/stop'), { method: 'POST' });
          if (!resp.ok) {
            const err = await resp.json();
            container.innerHTML = '<div class="run-status-box run-error" style="display:block">✗ ' +
              (err.detail || t('error.stop_failed')) + '</div>';
            btn.disabled = false;
            btn.textContent = TRANSLATIONS['btn.stop']?.[getLang()] || '⏹ Stop';
            _stopInFlight = false;
            return;
          }
        } catch (e) {
          container.innerHTML = '<div class="run-status-box run-error" style="display:block">✗ ' + t('error.request_failed') + '</div>';
          btn.disabled = false;
          btn.textContent = TRANSLATIONS['btn.stop']?.[getLang()] || '⏹ Stop';
          _stopInFlight = false;
          return;
        }
        document.getElementById('sniper-pulse-badge').style.display = 'none';
        document.getElementById('sniper-guardian-table-container').innerHTML = '';
        var signalCardsEl = document.getElementById('sniper-signal-cards');
        if (signalCardsEl) { signalCardsEl.innerHTML = ''; signalCardsEl.style.display = 'none'; }
        if (sniperProgress) { sniperProgress.destroy(); sniperProgress = null; }
        return;
      }

      // START — validate CSV symbol prefixes
      const input = document.getElementById('sniper-symbol');
      const inputGroup = document.getElementById('sniper-symbol-group');
      const raw = input.value.trim();

      const parts = raw.split(',').map(s => s.trim().toUpperCase()).filter(Boolean);

      if (parts.length === 0) {
        if (inputGroup) { inputGroup.classList.add('has-error'); inputGroup.setAttribute('data-error', t('err.enter_symbol')); }
        input.focus();
        updateSniperUI('idle');
        return;
      }
      for (const p of parts) {
        if (p.length < 2 || !/^[A-Z0-9]+$/.test(p)) {
          if (inputGroup) { inputGroup.classList.add('has-error'); inputGroup.setAttribute('data-error', '"' + p + '" ' + t('err.invalid_symbol')); }
          input.focus();
          updateSniperUI('idle');
          return;
        }
      }
      const symbolPrefix = parts.join(',');

      const trade = document.getElementById('sniper-trade-toggle').checked;
      const capRaw = document.getElementById('sniper-cap').value.trim();
      const cap = capRaw ? parseFloat(capRaw) : null;

      if (cap !== null && (isNaN(cap) || cap <= 0)) {
        const capInput = document.getElementById('sniper-cap');
        const capGroup = capInput.closest('.input-group');
        capInput.classList.add('bt-field-error');
        if (capGroup) { capGroup.classList.add('has-error'); capGroup.setAttribute('data-error', t('err.cap_positive')); }
        document.getElementById('sniper-cap').focus();
        updateSniperUI('idle');
        return;
      }

      try {
        const resp = await fetch(apiUrl('/api/sniper/start'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            symbol_prefix: symbolPrefix,
            trade: trade,
            balance: cap,
          }),
        });

        if (!resp.ok) {
          const err = await resp.json();
          container.innerHTML = '<div class="run-status-box run-error" style="display:block">✗ ' +
            (err.detail || t('error.request_failed')) + '</div>';
          updateSniperUI('idle');
          return;
        }

        updateSniperUI('running');
        sniperPollInterval = setInterval(checkSniperStatus, 2000);
        checkSniperStatus();
      } catch (e) {
        container.innerHTML = '<div class="run-status-box run-error" style="display:block">✗ ' + t('error.request_failed') + '</div>';
        updateSniperUI('idle');
      }
    }

    // On page load, check if sniper is already running
    (async function initSniperStatus() {
      try {
        const resp = await fetch(apiUrl('/api/sniper/status'));
        const data = await resp.json();
        if (data.running) {
          const sniperSymbolInput = document.getElementById('sniper-symbol');
          const symbols = (data.symbols || []).map(s => s.replace(new RegExp(QUOTE + '$', 'i'), ''));
          sniperSymbolInput.value = symbols.join(',');

          const tradeToggle = document.getElementById('sniper-trade-toggle');
          tradeToggle.checked = !!data.trade_enabled;

          const capInput = document.getElementById('sniper-cap');
          if (data.balance != null) {
            capInput.value = data.balance;
          }
          capInput.disabled = !data.trade_enabled;

          updateSniperUI('running');
          sniperPollInterval = setInterval(checkSniperStatus, 2000);
          checkSniperStatus();
        }
      } catch (e) { /* ignore */ }
    })();

    function timeRemainingClass(seconds) {
      if (seconds > 43200) return 'time-safe';       // > 12h
      if (seconds > 3600) return 'time-warning';      // 1-12h
      return 'time-critical';                          // < 1h
    }

    function timeRemainingRowClass(seconds) {
      if (seconds > 43200) return 'row-safe';
      if (seconds > 3600) return 'row-warn';
      return 'row-critical';
    }

    {% if "view_active_sessions" in permissions %}
    async function loadActive() {
      const tbody = document.getElementById('active-body');
      const countEl = document.getElementById('active-count');

      // Deferred loading indicator: only show if fetch takes >200ms
      const loadingTimer = setTimeout(() => {
        tbody.innerHTML = '<tr><td colspan="13" class="loading">' +
          (TRANSLATIONS['msg.loading_sessions']?.[getLang()] || 'Loading sessions...') + '</td></tr>';
      }, 200);

      try {
        const url = apiUrl('/api/live-sessions');
        const resp = await fetch(url);
        const data = await resp.json();
        const sessions = data.active || [];
        clearTimeout(loadingTimer);

        countEl.textContent = `${sessions.length} ${t('fmt.records')}`;

        if (!sessions.length) {
          tbody.innerHTML = '<tr><td colspan="13" class="empty">' +
            (TRANSLATIONS['msg.no_records_active']?.[getLang()] || 'No records — all clear') + '</td></tr>';
          return sessions.length;
        }

        tbody.innerHTML = sessions.map(s => {
          const isNeutral = s.opinion === 'NEUTRAL';
          const urgencyCls = isNeutral ? '' : timeRemainingClass(s.time_remaining_seconds);
          const rowCls = isNeutral ? '' : timeRemainingRowClass(s.time_remaining_seconds);
          return `<tr class="${rowCls}">
        <td><strong>${s.symbol}</strong></td>
        <td>${formatLocalTimeShort(s.observed_at)}</td>
        <td>${opinionBadge(s.opinion)}</td>
        <td>${s.confidence != null ? s.confidence.toFixed(0) + '%' : '&mdash;'}</td>
        <td class="mono">${isNeutral ? '&mdash;' : formatPrice(s.entry)}</td>
        <td class="mono">${isNeutral ? '&mdash;' : formatPrice(s.take_profit)}</td>
        <td class="mono">${isNeutral ? '&mdash;' : formatPrice(s.stop_loss)}</td>
        <td>${isNeutral ? '&mdash;' : (s.rr_ratio != null ? s.rr_ratio.toFixed(2) : '&mdash;')}</td>
        <td>${s.projected_waiting_hours != null ? s.projected_waiting_hours + 'h' : '&mdash;'}</td>
        <td>${s.projected_holding_hours != null ? s.projected_holding_hours + 'h' : '&mdash;'}</td>
        <td><span class="time-remaining ${urgencyCls}">${s.time_remaining}</span></td>
        <td><span class="text-muted">${s.version || '&mdash;'}</span></td>
        <td><a href="/sessions/${encodeURIComponent(s.filename)}" class="btn-sm">${TRANSLATIONS['btn.view']?.[getLang()] || 'View'}</a></td>
      </tr>`;
        }).join('');
        return sessions.length;

      } catch (e) {
        clearTimeout(loadingTimer);
        tbody.innerHTML = '<tr><td colspan="13" class="error">' +
          (TRANSLATIONS['msg.load_failed']?.[getLang()] || 'Failed to load records') + '</td></tr>';
        throw e;
      }
    }

    // ── Filter clear helper ──
    function clearFilter(id) {
      var el = document.getElementById(id);
      if (el) { el.value = ''; el.dispatchEvent(new Event('input')); el.focus(); }
    }

    // ── Re-render on language switch ──
    document.addEventListener('langchange', function () {
      if (typeof loadActive === 'function') loadActive();
    });

    // ── Reload button (show ✓ briefly, then revert) ──
    async function refreshActive() {
      const btn = document.getElementById('refresh-active-btn');
      const status = document.getElementById('refresh-active-status');
      btn.disabled = true;
      btn.textContent = TRANSLATIONS['btn.refreshing']?.[getLang()] || '⟳ Refreshing...';
      status.style.display = 'none';

      try {
        const count = await loadActive();
        status.textContent = `✓ ${count}`;
        status.className = 'feedback-inline feedback-ok';
      } catch {
        status.textContent = '⚠';
        status.className = 'feedback-inline feedback-err';
      }
      status.style.display = 'inline';
      btn.style.display = 'none';
      setTimeout(() => {
        status.style.display = 'none';
        btn.style.display = '';
        btn.disabled = false;
        btn.textContent = TRANSLATIONS['btn.refresh']?.[getLang()] || '⟳ Refresh';
      }, 2000);
    }

    loadActive();
    {% endif %}
  </script>
</body>

</html>
