<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live — BinaryStar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/dashboard.css">
  <script src="/static/i18n.js"></script>
  <script src="/static/dashboard-utils.js"></script>
  <script src="/static/session-progress.js"></script>
  {% from "_macros.html" import permission_gated with context %}
</head>

<body class="dark">
  <header class="app-header">
    <h1>BinaryStar</h1>
    <nav>
      <a href="/performance" class="nav-link" data-i18n="nav.performance"></a>
      <a href="/live" class="nav-link active" data-i18n="nav.live"></a>
      <a href="/development" class="nav-link" data-i18n="nav.development"></a>
    </nav>
    <div class="header-controls">
      {% if data_root %}
      <span class="env-badge">{{ data_root }}</span>
      {% endif %}
      <button id="lang-toggle" class="lang-toggle" onclick="toggleLang()">
        <span class="lang-en active">EN</span>
        <span class="lang-sep">│</span>
        <span class="lang-zh">中文</span>
      </button>
    </div>
  </header>

  <main class="container">

    <!-- ═══════ Sniper ═══════ -->
    <div class="run-panels">

      {% call permission_gated("run_sniper", permissions) %}
      <!-- Sniper -->
      <section class="card run-panel">
        <div class="section-header">
          <h2 data-i18n="section.sniper"></h2>
          <span class="sniper-header-actions">
            <span id="sniper-status" class="sniper-status" style="display:none">
              <span class="sniper-status-dot" id="sniper-status-dot"></span>
              <span id="sniper-status-label"></span>
            </span>
            <button id="sniper-btn" class="btn-primary" onclick="triggerSniper()" data-i18n="btn.run"></button>
          </span>
        </div>
        <div class="bt-param-row">
          <label class="bt-field bt-field-wide">
            <span class="bt-label" data-i18n="bt.trading_pairs"></span>
            <span class="input-group" id="sniper-symbol-group">
              <input type="text" id="sniper-symbol" class="input-group-field" placeholder="XAUT, BTC" maxlength="50"
                autocomplete="off" oninput="clearSniperErrors()">
              <span class="input-group-suffix quote-suffix">USDT</span>
            </span>
          </label>
        </div>
        <div class="bt-param-row">
          <div class="bt-range-grid">
            <div style="display:flex;flex-direction:column;gap:4px">
              <span class="bt-label" data-i18n="sniper.trade_mode_label"></span>
              <div class="bt-mode-row" id="sniper-trade-mode-group" style="margin-bottom:0">
                <label class="bt-mode-option">
                  <input type="radio" name="sniper-trade-mode" value="observe" checked onchange="onTradeModeChange()">
                  <span class="bt-mode-label" data-i18n="sniper.mode_observe"></span>
                </label>
                <label class="bt-mode-option">
                  <input type="radio" name="sniper-trade-mode" value="trade" onchange="onTradeModeChange()">
                  <span class="bt-mode-label" data-i18n="sniper.mode_trade"></span>
                </label>
              </div>
            </div>
            <label class="bt-field" id="sniper-cap-field">
              <span class="bt-label" data-i18n="sniper.cap_label"></span>
              <span class="input-group">
                <input type="text" inputmode="decimal" id="sniper-cap" class="input-group-field" disabled
                  placeholder="Auto"
                  onkeydown="return event.ctrlKey || event.metaKey || event.key === 'Backspace' || event.key === 'Delete' || event.key === 'Tab' || event.key.startsWith('Arrow') || /^[0-9.]$/.test(event.key)"
                  oninput="var v=this.value.replace(/[^0-9.]/g,'');var d=v.indexOf('.');this.value=d>=0?v.slice(0,d+1)+v.slice(d+1).replace(/\./g,'').slice(0,1):v;clearSniperErrors()">
                <span class="input-group-suffix quote-suffix">USDT</span>
              </span>
            </label>
            <label class="bt-field" id="sniper-risk-field">
              <span class="bt-label" data-i18n="sniper.risk_label"></span>
              <span class="input-group" style="width:90px">
                <input type="text" inputmode="decimal" id="sniper-risk" class="input-group-field" disabled
                  onkeydown="return event.ctrlKey || event.metaKey || event.key === 'Backspace' || event.key === 'Delete' || event.key === 'Tab' || event.key.startsWith('Arrow') || /^[0-9.]$/.test(event.key)"
                  oninput="var v = this.value.replace(/[^0-9.]/g, ''); var d = v.indexOf('.'); this.value = d >= 0 ? v.slice(0, d + 1) + v.slice(d + 1).replace(/\./g, '').slice(0, 2) : v; clearSniperErrors()">
                <span class="input-group-suffix">%</span>
              </span>
            </label>
          </div>
        </div>
        <div id="sniper-signal-cards" class="signal-cards" style="display:none"></div>
        <div id="sniper-progress-container"></div>
      </section>
      {% endcall %}

    </div>

    <!-- ═══════ Active Sessions Table ═══════ -->
    {% if "view_active_sessions" in permissions %}
    <section class="card">
      <div class="section-header">
        <h2 data-i18n="section.active_sessions"></h2>
        <div class="section-controls">
          <button id="refresh-active-btn" class="btn-sm" onclick="refreshActive()" data-i18n="btn.refresh" data-i18n-title="btn.refresh.title"></button>
          <span id="refresh-active-status" class="feedback-inline" style="display:none"></span>
        </div>
      </div>
      <div class="table-wrapper">
        <table id="active-table">
          <thead>
            <tr>
              <th data-i18n="th.symbol"></th>
              <th data-i18n="th.observed_at"></th>
              <th data-i18n="th.direction"></th>
              <th data-i18n="th.conf"></th>
              <th data-i18n="th.entry"></th>
              <th data-i18n="th.tp"></th>
              <th data-i18n="th.sl"></th>
              <th data-i18n="th.rr"></th>
              <th data-i18n="th.waiting"></th>
              <th data-i18n="th.holding"></th>
              <th data-i18n="th.time_left"></th>
              <th data-i18n="th.version"></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="active-body">
            <tr>
              <td colspan="13" class="loading">Loading sessions...</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="card-footer"><span id="active-count"></span></div>
    </section>
    {% endif %}

  </main>

  <script>

    // ── Dynamic config from backend ──
    let QUOTE = 'USDT'; // fallback, overwritten by /api/config
    let _configReady;  // promise: resolves when initConfig finishes, awaited by initSniperStatus
    (async function initConfig() {
      _configReady = (async () => {
        try {
          const resp = await fetch(apiUrl('/api/config'));
          const data = await resp.json();
          if (data.quote_currency) {
            QUOTE = data.quote_currency;
            document.querySelectorAll('.quote-suffix').forEach(el => { el.textContent = QUOTE; });
          }
          // Pre-populate risk_per_trade from config if user hasn't set a custom value
          var riskEl = document.getElementById('sniper-risk');
          if (riskEl && !riskEl.value && data.risk_per_trade != null) {
            riskEl.value = (data.risk_per_trade * 100).toFixed(2);
          }
        } catch (e) { /* keep fallback */ }
      })();
      await _configReady;
    })();

    // Restore sniper form values from localStorage (survives hard refresh)
    // Guarded: sniper panel may not be rendered if user lacks 'run_sniper' permission.
    (function restoreSniperForm() {
      var symEl = document.getElementById('sniper-symbol');
      var capEl = document.getElementById('sniper-cap');
      var riskEl = document.getElementById('sniper-risk');
      if (!symEl || !capEl) return;

      var savedSymbol = localStorage.getItem('sniperSymbol');
      if (savedSymbol !== null) symEl.value = savedSymbol;

      var savedCap = localStorage.getItem('sniperCap');
      if (savedCap !== null) capEl.value = savedCap;

      var savedRisk = localStorage.getItem('sniperRisk');
      if (savedRisk !== null && riskEl) riskEl.value = savedRisk;

      var savedMode = localStorage.getItem('sniperTradeMode');
      if (savedMode === 'trade') {
        var tradeRadio = document.querySelector('input[name="sniper-trade-mode"][value="trade"]');
        if (tradeRadio) tradeRadio.checked = true;
      }
      _syncParamDisabled();
    })();

    // Persist sniper form values on change (guarded: elements may be absent)
    (function bindSniperPersistence() {
      var symEl = document.getElementById('sniper-symbol');
      if (symEl) symEl.addEventListener('input', function () {
        localStorage.setItem('sniperSymbol', this.value);
      });
      var capEl = document.getElementById('sniper-cap');
      if (capEl) capEl.addEventListener('input', function () {
        localStorage.setItem('sniperCap', this.value);
      });
      var riskEl = document.getElementById('sniper-risk');
      if (riskEl) riskEl.addEventListener('input', function () {
        localStorage.setItem('sniperRisk', this.value);
      });
      var modeRadios = document.querySelectorAll('input[name="sniper-trade-mode"]');
      for (var i = 0; i < modeRadios.length; i++) {
        modeRadios[i].addEventListener('change', function () {
          localStorage.setItem('sniperTradeMode', this.value);
        });
      }
    })();

    // Auto-detect running daemon on page load (survives hard refresh)
    (async function initSniperStatus() {
      try {
        // Wait for QUOTE to be resolved before using it in symbol suffix stripping
        await _configReady;

        var symEl = document.getElementById('sniper-symbol');
        var modeGroup = document.getElementById('sniper-trade-mode-group');
        var capEl = document.getElementById('sniper-cap');
        var riskEl = document.getElementById('sniper-risk');
        // If elements absent (no permission), skip daemon status polling entirely
        if (!symEl || !modeGroup || !capEl) return;

        const resp = await fetch(apiUrl('/api/sniper/status'));
        const data = await resp.json();
        if (data.running) {
          // Populate form fields from server state (source of truth when running)
          var symPrefix = (data.symbols || [])
            .map(function(s) { return s.replace(new RegExp(QUOTE + '$', 'i'), ''); })
            .join(', ');
          symEl.value = symPrefix;
          symEl.disabled = true;
          // Disable all radio options
          var radios = modeGroup.querySelectorAll('input[type="radio"]');
          for (var ri = 0; ri < radios.length; ri++) radios[ri].disabled = true;
          // Select correct mode
          var modeVal = data.trade_enabled ? 'trade' : 'observe';
          var targetRadio = modeGroup.querySelector('input[value="' + modeVal + '"]');
          if (targetRadio) targetRadio.checked = true;
          if (data.balance != null && data.balance > 0) {
            capEl.value = data.balance;
          }
          capEl.disabled = true;
          if (data.risk_per_trade != null && data.risk_per_trade > 0) {
            var riskPct = (data.risk_per_trade * 100).toFixed(2);
            if (riskEl) riskEl.value = riskPct;
          }
          if (riskEl) riskEl.disabled = true;
          updateSniperUI('running');
          sniperPollInterval = setInterval(checkSniperStatus, 2000);
          checkSniperStatus();
        }
      } catch (e) { /* daemon not reachable — stay idle */ }
    })();

    // ── Form state helpers (Cap + Risk share the same enable/disable pattern) ──
    function _isTradeMode() {
      const sel = document.querySelector('input[name="sniper-trade-mode"]:checked');
      return sel && sel.value === 'trade';
    }

    function _syncParamDisabled() {
      const trade = _isTradeMode();
      for (const id of ['sniper-cap', 'sniper-risk']) {
        const el = document.getElementById(id);
        if (el) el.disabled = !trade;
      }
    }

    function _clearParamErrors() {
      for (const id of ['sniper-cap', 'sniper-risk']) {
        const el = document.getElementById(id);
        if (!el) continue;
        el.classList.remove('bt-field-error');
        const group = el.closest('.input-group') || el;
        group.classList.remove('has-error');
        group.removeAttribute('data-error');
      }
    }

    // ── Sniper Control ──
    let sniperPollInterval = null;
    let sniperProgress = null;
    let _stopInFlight = false;  // guards against poll re-enabling button mid-stop
    let _sniperHadActiveSession = false;  // detect session completion → refresh active table
    let _sniperConnFailures = 0;  // consecutive poll failures for connection health
    let _lastSniperPulseAt = 0;   // timestamp of last successful pulse (ms)
    let _renderedSymbols = [];    // symbols with signal cards in DOM

    function clearSniperErrors() {
      const group = document.getElementById('sniper-symbol-group');
      if (group) { group.classList.remove('has-error'); group.removeAttribute('data-error'); }
      ['sniper-symbol'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('bt-field-error');
      });
      _clearParamErrors();
      const container = document.getElementById('sniper-progress-container');
      container.innerHTML = '';
      if (sniperProgress) { sniperProgress.destroy(); sniperProgress = null; }
    }

    function onTradeModeChange() {
      const trade = _isTradeMode();
      const capInput = document.getElementById('sniper-cap');
      capInput.disabled = !trade;
      if (!trade) {
        capInput.value = '';
        localStorage.setItem('sniperCap', '');
      }
      const riskEl = document.getElementById('sniper-risk');
      if (riskEl) riskEl.disabled = !trade;
      localStorage.setItem('sniperTradeMode', trade ? 'trade' : 'observe');
    }

    function updateSniperUI(state) {
      const input = document.getElementById('sniper-symbol');
      const modeGroup = document.getElementById('sniper-trade-mode-group');
      const capInput = document.getElementById('sniper-cap');
      const riskInput = document.getElementById('sniper-risk');
      const btn = document.getElementById('sniper-btn');

      if (state === 'running') {
        _stopInFlight = false;
        input.disabled = true;
        if (modeGroup) {
          var radios = modeGroup.querySelectorAll('input[type="radio"]');
          for (var ri = 0; ri < radios.length; ri++) radios[ri].disabled = true;
        }
        capInput.disabled = true;
        if (riskInput) riskInput.disabled = true;
        btn.disabled = false;
        btn.textContent = TRANSLATIONS['btn.stop']?.[getLang()] || '⏹ Stop';
        btn.classList.add('danger');
        var statusEl = document.getElementById('sniper-status');
        if (statusEl) statusEl.style.display = '';
        _sniperConnFailures = 0;
      } else {
        _stopInFlight = false;
        input.disabled = false;
        if (modeGroup) {
          var radios = modeGroup.querySelectorAll('input[type="radio"]');
          for (var ri = 0; ri < radios.length; ri++) radios[ri].disabled = false;
        }
        capInput.disabled = false;
        if (riskInput) riskInput.disabled = false;
        onTradeModeChange();
        btn.disabled = false;
        btn.textContent = TRANSLATIONS['btn.run']?.[getLang()] || '▶ Run';
        btn.classList.remove('danger');
        sniperPollInterval = null;
        var statusEl = document.getElementById('sniper-status');
        if (statusEl) statusEl.style.display = 'none';
        var signalCardsEl = document.getElementById('sniper-signal-cards');
        if (signalCardsEl) { signalCardsEl.innerHTML = ''; signalCardsEl.style.display = 'none'; }
        _renderedSymbols = [];
      }
    }

    // ── Render sniper merged status indicator ──
    function _renderSniperStatus(state, label, pulseAge) {
      var el = document.getElementById('sniper-status');
      var dot = document.getElementById('sniper-status-dot');
      var lbl = document.getElementById('sniper-status-label');
      if (!el || !dot || !lbl) return;
      dot.classList.remove('connected', 'stale', 'disconnected');
      dot.classList.add(state || 'connected');
      lbl.textContent = label || t('status.connected');
      el.style.display = '';

      // Dot color gradient: teal → amber by pulse age
      // 0-120s teal, 120-420s transition, 420s+ amber
      // Colors match CSS: --accent-teal (#54a0a8) and --accent-amber (#c9953a)
      dot.style.background = '';
      if (state !== 'disconnected' && pulseAge != null) {
        var t = Math.max(0, Math.min((pulseAge - 120) / 300, 1.0));
        var TEAL = [84, 160, 168], AMBER = [201, 149, 58];
        var r = Math.round(TEAL[0] + (AMBER[0] - TEAL[0]) * t);
        var g = Math.round(TEAL[1] + (AMBER[1] - TEAL[1]) * t);
        var b = Math.round(TEAL[2] + (AMBER[2] - TEAL[2]) * t);
        dot.style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
      }
    }

    function _renderPulseHistory(container, history, symbol) {
      // Store latest data for ResizeObserver re-render
      container._lastHistory = history;
      container._lastSymbol = symbol;

      // Attach ResizeObserver once — responds instantly to window resize
      if (!container._resizeObserver) {
        var parent = container.parentElement;
        if (parent) {
          container._resizeObserver = new ResizeObserver(function () {
            if (container._lastHistory && container._lastHistory.length) {
              _renderPulseHistory(container, container._lastHistory, container._lastSymbol);
            }
          });
          container._resizeObserver.observe(parent);
        }
      }

      if (!history || !history.length) {
        container.innerHTML = '';
        return;
      }

      var BAR_W = 8;      // px per bar
      var BAR_GAP = 4;    // gap between bars
      var barStep = BAR_W + BAR_GAP;
      var maxBars = Math.max(1, Math.floor((container.offsetWidth + 4) / barStep));
      var slice = history.length > maxBars ? history.slice(-maxBars) : history;

      // Count how many bars we need
      var targetCount = 0;
      for (var i = 0; i < slice.length; i++) {
        var entry = slice[i];
        if (entry.symbols && entry.symbols[symbol]) targetCount++;
      }

      // Grow/shrink bar DOM to match — new bars get CSS bar-rise animation
      var existing = container.children;
      while (existing.length < targetCount) {
        container.insertAdjacentHTML('beforeend', '<div class="pulse-bar"></div>');
      }
      while (existing.length > targetCount) {
        existing[existing.length - 1].remove();
      }

      // Update each bar in place — CSS transitions survive
      var idx = 0;
      for (var i = 0; i < slice.length; i++) {
        var entry = slice[i];
        var s = entry.symbols && entry.symbols[symbol];
        if (!s) continue;

        var score = s.confluence_score || 0;
        var thr = s.threshold || 0;
        var heightPx = Math.max(1, Math.round(Math.min(score, 1.0) * 40));
        var bar = existing[idx++];

        bar.style.height = heightPx + 'px';
        bar.style.background = s.direction === 'BULLISH' ? 'var(--accent-green)' :
                               s.direction === 'BEARISH' ? 'var(--accent-red)' :
                               'var(--text-muted)';
        bar.style.opacity = (thr > 0 && score >= thr) ? '1.0' : '0.5';

        var timeLabel = '';
        if (entry.at) {
          var d = new Date(entry.at);
          if (!isNaN(d.getTime())) {
            timeLabel = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
          }
        }
        bar.dataset.tooltip = s.confluence_score.toFixed(2) + ' / ' + s.threshold.toFixed(2) + ' at ' + timeLabel;
      }
    }

    // ── Quantity decimal precision (shared by initial render and update) ──
    function _calcQtyDecimals(data) {
      return Math.min(100, Math.max(0, Math.ceil(-Math.log10(data.net_qty_tolerance || 0.0001))));
    }

    // ── Symbol state helpers ──
    function _getSymbolState(sd) {
      var nq = sd.net_qty || 0;
      var ao = sd.active_orders || 0;
      if (Math.abs(nq) > 0.0001 && ao > 0) return 'protected';
      if (Math.abs(nq) > 0.0001) return 'naked';
      if (ao > 0) return 'pending';
      return 'searching';
    }

    // ── Price lane: compute position values (shared by full-render and update) ──
    function _calcPriceLane(sd, decimals) {
      var nq = sd.net_qty || 0;
      var ao = sd.active_orders || 0;
      var isPending = Math.abs(nq) <= 0.0001 && ao > 0;
      var entry = sd.entry_price, tp = sd.tp_price, sl = sd.sl_price, cur = sd.current_price;
      if (!entry || !cur) return null;

      var hasRange = tp && sl && Math.abs(tp - sl) > 0.0001;
      var isNaked = ao === 0;
      var profitable = false;
      var atEntry = false;
      if (!isPending) {
        profitable = nq > 0 ? cur > entry : cur < entry;
        atEntry = hasRange && Math.abs(cur - entry) / Math.abs(tp - sl) < 0.001;
      }
      var dotColor, segColor;
      if (isPending) {
        dotColor = 'var(--accent-amber)';
        segColor = 'var(--accent-amber)';
      } else {
        dotColor = atEntry ? 'var(--accent-red)' : (profitable ? 'var(--accent-green)' : 'var(--accent-red)');
        segColor = profitable ? 'var(--accent-green)' : 'var(--accent-red)';
      }
      var pd = decimals != null ? decimals : 1;
      function fmt(v) { if (v == null || isNaN(v)) return ""; var s = v.toFixed(pd); if (s.indexOf('.') >= 0) s = s.replace(/\.?0+$/, ''); return s === "" || s === "-" || s === "-0" ? "0" : s; }

      if (hasRange && !isNaked) {
        var epRaw, cp, leftLabel, rightLabel;
        var isBuySide = nq > 0 || (isPending && tp > entry);
        if (isBuySide) {
          var r = tp - sl;
          epRaw = (entry - sl) / r * 100;
          cp = (cur - sl) / r * 100;
          leftLabel = fmt(sl);
          rightLabel = fmt(tp);
        } else {
          var r = sl - tp;
          epRaw = (entry - tp) / r * 100;
          cp = (cur - tp) / r * 100;
          leftLabel = fmt(tp);
          rightLabel = fmt(sl);
        }
        cp = Math.max(0, Math.min(100, cp));
        var segFrom = Math.max(0, Math.min(100, epRaw || 0));
        return {
          mode: 'protected',
          isPending: isPending,
          epOnScreen: epRaw >= 0 && epRaw <= 100,
          epRaw: epRaw,
          cp: cp,
          segStart: Math.min(segFrom, cp),
          segEnd: Math.max(segFrom, cp),
          segColor: segColor,
          dotColor: dotColor,
          leftLabel: leftLabel,
          rightLabel: rightLabel,
          fmtEntry: fmt(entry),
          fmtCur: fmt(cur),
          isNaked: false,
          pendingCls: isPending ? ' pending' : '',
        };
      }

      return {
        mode: 'naked',
        isPending: isPending,
        epOnScreen: true,
        epRaw: 30,
        cp: 70,
        segStart: 30,
        segEnd: 70,
        segColor: segColor,
        dotColor: dotColor,
        leftLabel: '',
        rightLabel: '',
        fmtEntry: fmt(entry),
        fmtCur: fmt(cur),
        isNaked: true,
        pendingCls: isPending ? ' pending' : '',
      };
    }

    function _renderPriceLane(sd, tradeOn, decimals) {
      if (!tradeOn) return '';
      var nq = sd.net_qty || 0;
      var ao = sd.active_orders || 0;
      if (Math.abs(nq) <= 0.0001 && ao === 0) return '';
      var vals = _calcPriceLane(sd, decimals);
      if (!vals) return '';

      if (vals.mode === 'protected') {
        var epHtml = vals.epOnScreen
          ? '<span class="pl-dot entry" style="left:' + vals.epRaw + '%" data-tooltip="Entry ' + vals.fmtEntry + '"></span>'
          : '';
        return '<div class="price-lane">'
          + '<span class="pl-label">' + vals.leftLabel + '</span>'
          + '<div class="pl-track">'
          + '<span class="pl-segment' + vals.pendingCls + '" style="left:' + vals.segStart + '%;width:' + (vals.segEnd - vals.segStart) + '%;background:' + vals.segColor + '"></span>'
          + epHtml
          + '<span class="pl-tip" style="left:' + vals.cp + '%" data-tooltip="Current ' + vals.fmtCur + '"><span class="pl-dot current' + vals.pendingCls + '" style="--dot-color:' + vals.dotColor + '"></span></span>'
          + '</div>'
          + '<span class="pl-label">' + vals.rightLabel + '</span>'
          + '</div>';
      }

      return '<div class="price-lane naked">'
        + '<div class="pl-track">'
        + '<span class="pl-segment' + vals.pendingCls + '" style="left:30%;width:40%;background:' + vals.segColor + '"></span>'
        + '<span class="pl-dot entry" style="left:30%" data-tooltip="Entry ' + vals.fmtEntry + '"></span>'
        + '<span class="pl-tip" style="left:70%" data-tooltip="Current ' + vals.fmtCur + '"><span class="pl-dot current' + vals.pendingCls + '" style="--dot-color:' + vals.dotColor + '"></span></span>'
        + '</div>'
        + '</div>';
    }

    // ── Price lane: incremental DOM update (CSS transitions fire on existing elements) ──
    function _updatePriceLane(lane, sd, decimals) {
      var vals = _calcPriceLane(sd, decimals);
      if (!vals) return;

      // Mode transition (protected↔naked): DOM structure differs in label presence.
      var wasNaked = lane.classList.contains('naked');
      if (wasNaked !== vals.isNaked) return 'mode_changed';

      var tip = lane.querySelector('.pl-tip');
      if (tip) {
        tip.style.left = vals.cp + '%';
        tip.dataset.tooltip = 'Current ' + vals.fmtCur;
        var cd = tip.querySelector('.pl-dot.current');
        if (cd) {
          cd.style.setProperty('--dot-color', vals.dotColor);
          cd.classList.toggle('pending', vals.isPending);
        }
      }

      var seg = lane.querySelector('.pl-segment');
      if (seg) {
        seg.style.left = vals.segStart + '%';
        seg.style.width = (vals.segEnd - vals.segStart) + '%';
        seg.style.background = vals.segColor;
        seg.classList.toggle('pending', vals.isPending);
      }

      var entryDot = lane.querySelector('.pl-dot.entry');
      if (entryDot) {
        entryDot.style.display = (vals.mode === 'protected' && !vals.epOnScreen) ? 'none' : '';
        entryDot.style.left = (vals.mode === 'protected' ? vals.epRaw : 30) + '%';
        entryDot.dataset.tooltip = 'Entry ' + vals.fmtEntry;
      }

      var labels = lane.querySelectorAll('.pl-label');
      if (labels.length >= 2) {
        labels[0].textContent = vals.leftLabel || '';
        labels[1].textContent = vals.rightLabel || '';
      }

      lane.classList.toggle('naked', vals.isNaked);
    }

    // ── Signal Card: build full HTML for a symbol (first render / add) ──
    function _buildSignalCardHtml(sd, stripped, data) {
      var tradeOn = data.trade_enabled;
      var qtyDecimals = _calcQtyDecimals(data);
      var state = _getSymbolState(sd);
      var html = '';

      html += '<div class="signal-card" id="signal-card-' + stripped + '">';
      html += '<div class="signal-card-header">';
      html += '<span class="signal-card-symbol">' + stripped + '</span>';

      // Status + direction — always present, visibility toggled
      html += '<span class="sc-status" style="display:' + (tradeOn && state === 'pending' ? '' : 'none') + '"> PENDING</span>';
      var dir = sd.net_qty > 0 ? 'LONG' : 'SHORT';
      var qty = Math.abs(sd.net_qty).toFixed(qtyDecimals);
      html += '<span class="sc-direction ' + dir.toLowerCase() + '" style="display:' + (tradeOn && (state === 'protected' || state === 'naked') ? '' : 'none') + '"><span class="sc-dir-label">' + dir + '</span><span class="sc-dir-qty">' + qty + '</span></span>';

      // Cooldown
      html += '<span class="signal-card-cooldown" style="display:' + (sd.cooldown_active && sd.cooldown_remaining_seconds > 0 ? '' : 'none') + '">❄ ' + formatElapsed(sd.cooldown_remaining_seconds || 0) + '</span>';

      html += '</div>';  // close header

      // Price lane — wrapper always present, visibility toggled
      var plHtml = _renderPriceLane(sd, tradeOn, qtyDecimals);
      html += '<div class="price-lane-wrapper" style="display:' + (plHtml ? '' : 'none') + '">' + (plHtml || '') + '</div>';

      // Pulse history bar chart
      html += '<div class="pulse-history-row" id="pulse-hist-' + stripped + '"></div>';

      // Compact signal strip (10 blocks)
      html += '<div class="signal-strip">';
      var allSignals = sd.all_signals || [];
      for (var j = 0; j < allSignals.length; j++) {
        var sig = allSignals[j];
        var sdir = sig.is_active ? sig.direction : 'NEUTRAL';
        var hasScore = sig.score > 0;
        var opacity = Math.min(0.5 + sig.score * 0.5, 1.0);
        html += '<div class="signal-strip-block' + (hasScore ? ' live' : '') + '"' +
          ' style="opacity:' + opacity + ';background:' +
          (sdir === 'BULLISH' ? 'var(--accent-green)' :
           sdir === 'BEARISH' ? 'var(--accent-red)' :
           'var(--badge-gray-bg)') + '"' +
          ' data-tooltip="' + sig.type + '">' +
          '</div>';
      }
      html += '</div>';

      html += '</div>';  // close signal-card
      return html;
    }

    // ── Signal Card: update values in-place for an existing card ──
    function _updateSignalCard(data, sd, stripped, sym) {
      var card = document.getElementById('signal-card-' + stripped);
      if (!card) return;

      var tradeOn = data.trade_enabled;
      var qtyDecimals = _calcQtyDecimals(data);
      var state = _getSymbolState(sd);

      // Status text
      var statusEl = card.querySelector('.sc-status');
      var dirEl = card.querySelector('.sc-direction');
      if (statusEl) {
        statusEl.style.display = tradeOn && state === 'pending' ? '' : 'none';
      }
      if (dirEl) {
        var hasPos = tradeOn && (state === 'protected' || state === 'naked');
        dirEl.style.display = hasPos ? '' : 'none';
        if (hasPos) {
          var dirLabel = sd.net_qty > 0 ? 'LONG' : 'SHORT';
          var qty = Math.abs(sd.net_qty).toFixed(qtyDecimals);
          dirEl.className = 'sc-direction ' + dirLabel.toLowerCase();
          dirEl.innerHTML = '<span class="sc-dir-label">' + dirLabel + '</span><span class="sc-dir-qty">' + qty + '</span>';
        }
      }

      // Cooldown
      var cooldownEl = card.querySelector('.signal-card-cooldown');
      if (cooldownEl) {
        if (sd.cooldown_active && sd.cooldown_remaining_seconds > 0) {
          cooldownEl.style.display = '';
          cooldownEl.textContent = '❄ ' + formatElapsed(sd.cooldown_remaining_seconds);
        } else {
          cooldownEl.style.display = 'none';
        }
      }

      // Price lane — incremental DOM update
      var plWrapper = card.querySelector('.price-lane-wrapper');
      if (plWrapper) {
        var nq = sd.net_qty || 0;
        var ao = sd.active_orders || 0;
        var hasLane = tradeOn && (Math.abs(nq) > 0.0001 || ao > 0) && sd.entry_price && sd.current_price;
        if (!hasLane) {
          plWrapper.style.display = 'none';
        } else {
          plWrapper.style.display = '';
          var lane = plWrapper.querySelector('.price-lane');
          if (!lane) {
            // First render — full HTML build
            plWrapper.innerHTML = _renderPriceLane(sd, tradeOn, qtyDecimals);
          } else {
            // Incremental DOM mutation — CSS transitions fire on existing elements
            // Falls back to full re-render on protected↔naked mode transition
            if (_updatePriceLane(lane, sd, qtyDecimals) === 'mode_changed') {
              plWrapper.innerHTML = _renderPriceLane(sd, tradeOn, qtyDecimals);
            }
          }
        }
      }

      // Signal strip blocks
      var allSignals = sd.all_signals || [];
      var blocks = card.querySelectorAll('.signal-strip-block');
      for (var j = 0; j < blocks.length; j++) {
        var sig = allSignals[j];
        if (!sig) { blocks[j].style.display = 'none'; continue; }
        blocks[j].style.display = '';
        var sdir = sig.is_active ? sig.direction : 'NEUTRAL';
        var hasScore = sig.score > 0;
        blocks[j].style.opacity = Math.min(0.5 + sig.score * 0.5, 1.0);
        blocks[j].style.background = sdir === 'BULLISH' ? 'var(--accent-green)' :
                                     sdir === 'BEARISH' ? 'var(--accent-red)' :
                                     'var(--badge-gray-bg)';
        blocks[j].classList.toggle('live', hasScore);
        blocks[j].dataset.tooltip = sig.type;
      }

      // Pulse bars
      var histEl = card.querySelector('.pulse-history-row');
      if (histEl) _renderPulseHistory(histEl, data.pulse_history || [], sym || stripped);
    }

    function _renderSignalCards(data) {
      var container = document.getElementById('sniper-signal-cards');
      if (!container) return;

      var signals = data.pulse_signals;
      if (!signals || !signals.symbols || !Object.keys(signals.symbols).length) {
        container.style.display = 'none';
        return;
      }

      var symbols = data.symbols || Object.keys(signals.symbols);
      container.style.display = '';

      // \u2500\u2500 First time: full HTML build \u2500\u2500
      if (!_renderedSymbols.length) {
        var html = '';
        for (var i = 0; i < symbols.length; i++) {
          var sym = symbols[i];
          var sd = signals.symbols[sym];
          if (!sd) continue;
          var stripped = sym.replace(new RegExp(QUOTE + '$', 'i'), '');
          html += _buildSignalCardHtml(sd, stripped, data);
        }
        container.innerHTML = html;

        var historyData = data.pulse_history || [];
        for (var k = 0; k < symbols.length; k++) {
          var s2 = symbols[k];
          var histEl = document.getElementById('pulse-hist-' + s2.replace(new RegExp(QUOTE + '$', 'i'), ''));
          if (histEl) _renderPulseHistory(histEl, historyData, s2);
        }
        _renderedSymbols = symbols.slice();
        return;
      }

      // \u2500\u2500 Subsequent: diff symbols, add / remove cards, incremental update \u2500\u2500
      var currentSymbols = symbols.slice();
      var oldSet = {}, newSet = {};
      for (var i = 0; i < _renderedSymbols.length; i++) oldSet[_renderedSymbols[i]] = true;
      for (var i = 0; i < currentSymbols.length; i++) newSet[currentSymbols[i]] = true;

      // Remove vanished symbols
      for (var i = 0; i < _renderedSymbols.length; i++) {
        if (!newSet[_renderedSymbols[i]]) {
          var card = document.getElementById('signal-card-' + _renderedSymbols[i].replace(new RegExp(QUOTE + '$', 'i'), ''));
          if (card) card.remove();
        }
      }

      // Add new symbols
      var historyData = data.pulse_history || [];
      for (var i = 0; i < currentSymbols.length; i++) {
        if (!oldSet[currentSymbols[i]]) {
          var sym = currentSymbols[i];
          var sd = signals.symbols[sym];
          if (!sd) continue;
          var stripped = sym.replace(new RegExp(QUOTE + '$', 'i'), '');
          container.insertAdjacentHTML('beforeend', _buildSignalCardHtml(sd, stripped, data));
          var histEl = document.getElementById('pulse-hist-' + stripped);
          if (histEl) _renderPulseHistory(histEl, historyData, sym);
        }
      }

      // Incremental update for all symbols
      for (var i = 0; i < currentSymbols.length; i++) {
        var sym = currentSymbols[i];
        var sd = signals.symbols[sym];
        if (!sd) continue;
        var stripped = sym.replace(new RegExp(QUOTE + '$', 'i'), '');
        _updateSignalCard(data, sd, stripped, sym);
      }

      _renderedSymbols = currentSymbols;
    }


    async function checkSniperStatus() {
      try {
        const resp = await fetch(apiUrl('/api/sniper/status'));
        const data = await resp.json();

        // Connection healthy — reset failure counter
        _sniperConnFailures = 0;
        _lastSniperPulseAt = Date.now();

        if (data.running) {
          if (!_stopInFlight) {
            updateSniperUI('running');
          }
          var pulseAge = data.pulse_seconds != null ? data.pulse_seconds : (data.elapsed_seconds || 0);
          _renderSniperStatus('connected', t('status.connected') + ' \u00b7 ' + formatElapsed(pulseAge), pulseAge);
          const progressContainer = document.getElementById('sniper-progress-container');

          // Signal cards — per-symbol pulse signal confluence
          _renderSignalCards(data);

          // Session progress — shown below status line when AI reasoning is active
          if (data.active_session && data.active_session.progress) {
            _sniperHadActiveSession = true;
            if (!sniperProgress) {
              sniperProgress = new SessionProgress(progressContainer, {
                context: 'sniper'
              });
            }
            var p = data.active_session.progress;
            p._symbol = data.active_session.symbol || '';
            p._triggered_at = data.active_session.triggered_at || '';
            sniperProgress.update(p);
          } else {
            if (_sniperHadActiveSession) {
              _sniperHadActiveSession = false;
              if (typeof loadActive === 'function') { loadActive(); }
            }
            if (sniperProgress) {
              sniperProgress.destroy();
              sniperProgress = null;
            }
            progressContainer.innerHTML = '';
          }
        } else {
          if (sniperPollInterval) {
            clearInterval(sniperPollInterval);
            sniperPollInterval = null;
            if (sniperProgress) { sniperProgress.destroy(); sniperProgress = null; }
            document.getElementById('sniper-status').style.display = 'none';
            document.getElementById('sniper-progress-container').innerHTML = '';
            updateSniperUI('idle');
          }
        }
      } catch (e) {
        _sniperConnFailures++;
        var pulseAge = _lastSniperPulseAt > 0 ? Math.round((Date.now() - _lastSniperPulseAt) / 1000) : 0;
        var ageLabel = pulseAge > 0 ? ' \u00b7 ' + formatElapsed(pulseAge) : '';
        if (_sniperConnFailures >= 3) {
          _renderSniperStatus('disconnected', t('status.disconnected') + ageLabel);
        } else {
          _renderSniperStatus('stale', t('status.retrying') + ageLabel, pulseAge);
        }
      }
    }

    async function triggerSniper() {
      const container = document.getElementById('sniper-progress-container');
      const btn = document.getElementById('sniper-btn');

      // Disable immediately to prevent double-click races in both START and STOP paths
      btn.disabled = true;
      btn.textContent = '…';

      // Check if currently running — if so, STOP
      if (sniperPollInterval) {
        _stopInFlight = true;
        try {
          const resp = await fetch(apiUrl('/api/sniper/stop'), { method: 'POST' });
          if (!resp.ok) {
            const err = await resp.json();
            container.innerHTML = '<div class="run-status-box run-error" style="display:block">\u2717 ' +
              (err.detail || t('error.stop_failed')) + '</div>';
            btn.disabled = false;
            btn.textContent = TRANSLATIONS['btn.stop']?.[getLang()] || '⏹ Stop';
            _stopInFlight = false;
            return;
          }
        } catch (e) {
          container.innerHTML = '<div class="run-status-box run-error" style="display:block">\u2717 ' + t('error.request_failed') + '</div>';
          btn.disabled = false;
          btn.textContent = TRANSLATIONS['btn.stop']?.[getLang()] || '⏹ Stop';
          _stopInFlight = false;
          return;
        }
        document.getElementById('sniper-status').style.display = 'none';
        var signalCardsEl = document.getElementById('sniper-signal-cards');
        if (signalCardsEl) { signalCardsEl.innerHTML = ''; signalCardsEl.style.display = 'none'; }
        if (sniperProgress) { sniperProgress.destroy(); sniperProgress = null; }
        return;
      }

      // START — validate CSV symbol prefixes
      const input = document.getElementById('sniper-symbol');
      const inputGroup = document.getElementById('sniper-symbol-group');
      const raw = input.value.trim();

      const parts = raw.split(',').map(s => s.trim().toUpperCase()).filter(Boolean);

      if (parts.length === 0) {
        if (inputGroup) { inputGroup.classList.add('has-error'); inputGroup.setAttribute('data-error', t('err.enter_symbol')); }
        input.focus();
        updateSniperUI('idle');
        return;
      }
      for (const p of parts) {
        if (p.length < 2 || !/^[A-Z0-9]+$/.test(p)) {
          if (inputGroup) { inputGroup.classList.add('has-error'); inputGroup.setAttribute('data-error', '"' + p + '" ' + t('err.invalid_symbol')); }
          input.focus();
          updateSniperUI('idle');
          return;
        }
      }
      const symbolPrefix = parts.join(',');

      const trade = _isTradeMode();
      const capRaw = document.getElementById('sniper-cap').value.trim();
      const cap = capRaw ? parseFloat(capRaw) : null;
      const riskRaw = document.getElementById('sniper-risk').value.trim();
      // risk_per_trade: UI shows as percentage (0.5 = 0.5%), stored as decimal (0.005)
      const riskPct = riskRaw ? parseFloat(riskRaw) : null;
      const riskDecimal = riskPct !== null ? riskPct / 100 : null;

      if (cap !== null && (isNaN(cap) || cap <= 0)) {
        const capInput = document.getElementById('sniper-cap');
        const capGroup = capInput.closest('.input-group');
        capInput.classList.add('bt-field-error');
        if (capGroup) { capGroup.classList.add('has-error'); capGroup.setAttribute('data-error', t('err.cap_positive')); }
        document.getElementById('sniper-cap').focus();
        updateSniperUI('idle');
        return;
      }
      if (riskPct !== null && (isNaN(riskPct) || riskPct <= 0 || riskPct > 1)) {
        const riskInput = document.getElementById('sniper-risk');
        const riskGroup = riskInput.closest('.input-group');
        riskInput.classList.add('bt-field-error');
        if (riskGroup) { riskGroup.classList.add('has-error'); riskGroup.setAttribute('data-error', t('err.risk_range')); }
        document.getElementById('sniper-risk').focus();
        updateSniperUI('idle');
        return;
      }

      try {
        const resp = await fetch(apiUrl('/api/sniper/start'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            symbol_prefix: symbolPrefix,
            trade: trade,
            balance: cap,
            risk_per_trade: riskDecimal,
          }),
        });

        if (!resp.ok) {
          const err = await resp.json();
          container.innerHTML = '<div class="run-status-box run-error" style="display:block">\u2717 ' +
            (err.detail || t('error.request_failed')) + '</div>';
          updateSniperUI('idle');
          return;
        }

        updateSniperUI('running');
        sniperPollInterval = setInterval(checkSniperStatus, 2000);
        checkSniperStatus();
      } catch (e) {
        container.innerHTML = '<div class="run-status-box run-error" style="display:block">\u2717 ' + t('error.request_failed') + '</div>';
        updateSniperUI('idle');
      }
    }


    function timeRemainingClass(seconds) {
      if (seconds > 43200) return 'time-safe';       // > 12h
      if (seconds > 3600) return 'time-warning';      // 1-12h
      return 'time-critical';                          // < 1h
    }

    function timeRemainingRowClass(seconds) {
      if (seconds > 43200) return 'row-safe';
      if (seconds > 3600) return 'row-warn';
      return 'row-critical';
    }

    {% if "view_active_sessions" in permissions %}
    async function loadActive() {
      const tbody = document.getElementById('active-body');
      const countEl = document.getElementById('active-count');

      // Deferred loading indicator: only show if fetch takes >200ms
      const loadingTimer = setTimeout(() => {
        tbody.innerHTML = '<tr><td colspan="13" class="loading">' +
          (TRANSLATIONS['msg.loading_sessions']?.[getLang()] || 'Loading sessions...') + '</td></tr>';
      }, 200);

      try {
        const url = apiUrl('/api/live-sessions');
        const resp = await fetch(url);
        const data = await resp.json();
        const sessions = data.active || [];
        clearTimeout(loadingTimer);

        countEl.textContent = `${sessions.length} ${t('fmt.records')}`;

        if (!sessions.length) {
          tbody.innerHTML = '<tr><td colspan="13" class="empty">' +
            (TRANSLATIONS['msg.no_records_active']?.[getLang()] || 'No records — all clear') + '</td></tr>';
          return sessions.length;
        }

        tbody.innerHTML = sessions.map(s => {
          const isNeutral = s.opinion === 'NEUTRAL';
          const urgencyCls = isNeutral ? '' : timeRemainingClass(s.time_remaining_seconds);
          const rowCls = isNeutral ? '' : timeRemainingRowClass(s.time_remaining_seconds);
          return `<tr class="${rowCls}">
        <td><strong>${s.symbol}</strong></td>
        <td>${formatLocalTimeShort(s.observed_at)}</td>
        <td>${opinionBadge(s.opinion)}</td>
        <td>${s.confidence != null ? s.confidence.toFixed(0) + '%' : '&mdash;'}</td>
        <td class="mono">${isNeutral ? '&mdash;' : formatPrice(s.entry)}</td>
        <td class="mono">${isNeutral ? '&mdash;' : formatPrice(s.take_profit)}</td>
        <td class="mono">${isNeutral ? '&mdash;' : formatPrice(s.stop_loss)}</td>
        <td>${isNeutral ? '&mdash;' : (s.rr_ratio != null ? s.rr_ratio.toFixed(2) : '&mdash;')}</td>
        <td>${s.projected_waiting_hours != null ? s.projected_waiting_hours + 'h' : '&mdash;'}</td>
        <td>${s.projected_holding_hours != null ? s.projected_holding_hours + 'h' : '&mdash;'}</td>
        <td><span class="time-remaining ${urgencyCls}">${s.time_remaining}</span></td>
        <td><span class="text-muted">${s.version || '&mdash;'}</span></td>
        <td><a href="/sessions/${encodeURIComponent(s.filename)}" class="btn-sm">${TRANSLATIONS['btn.view']?.[getLang()] || 'View'}</a></td>
      </tr>`;
        }).join('');
        return sessions.length;

      } catch (e) {
        clearTimeout(loadingTimer);
        tbody.innerHTML = '<tr><td colspan="13" class="error">' +
          (TRANSLATIONS['msg.load_failed']?.[getLang()] || 'Failed to load records') + '</td></tr>';
        throw e;
      }
    }


    // ── Re-render on language switch ──
    document.addEventListener('langchange', function () {
      if (typeof loadActive === 'function') loadActive();
    });

    // ── Reload button (show ✓ briefly, then revert) ──
    async function refreshActive() {
      const btn = document.getElementById('refresh-active-btn');
      const status = document.getElementById('refresh-active-status');
      btn.disabled = true;
      btn.textContent = TRANSLATIONS['btn.refreshing']?.[getLang()] || '⟳ Refreshing...';
      status.style.display = 'none';

      try {
        const count = await loadActive();
        status.textContent = `✓ ${count}`;
        status.className = 'feedback-inline feedback-ok';
      } catch {
        status.textContent = '⚠';
        status.className = 'feedback-inline feedback-err';
      }
      status.style.display = 'inline';
      btn.style.display = 'none';
      setTimeout(() => {
        status.style.display = 'none';
        btn.style.display = '';
        btn.disabled = false;
        btn.textContent = TRANSLATIONS['btn.refresh']?.[getLang()] || '⟳ Refresh';
      }, 2000);
    }

    loadActive();
    {% endif %}
  </script>
