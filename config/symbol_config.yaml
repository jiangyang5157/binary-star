# ═══════════════════════════════════════════════════════════════════════════
# SYMBOL CONFIG — Per-instrument trading parameters and strategy overrides
# ═══════════════════════════════════════════════════════════════════════════
# Each symbol block defines execution precision AND optional overrides.
# Overrides deep-merge on top of the corresponding base config section at
# resolve time. The override structure mirrors the original config structure
# exactly (e.g., overrides.regime_parameters matches strategy_config.yaml's
# regime_parameters section).
#
# Config resolution order: base config + symbol.overrides → resolved
# Evolution patching: overrides first, then base config

XAUTUSDT:
  precision_qty: 3
  precision_price: 1
  min_order_qty: 0.01
  sl_slippage_buffer: 1

  overrides: 
    trade_management:
      net_qty_tolerance: 0.0001
    regime_parameters:
      structural:
        breakout_frontrun_atr: 0.2
      micro_sentiment:
        cvd_intensity_threshold: 0.18   # 从 0.25 降下来。XAUT |CVD| P75=0.15, P90=0.18，0.25 已是 P95 太保守。对齐 P85 作为"显著"基准
        cvd_intensity_extreme: 0.36   # 统一到低簇边界。XAUT |CVD| 双峰：低簇 0.07-0.36 / 高簇 0.62-0.74。0.36 正好卡边界，对齐 sniper cvd_extreme_threshold。
      risk:
        min_rr_ranging: 1.1
        min_rr_trending: 1.3
        stop_loss_buffer_min: 1.5
    sniper:
      signal_stack:
        trigger_threshold: 0.38   # 从 base 0.34 调高，仅 XAUT。过滤弱合流 (<0.38)，squeeze 等效 0.29。
        thresholds:
          cvd_divergence_tick_delta: 0.18
          cvd_extreme_threshold: 0.36   # 从 0.22 调高。XAUT |CVD| 低簇顶在 0.36，0.36 正好卡边界。不触发低簇，高簇(0.62+)全捕捉。比 cvd_intensity_extreme(0.40) 松 0.04，medium 区间只触 momentum 不触 absorption。
          large_trade_zscore: 1.8   # 从 1.5 提到 1.8：抑制单信号 solo-wake。需配合 CVD 才能过门槛。
        cooldown:
          stacked_break_count: 4   # 从 3 提到 4：memory 唤醒不应轻易打破冷却。

BTCUSDT:
  precision_qty: 4           # Decimal places for order quantity
  precision_price: 1         # Decimal places for order price
  min_order_qty: 0.001       # Fallback safety quantity if delta is zero
  sl_slippage_buffer: 10.0   # SL Limit offset from Trigger

  overrides:
    trade_management:
      net_qty_tolerance: 0.00001
    regime_parameters:
      trend:
        trend_intensity_min_expansion: 0.12 # 波动扩张期间提高趋势强度门槛，过滤假突破噪声。
      volume:
        vacuum_risk_score: 0.5
      imbalance:
        long_short_imbalance_ratio: 2.0
      structural:
        structural_buffer_atr: 1.0
        breakout_frontrun_atr: 0.12
        max_entry_distance_atr: 0.8
      micro_sentiment:
        cvd_intensity_threshold: 0.14   # 0.08-0.12
        cvd_intensity_extreme: 0.16     # 0.14-0.18
      risk:
        min_rr_ranging: 1.1
        min_rr_trending: 1.3
        stop_loss_buffer_min: 1.4
    sniper:
      signal_stack:
        thresholds:
          cvd_divergence_tick_delta: 0.25 # BTC 波动大，稍宽避免误触发
          cvd_extreme_threshold: 0.18 # 适配 BTC 高流动性低噪声
          large_trade_zscore: 2.0 # BTC 实测 Z=3-4，经常触发，够了
        cooldown:
          stacked_break_count: 4   # 提到 4 防止 ranging 40min cooldown 形同虚设。
