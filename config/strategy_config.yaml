# =============================================================================
# STRATEGY OPERATING SYSTEM (Binary Star Edition)
# =============================================================================
# PRIME DIRECTIVE: Structural Convexity.
# Small losses are acceptable, large wins are targeted, but 
# LARGE DRAWDOWNS ARE ABSOLUTELY PROHIBITED.
# =============================================================================

strategy_intent: "Asymmetric Liquidity Hunting & Dynamic Regime Adaptation. PRIME
  DIRECTIVE: Structural Convexity - Small losses are acceptable, small/large wins
  are targeted, but LARGE DRAWDOWNS ARE ABSOLUTELY PROHIBITED. Every execution must
  possess an audit-grade mathematical edge and absolute structural invalidation."

analysis_window:
  # Macro Context: Structural landscape (Trend detection and Daily range).
  macro_context:
    time_interval: 1h
    lookback_candles: 336
  # Micro Context: Tactical execution (Entry signals and Wick analysis).
  micro_context:
    time_interval: 15m
    lookback_candles: 192
  funding_rate_lookback_hours: 24.0
  order_flow_lookback_hours: 1.0
  trend_intensity_lookback_hours: 24.0
  volatility_intensity_lookback_hours: 24

regime_parameters:
  # --- Trend & Momentum Vectors (Regime Detection) ---
  # Minimum vector strength to classify as 'Trending'. Range [0, 1].
  trend_intensity_threshold: 0.95
  # Threshold for 'High Conviction' trends where aggressive participation is enabled.
  trend_intensity_strong: 0.5
  # Noise filter (floor) in ATR units to ignore micro-volatility.
  noise_filter_atr_floor: 0.2
  # Minimum trend intensity required to justify directional trades during volatility expansion.
  trend_intensity_min_expansion: 0.15

  # --- Volatility & Risk Fractals (Noise Management) ---
  # Ratio of current ATR vs Macro Baseline. >1.3 indicates volatility expansion.
  volatility_baseline_ratio: 1.3
  # Threshold where the system switches to 'Defensive' buffers to avoid stop-hunts.
  volatility_expansion_ratio: 1.5
  # Threshold for 'Chaos' regimes where market topography becomes unreliable.
  volatility_extreme_ratio: 2.0

  # --- Physical Topography & Volume Confluence ---
  # Volume surge multiplier relative to the 21-period Moving Average.
  volume_surge_vs_ma_ratio: 1.5
  # Minimum required volume participation ratio (Baseline).
  min_volume_participation_ratio: 1.0
  # Threshold to confirm institutional presence (High Participation).
  volume_participation_threshold: 1.5
  # Required ratio of Long/Short liquidation or volume delta for bias confirmation.
  long_short_imbalance_ratio: 1.8
  # Threshold for extreme retail short concentration (Reciprocal of imbalance ratio).
  short_heavy_imbalance_ratio: 0.55
  # Confluence power of POC (Point of Control) relative to other nodes.
  poc_confluence_strength: 0.9
  # The 'Magnetic Field' range of the POC in ATR units.
  poc_gravity_atr_distance: 3.0
  # Absolute maximum ATR extension from POC before mean-reversion gravity becomes mandatory.
  poc_extreme_extension_atr: 4.0
  # Distance within which the POC acts as a hard exit target/magnet.
  poc_magnet_atr_threshold: 2.0
  # Range width in ATR units used to classify 'Balanced' vs 'Trending' regimes.
  ranging_width_atr: 2.0
  # Volume multiplier required to override the POC's gravitational pull.
  gravity_volume_override_ratio: 1.5
  # Protective margin behind structural levels to filter 'Wick Exhaustion'.
  structural_buffer_atr: 0.05
  # Proximity to VAH/VAL required for high-probability entries.
  structural_proximity_threshold: 0.5
  # Maximum allowed drift of the current price from the historical Anchor price.
  anchor_drift_threshold: 3.0

  # --- Micro-Sentiment & Exhaustion Indicators ---
  # Score threshold for 'Volume Vacuums' where liquidity is non-existent.
  vacuum_risk_score: 0.3
  # Degree of wick skewness required to signal buyer/seller exhaustion.
  wick_skewness_exhaustion: 0.6
  wick_skewness_momentum_bullish: 0.8
  wick_skewness_momentum_bearish: 0.2
  # Normalized CVD intensity (Net_Taker / Total_Volume) for divergence.
  cvd_intensity_threshold: 0.1
  # Extreme single-sided imbalance that triggers immediate absorption audit.
  cvd_intensity_extreme: 0.35
  # Absolute funding threshold for Retail Squeeze detection.
  funding_extreme_threshold: 0.0005
  # Minimum compression required to signal an impending squeeze.
  squeeze_threshold: 1.0
  # Probability floor for squeeze audit validation.
  squeeze_audit_threshold: 0.85

  # --- Execution Safety & Friction Buffers ---
  # Buffer added to breakout entries to filter 'False Breakouts'.
  breakout_buffer_atr: 0.2
  # Aggressive offset for 'Front-Running' institutional liquidity clusters.
  breakout_frontrun_atr: 0.45
  # Minimum acceptable Risk-Reward ratio for ranging (Mean Reversion) cycles.
  min_rr_ranging: 1.0
  min_rr_trending: 1.2

audit_review:
  # --- Forensic Evaluation Parameters (v6.11 Hardened) ---
  # Fidelity of the sampling window for forensic replay (Forensic Resolution).
  forensic_resolution: 1m
  # ATR threshold to classify an unfilled order as a 'Near Miss' (Physical Redline).
  unfilled_proximity_atr_limit: 0.1
  # ATR threshold for missed moves that trigger a catastrophic failure audit.
  missed_opportunity_atr_threshold: 2.0
  # Price % move threshold for catastrophic missed opportunities.
  catastrophic_miss_pct_threshold: 3.0
  # MAE stress thresholds (percentage of ATR) for performance tiering.
  mae_stress_thresholds:
    pinpoint: 20.0
    standard: 50.0
    luck: 80.0
  # --- Market Friction Modeling ---
  # Ideal floor for slippage (5.0 bps = 0.05%).
  base_slippage_bps: 5.0
  # Max penalty for liquidity vacuums (50.0 bps = 0.50%).
  max_slippage_bps: 50.0

topography_parameters:
  # --- Volume Profile Engine ---
  # The % of volume defined as the 'Value Area' (Standard: 70%).
  volume_profile_value_area_width: 0.75
  # Resolution of the price histogram.
  volume_profile_price_bucket_count: 300
  # --- Strategic Indicator Smoothing ---
  # Period for trend detection (EMA).
  exponential_moving_average_period: 21
  # Period for smoothing volume and volatility participation.
  volume_moving_average_period: 21

  # --- Structural Node Detection ---
  # Max number of HVN (High Volume Nodes) to track as magnets.
  max_high_volume_node_count: 3
  # Max number of LVN (Low Volume Nodes) to track as rejection barriers.
  max_low_volume_node_count: 3
  # Probability threshold for detecting a structural High Volume Node.
  high_volume_node_detection_threshold: 0.15
  # Probability threshold for detecting a structural Low Volume Node.
  low_volume_node_detection_threshold: 0.05
  # Minimum gap required to distinguish two separate structural nodes.
  min_price_gap_between_nodes: 50
  top_structural_node_count: 3

  # --- Technical Sensors (Physics Math) ---
  average_true_range_period: 21
  bollinger_bands_period: 21
  bollinger_bands_std_dev: 2.0
  keltner_channels_period: 21
  keltner_channels_multiplier: 1.5
  wick_skewness_period: 3
  wick_skew_fallback: 0.5
  # Fallback distance in ATR units used when no structural nodes are detected.
  default_structural_distance_atr: 5.0

  # --- Liquidity Magnet (Liquidation Clusters) ---
  # Number of forced-liquidation clusters to analyze simultaneously.
  max_liquidation_clusters: 3
  # Max historical liquidation events to fetch per cycle.
  max_liquidation_events_to_fetch: 50
  max_liquidation_events_for_context: 10
  # Proximity (in ATR units) required to treat a cluster as a single magnet.
  liquidation_cluster_atr_multiplier: 0.25
  liquidation_cluster_fallback_percentage: 0.005

binary_star:

  # The shared 'Sovereign Intelligence' model.
  # gemini-flash-latest, gemini-3.1-pro-preview
  model: gemini-flash-latest
  # Root instructions for the adversarial debate.
  system_instruction: src/agent/prompts/binary_star.md
  # Maximum rounds of debate before forced consensus or surrender.
  max_rounds: 2

  session:
    role_definition_prompt: src/agent/prompts/session.md
    model_temperature: 0.7
    # Minimum required ATR drift to justify an entry.
    min_trade_velocity: 0.4
    # Hard safety boundaries for stop-loss placements.
    stop_loss_buffer_min: 1.25
    stop_loss_buffer_max: 2.5
    score_confidence_base: 80
    # Linear decay per Critic veto. STRICT Formula: decay_min + (skepticism / 100) * (decay_max - decay_min)
    score_confidence_decay_min: 5
    score_confidence_decay_max: 20
    # Bonus awarded for resolving [TERMINAL] or [CONSTRUCTIVE] logic violations in synthesis.
    score_confidence_bonus: 10

    # Dynamic Holding Friction Factors (Time Redundancy)
    holding_friction_highway: 2
    holding_friction_standard: 1
    holding_friction_climax: 0.3
    holding_friction_dead_water: 0.7

  critic:
    role_definition_prompt: src/agent/prompts/critic.md
    model_temperature: 0.3
    # Skepticism buckets for protocol compliance mapping.
    threshold_skepticism_clear: 40
    threshold_skepticism_weak: 69
    threshold_skepticism_constructive: 89

evolver:
  # The 'Architect' model responsible for rewriting laws.
  # gemini-flash-latest, gemini-3.1-pro-preview
  model: gemini-3.1-pro-preview
  role_definition_prompt: src/agent/prompts/evolver.md
  # Deterministic temperature to ensure logic consistency.
  model_temperature: 0.0
  # --- Darwinian Evolution Thresholds ---
  # Minimum repeated failures across sessions to trigger a systemic instruction patch.
  min_failure_instances: 2
  # Ratio of failed sessions in the current batch required to validate a config update.
  failure_ratio_threshold: 0.2
  # Maximum tolerated Mean Absolute Error for time projections before recalibrating friction.
  time_projection_mae_threshold: 0.2
