trade_management:
  quote_currency: "USDT"     # Default quote asset (USDT, USDC, etc.)
  risk_per_trade: 0.005      # Max % loss of total equity allowed per trade
  net_qty_tolerance: 0.0001  # Minimal threshold to consider a position FLAT

network:
  binance:
    api_timeout_seconds: 30
    retry_count: 2

llm:
  # --- Central Neural Infrastructure ---
  active_provider: "deepseek" # "gemini", "deepseek"
  api_timeout_seconds: 180
  max_tool_iterations: 5
  retry_count: 3
  retry_strategy:
    multiplier: 2
    min_seconds: 5
    max_seconds: 40
  api_pacing_seconds: 0
  max_consecutive_failures: 3

  gemini:
    model: "gemini-3.5-flash" # gemini-3.5-flash
  deepseek:
    base_url: "https://api.deepseek.com"
    model: "deepseek-v4-pro"  # deepseek-v4-pro deepseek-v4-flash

  agents:
    session:
      role_prompt: "config/prompts/session.md"
      temperature: 0.5
      reasoning_effort: "high"
    critic:
      role_prompt: "config/prompts/critic.md"
      temperature: 0.1
      reasoning_effort: null
    evolver:
      role_prompt: "config/prompts/evolver.md"
      temperature: 0.3
      reasoning_effort: "max"
# ═══════════════════════════════════════════════════════════════════════════
# BINARY STAR — Adversarial Debate Protocol
# ═══════════════════════════════════════════════════════════════════════════
binary_star:
  system_instruction: "config/prompts/binary_star.md"
  max_rounds: 2
  confidence_threshold: 50

# ═══════════════════════════════════════════════════════════════════════════
# SNIPER — Monitoring Daemon Trigger Sensitivity
# ═══════════════════════════════════════════════════════════════════════════
sniper:

  # --- Engine Heartbeat ---
  heartbeat:
    # The frequency at which Sniper scans the exchange (0.1 = snapshot every 6 seconds).
    # WARNING: This is the physical baseline of the engine. It defines what "instantaneous" means
    # for the impulse/divergence probes. Do NOT change arbitrarily.
    pulse_interval_minutes: 2.0
    # Number of recent pulse snapshots kept in .sniper_pulse_history.json
    # and rendered as bars in the dashboard SignalCard pulse-history chart.
    pulse_history_max_entries: 30

  # --- Micro-Probes (Detecting violent intra-tick action) ---
  # WARNING: The tick probes below are mathematically coupled to 'pulse_interval_minutes'.
  probes:
    # [Damping]: Minimum growth required in CVD intensity between pulses to trigger a repeat wake-up.
    # 1.0 = any increase, 1.1 = 10% growth required.
    cvd_growth_significance_ratio: 1.4
    # [Damping]: Minimum growth in volatility intensity between pulses to re-trigger ENERGY_BUILDUP.
    # Prevents sustained high-volatility from re-firing every cooldown. 1.03 = 3% growth required.
    volatility_growth_significance_ratio: 1.04
    # [Squeeze]: Multiplier for the strategy-level squeeze threshold.
    # requires market to be extremely 'silent' to trigger a sniper alert.
    squeeze_trigger_multiplier: 0.75

  # --- Structural Proximity ---
  proximity:
    # Direct ATR-distance thresholds for STRUCTURAL_APPROACH triggers.
    # Price must be within this many ATR units of the structure to fire.
    # NOTE: ATR-normalized thresholds are instrument-agnostic — kept at original values.
    vah_val_atr: 0.70             # VAH/VAL boundary test
    poc_atr: 0.50                 # POC magnet / gravity test
    liq_atr: 0.40                 # Liquidation cluster magnet

  # --- 信号栈引擎 (Signal Stack Engine) ---
  # 14 个信号检测器 × 5 个类别，0-1 连续打分，方向堆叠 + 噪声抵消。
  # 多源弱信号可聚沙成塔（1−∏(1−s)），单个强信号可独当一面。
  signal_stack:

    # —— 基准触发阈值 ——
    # confluence_score ≥ 此值即触发 AI session（regime 会乘修正系数）。
    # 要达到 0.35，约需 2-3 个弱信号协同或 1 个中强信号。
    # 设太低 → 噪声误触发；设太高 → 永远不触发。
    trigger_threshold: 0.34

    # —— 紧急越级通道 ——
    # 当任意单个信号的 raw strength（不加权）≥ 此值时，绕过所有冷却和门槛直接触发。
    # 定位是"打破冷却的最后手段"，不应成为常态后门。
    # 0.80：信号需达到最大可能强度的 ~80%，大约一周触发一次。
    # 0.75 太容易（每天可能触发），0.85 基本永远不触发（形同虚设）。
    emergency_threshold: 0.80

    # —— 体制自适应修正系数 ——
    # 与 trigger_threshold 相乘得到有效阈值。原理：
    #   squeeze：压缩是 breakout precursor → 最低门槛，提前就位
    #   trending：趋势有惯性 → 次低门槛，顺势信号可靠性高
    #   ranging：震荡假突破多 → 抬高门槛，要求更多信号确认
    #   chaos：极端波动全是噪声 → 几乎锁死，只靠 emergency 突破
    regime_modifiers:
      trending: 0.85    # 有效阈值 0.35×0.85=0.298
      ranging: 1.0      # 有效阈值 0.35×1.0=0.35（震荡不惩罚不奖励，中性）
      squeeze: 0.75     # 有效阈值 0.35×0.75=0.2625
      chaos: 1.50       # 有效阈值 0.35×1.50=0.525

    # —— 信号半衰期（分钟）——
    # 每隔此时间信号强度减半（指数衰减：0.5^(elapsed/half_life)）。
    # 半衰期决定信号在 pulse 之间"存活"多久，影响多信号堆叠窗口宽度。
    # 经验法则：半衰期 ≥ 3× pulse_interval（2min），保证信号至少活过 3 个 pulse，
    # 给其他 detector 的信号留足组队时间，否则信号"即生即灭"失去堆叠意义。
    # 按信号物理生命周期从快到慢排列：
    decay:
      cvd_momentum: 15        # sustained order-flow imbalance
      cvd_divergence: 6        # fleeting tick-level divergence
      cvd_absorption: 15       # sustained absorption pattern
      large_trade: 15          # institutional footprint
      volatility_surge: 20     # regime shift — slow to build, slow to fade
      squeeze: 20              # same as vol_surge — compression is persistent
      boundary_test: 10        # anchors drift with new candles
      liquidation_hunt: 10     # clusters dissolve quickly
      positioning_extreme: 60  # retail sentiment is sticky
      leader_sync: 8           # cross-symbol correlation fades fast

    # —— 自适应冷却 (Adaptive Cooldown) ——
    # 触发后进入冷却期，防止同一信号反复触发浪费 token。
    # 体制越不可靠，冷却越长。三种破例方式：
    #   1) 无需最小间隔——NEUTRAL 后冷却为 0，session 本身耗时已足够
    #   2) 新信号强度 > 上次触发分 × break_on_strength_ratio → 打破冷却
    #   3) 累积 ≥ stacked_break_count 个新信号 → 打破冷却
    cooldown:
      regime_base_minutes:
        trending: 20     # 趋势中允许较快重新触发
        ranging: 40      # 震荡中延长，减少反复触发
        squeeze: 20      # 对齐 trending
        chaos: 60        # 混沌中几乎禁止
      neutral_multiplier: 0.0          # NEUTRAL → 零冷却，下个 pulse 直接重评
      break_on_strength_ratio: 1.6     # 新信号强度 > 上次 × 1.6 才破例
      stacked_break_count: 3           # ≥3 个独立 detector 报警 → 破例

    # —— 预触发确定性门禁 (Pre-Trigger Gate) ——
    # 在消耗 LLM token 之前，用纯数学过滤不可交易场景。
    gate:
      directional_sanity: true   # 逆势无 CVD 确认 → 拒绝
      chaos_survival: true       # 混沌中追方向信号 → 拒绝

    # —— 信号置信度权重（可被 Evolution 进化）——
    # 设计原则：结构性/流动性信号 > 情绪/反向信号。
    # squeeze 和 trend_pullback 权重最高——经过回测验证的高胜率 pattern。
    # retail_extreme 和 leader_sync 权重最低——反向指标可能更极端，跨币种相关性噪声大。
    weights:
      # FLOW — 资金流（快变量，可靠但短命）
      cvd_momentum: 0.65      # CVD 方向+极端：合并原 taker_imbalance 的静态检测
      cvd_divergence: 0.70    # CVD-价格背离：强信号，聪明钱 vs 散户
      cvd_absorption: 0.50    # CVD 吸收：无 OB 数据佐证，降权（原 0.65）
      # SIZE — 大单/机构活动
      large_trade: 0.55       # 大资金进场 proxy，基于 avg_trade_size Z-score
      # ENERGY — 波动能量
      volatility_surge: 0.55  # 波动率激增：不具方向性，需叠加其他信号
      squeeze: 0.75           # 布林带压缩：最佳前置信号，突破 precursor
      # STRUCTURAL — 结构锚点
      boundary_test: 0.50     # VAH/VAL 触碰：假突破多，权重最低
      liquidation_hunt: 0.60  # 猎杀流动性：需方向配合，单独不够
      # POSITIONING — 持仓极端（合并 retail_extreme + oi_divergence + oi_surge）
      positioning_extreme: 0.50  # LS/费率/OI 三者任一极端：反向信号，降权
      # CROSS-SYMBOL — 跨币种联动
      leader_sync: 0.40       # 龙头带动：相关性噪声大，仅作辅助叠加

    # —— 各探测器专属硬阈值 ——
    # 覆盖 detector 内部的默认判断阈值，可按 symbol override。
    thresholds:
      # 脉冲间 CVD 比率变化幅度。超过此值触发 cvd_divergence 检测。
      cvd_divergence_tick_delta: 0.18
      # CVD 极端阈值（替代原 taker_imbalance）。|cvd| 超过此值直接触发 cvd_momentum
      # 静态路径。base 值适配低流动性资产；高流动性 symbol 可在 overrides 中降低此值。
      cvd_extreme_threshold: 0.36
      # large_trade: avg_trade_size Z-score 超过此值触发
      large_trade_zscore: 2.0
      # large_trade: 滚动窗口脉冲数（每个 pulse ≈ 2min）
      large_trade_lookback: 30

# ═══════════════════════════════════════════════════════════════════════════
# GUARDIAN — Position Management (Exit Ladder + Trailing Stop)
# ═══════════════════════════════════════════════════════════════════════════
guardian:

  # --- Exit Ladder (TP-relative partial exits + profit locking) ---
  # Each level: target fires when progress% toward TP is reached,
  # tp_ratio closes that fraction of current qty, sl_lock moves SL
  # by that fraction of the SL→price gap.
  #   target ∈ [0.0, 1.0) — 0 = at entry, 1 = at TP (excluded: = full TP)
  #   tp_ratio ∈ (0.0, 1.0] — fraction of position to close
  #   sl_lock ∈ [0.0, 1.0] — 0 = no trail, 1 = SL moves to current price
  exit_ladder:
    levels:
      - target: 0.5
        tp_ratio: 0.3
        sl_lock: 0.3
      - target: 0.7
        tp_ratio: 0.0
        sl_lock: 0.0
      - target: 0.9
        tp_ratio: 0.5
        sl_lock: 0.7

# ═══════════════════════════════════════════════════════════════════════════
# SANDBOX — Evolution Fitness Scoring
# ═══════════════════════════════════════════════════════════════════════════
sandbox:

  # --- Significance Thresholds ---
  thresholds:
    # MAE stress level (pct) above which we consider a baseline result to be 'risky' enough for improvement
    mae_significance_threshold: 15.0
    # Minimum reduction in MAE stress (pct) required to classify a case as 'improved'
    mae_improvement_threshold: 5.0
    # Minimum reduction in trade duration (hours) required to classify a case as 'improved' (TP_HIT tie-breaker)
    time_improvement_threshold: 4.0

  # --- Fitness Scoring Ladder ---
  # Base scores for different market outcomes (TP/SL/Neutral/Neither)
  base_scores:
    tp_hit: 100.0      # perfect execution — hit take-profit
    neutral: 70.0       # disciplined inaction — avoided a bad trade
    neither: 40.0       # expired unresolved — indecisive
    sl_hit: 5.0         # stopped out but at least had a plan
    na: 0.0             # not applicable — un-audited or no trade outcome

  # --- Forensic Modifiers ---
  # Execution quality and logic integrity adjustments
  modifiers:
    # Heavy penalty for MAE >= 100% or explicit LOGIC_FAILURE categorization
    logic_failure_penalty: -40.0
    # Penalty for execution categorized as LUCK
    luck_penalty: -20.0
    # Penalty for directional trades (TP/NEITHER) holding capital for >48h
    slow_lock_penalty: -15.0
    # Reward for disciplined inaction in dead/hostile market regimes
    smart_surrender_bonus: 15.0
    # Penalty for predicting the right direction but missing the fill
    catastrophic_miss_penalty: -20.0
