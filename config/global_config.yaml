system:
  default_symbol: "BTCUSDT"
  # default_symbol: "XAUTUSDT"

trade_management:
  risk_per_trade: 0.0025      # Max % loss of total equity allowed per trade
  net_qty_tolerance: 0.00001 # Minimal threshold to consider a position FLAT
  BTCUSDT:
    precision_qty: 4           # Decimal places for order quantity (e.g., BTC = 4)
    precision_price: 1         # Decimal places for order price (e.g., BTCUSDT = 1)
    min_order_qty: 0.001       # Fallback safety quantity if delta is zero
    sl_slippage_buffer: 10.0   # SL Limit offset from Trigger (e.g., -10.0 for LONG SL)

network:
  binance:
    api_timeout_seconds: 65
    retry_count: 2
  gemini:
    api_timeout_seconds: 240
    circuit_breaker_threshold: 3
    max_tool_iterations: 3
    retry_count: 8
    retry_strategy:
      multiplier: 2
      min_seconds: 5
      max_seconds: 40
    api_pacing_seconds: 0

llm:
  # --- Central Neural Infrastructure ---
  active_provider: "gemini" # Options: "gemini", "ollama"
  
  gemini:
    context_cache:
      enable: true
      expiration_minutes: 10

  ollama:
    base_url: "http://localhost:11434"
    model: "gemma4:e4b"

  binary_star:
    model: "gemini-3-flash-preview"
    system_instruction: "src/agent/prompts/binary_star.md"
    max_rounds: 2
    session_temperature: 0.5
    critic_temperature: 0.1
    session_role_prompt: "src/agent/prompts/session.md"
    critic_role_prompt: "src/agent/prompts/critic.md"

  evolver:
    model: "gemini-3.1-pro-preview"
    model_temperature: 0.0
    role_prompt: "src/agent/prompts/evolver.md"

visuals:
  # --- Chart Rendering Tokens ---
  render_dpi: 120
  bg_color: "#0d1117"       # GitHub Dark Deep (v7.2 standard)
  up_color: "#26a69a"       # Teal
  down_color: "#ef5350"     # Coral
  current_price_color: "#FFD700" # Bright Yellow/Gold for distinct price tracking
  poc_color: "#B0B0B0"      # Silver-Neutral (v9.1: Subtle Structural Axis)
  vah_val_color: "#A0A0A0"    # Silver-Gray (VAH/VAL)
  volume_profile:
    width_ratio: 0.3 # Wide, confident profile
    smoothing_sigma: 1.5
    color: "#B0BEC5"  # High-Contrast Blue-Silver (v7.6)
    alpha: 0.3         # Balanced visibility (v7.7 Tuning)
  chart_trendline:
    peak_count: 7  # v8.7 Structural Persistence
    window: 14      # v10.0 Fractal Sensitivity (standard: 5)
  chart_main_panel_weight: 4
  chart_volume_panel_weight: 1

  # --- Liquidation Heatmap Aesthetics ---
  liq_max_alpha: 0.3           # High peak intensity
  liq_min_alpha: 0.1
  liq_legacy_alpha_factor: 5.0  # Denominator for legacy event scaling (v5.0 default)
  liq_legacy_min_alpha: 0.1    # Minimum opacity for legacy raw orders
  liq_legacy_max_alpha: 0.5    # Maximum opacity for legacy raw orders
  liq_radar_atr_multiplier: 0.5   # v11.1: Visual scaling for liquidation heatmap bands

analytical:
  # Multiplier for indicator warmup (e.g., 5.0 for standard convergence, 7.0 for forensic precision)
  indicator_warmup_multiplier: 5.0

session:
  confidence_threshold: 60

backtest:
  # Default sample size for backtest simulation
  default_samples: 1

evolution:
  # Default sample size for audit ingestion
  default_samples: 10

sniper:

  # --- Engine Heartbeat & Tick Rate ---
  # The frequency at which Sniper scans the exchange (0.1 = snapshot every 6 seconds).
  # WARNING: This is the physical baseline of the engine. It defines what "instantaneous" means 
  # for the impulse/divergence probes. Do NOT change arbitrarily.
  pulse_interval_minutes: 0.25

  # --- Alert Muting (Cooldown) ---
  # The duration the Sniper remains "muted" after successfully waking up the AI.
  # Based on the micro_context candle (usually 15m). 1.0 = strictly muted for 15 minutes post-alert.
  pulse_cooldown_multiplier: 2.0

  # [Mute]: Multiplier for cooldown during extreme volatility expansion.
  # 2.0 = double the standard wait time (pulse_cooldown_multiplier) when volatility is in 'Chaos' regime.
  chaos_cooldown_multiplier: 2.0

  # [State Lockout]: Prevents Phantom Triggers (spam loops) during prolonged physical stalemates.
  # Applies to: Structural Magnets, Squeeze phases, and Ambient Sentiment extremes.
  state_lockout_hours: 4.0

  # --- Micro-Probes (Detecting violent intra-tick action) ---
  # WARNING: The tick probes below are mathematically coupled to 'pulse_interval_minutes'.

  # [Tick-Scale Probes]: Micro-sensitivity for 15s heartbeats.
  # 0.02 = 2% net flow change in 15 seconds.
  #  TYPE_B (CVD 背离) 
  cvd_divergence_tick_delta: 0.1
  #  TYPE_B (CVD 强度) 
  cvd_impulse_tick_delta: 0.16
  
  # [Damping]: Minimum growth required in CVD intensity between pulses to trigger a repeat wake-up.
  # 1.0 = any increase, 1.1 = 10% growth required.
  cvd_growth_significance_ratio: 1.4

  # [Squeeze]: Multiplier for the strategy-level squeeze threshold.
  # 0.65 = requires market to be extremely 'silent' to trigger a sniper alert (v6.71 Tightened).
  squeeze_trigger_multiplier: 0.75

  # [Structural]: Multipliers for structural proximity (TYPE_C).
  # VAH/VAL: 0.8 = requires price to be 20% closer to boundary.
  # POC/Liquidations: 1.2 = allows triggering from further away (1.2x baseline).
  vah_val_trigger_multiplier: 1.4
  poc_trigger_multiplier: 1.0
  liq_trigger_multiplier: 0.8

sandbox:
  # MAE stress level (pct) above which we consider a baseline result to be 'risky' enough for improvement
  mae_significance_threshold: 15.0
  # Minimum reduction in MAE stress (pct) required to classify a case as 'improved'
  mae_improvement_threshold: 5.0
  # Minimum reduction in trade duration (hours) required to classify a case as 'improved' (TP_HIT tie-breaker)
  time_improvement_threshold: 4.0

  # --- Fitness Scoring Ladder ---
  # Base scores for different market outcomes (TP/SL/Neutral/Neither)
  base_scores:
    tp_hit: 100.0
    neutral: 70.0
    neither: 40.0
    sl_hit: 5.0
    na: 0.0

  # Forensic modifiers for execution quality and logic integrity
  modifiers:
    # Heavy penalty for MAE >= 100% or explicit LOGIC_FAILURE categorization
    logic_failure_penalty: -40.0
    # Penalty for execution categorized as LUCK
    luck_penalty: -20.0
    # Penalty for directional trades (TP/NEITHER) holding capital for >48h
    slow_lock_penalty: -15.0
    # Reward for disciplined inaction in dead/hostile market regimes
    smart_surrender_bonus: 15.0
    # Penalty for predicting the right direction but missing the fill
    catastrophic_miss_penalty: -20.0