system:
  default_symbol: "BTCUSDT"

network:
  binance:
    api_timeout_seconds: 60
    retry_count: 2
  gemini:
    api_timeout_seconds: 240
    circuit_breaker_threshold: 3
    max_tool_iterations: 5
    retry_count: 2
    retry_strategy:
      multiplier: 1
      min_seconds: 2
      max_seconds: 10
    enable_context_cache: true
    cache_expiration_minutes: 10

visuals:
  # --- Chart Rendering Tokens ---
  up_color: "#26a69a"       # Teal
  down_color: "#ef5350"     # Coral
  bg_color: "#131722"       # Dark TradingView style
  grid_color: "#1a1e29"     # Secondary grid line color
  poc_color: "#ff9800"      # Point of Control (POC) marker color
  value_area_color: "#fbc02d" # Color for the Value Area (VAH/VAL) boundaries
  current_price_color: "#ffffff" # Color for the Current Price tracking line
  liq_buy_color: "#00ff88"  # Buy-side liquidation marker color
  liq_sell_color: "#ff3366" # Sell-side liquidation marker color
  volume_profile_width_ratio: 0.8 # Scaling factor for volume profile bars relative to axis width
  volume_profile_smoothing_sigma: 1.6 # Gaussian smoothing intensity for VP (2.0-3.0 is recommended)
  volume_profile_color: "#64b5f6"  # Base color for volume profile histogram (Sky Blue)
  volume_profile_alpha: 0.4        # Transparency of profile bars (0.0 to 1.0)
  chart_main_panel_weight: 4    # Height weight for price panel
  chart_volume_panel_weight: 1  # Height weight for bottom volume panel
  render_dpi: 300               # Resolution for visual artifacts (Higher = sharper images)

analytical:
  # Multiplier for indicator warmup (e.g., 5.0 for standard convergence, 7.0 for forensic precision)
  indicator_warmup_multiplier: 5.0

session:
  notification_confidence_threshold: 55

backtest:
  # Default sample size for backtest simulation
  default_samples: 1

evolution:
  # Default sample size for audit ingestion
  default_samples: 20

sniper:

  # --- Alert Muting (Cooldown) ---
  # The duration the Sniper remains "muted" after successfully waking up the AI.
  # Based on the micro_context candle (usually 15m). 1.0 = strictly muted for 15 minutes post-alert.
  pulse_cooldown_multiplier: 1.0

  # --- Engine Heartbeat & Tick Rate ---
  # The frequency at which Sniper scans the exchange (0.1 = snapshot every 6 seconds).
  # WARNING: This is the physical baseline of the engine. It defines what "instantaneous" means 
  # for the impulse/divergence probes. Do NOT change arbitrarily.
  pulse_interval_minutes: 0.25

  # --- Micro-Probes (Detecting violent intra-tick action) ---
  # WARNING: The ratios below are mathematically coupled to 'pulse_interval_minutes'. If you increase 
  # the tick interval (e.g., from 0.1m to 1.0m), you MUST scale these ratios UP non-linearly to filter 
  # out the natural background drift of CVD accumulated over the longer time window.
  
  # [Absorption/Distribution Divergence]: Requires price to move inversely against massive limit blocks.
  # REC: 0.4 - 0.5. This can be more sensitive because the inverse price action provides strong structural noise filtering.
  cvd_divergence_intensity_ratio: 0.5
  
  # [Whale Impulse]: Requires a pure, violent surge in taker volume (ignores price direction).
  # REC: 0.8 - 1.0. This MUST be kept high to prevent normal trend momentum from triggering false pulse alarms.
  cvd_impulse_intensity_ratio: 0.8
  
  # [Damping]: Minimum growth required in CVD intensity between pulses to trigger a repeat wake-up.
  # 1.0 = any increase, 1.1 = 10% growth required.
  cvd_growth_significance_ratio: 1.2

  # [Squeeze]: Multiplier for the strategy-level squeeze threshold.
  # 0.8 = requires market to be 20% more 'silent' than the base strategy to trigger a sniper alert.
  squeeze_trigger_multiplier: 0.8

  # [Structural]: Multiplier for structural proximity (TYPE_C).
  # 0.8 = requires price to be 20% closer to VAH/VAL to trigger a sniper alert.
  structural_trigger_multiplier: 0.8

sandbox:
  # MAE stress level (pct) above which we consider a baseline result to be 'risky' enough for improvement
  mae_significance_threshold: 15.0
  # Minimum reduction in MAE stress (pct) required to classify a case as 'improved'
  mae_improvement_threshold: 5.0
  # Minimum reduction in trade duration (hours) required to classify a case as 'improved' (TP_HIT tie-breaker)
  time_improvement_threshold: 4.0

  # --- Fitness Scoring Ladder ---
  # Base scores for different market outcomes (TP/SL/Neutral/Neither)
  base_scores:
    tp_hit: 100.0
    neutral: 60.0
    neither: 40.0
    sl_hit: 15.0
    na: 0.0

  # Forensic modifiers for execution quality and logic integrity
  modifiers:
    # Heavy penalty for MAE >= 100% or explicit LOGIC_FAILURE categorization
    logic_failure_penalty: -40.0
    # Penalty for execution categorized as LUCK
    luck_penalty: -20.0
    # Penalty for directional trades (TP/NEITHER) holding capital for >48h
    slow_lock_penalty: -15.0
    # Reward for disciplined inaction in dead/hostile market regimes
    smart_surrender_bonus: 15.0
    # Penalty for predicting the right direction but missing the fill
    catastrophic_miss_penalty: -20.0