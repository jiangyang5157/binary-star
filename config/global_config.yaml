trade_management:
  quote_currency: "USDT"     # Default quote asset (USDT, USDC, etc.)
  risk_per_trade: 0.004      # Max % loss of total equity allowed per trade
  net_qty_tolerance: 0.00001 # Minimal threshold to consider a position FLAT

network:
  binance:
    api_timeout_seconds: 65
    retry_count: 2

llm:
  # --- Central Neural Infrastructure ---
  active_provider: "deepseek" # Options: "gemini", "deepseek", "qwen"

  gemini:
    model: "gemini-3.5-flash" # gemini-3.5-flash
    api_timeout_seconds: 240
    session_temperature: 0.5
    critic_temperature: 0.1
    evolver_temperature: 0.0
    circuit_breaker_threshold: 3
    max_tool_iterations: 9
    retry_count: 8
    retry_strategy:
      multiplier: 2
      min_seconds: 5
      max_seconds: 40
    api_pacing_seconds: 0
    context_cache:
      enable: true
      expiration_minutes: 10

  deepseek:
    base_url: "https://api.deepseek.com"
    model: "deepseek-v4-pro"  # deepseek-v4-pro deepseek-v4-flash
    api_timeout_seconds: 240
    session_temperature: 0.5
    critic_temperature: 0.1
    evolver_temperature: 0.0
    supports_vision: false  # DeepSeek text-only (no vision models yet)

  qwen:
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen3.7-max"  # qwen3.7-max, qwen3.7-plus
    api_timeout_seconds: 240
    session_temperature: 0.5
    critic_temperature: 0.1
    evolver_temperature: 0.0
    supports_vision: false  # set true for qwen-vl-max or qwen3.7-vl

  binary_star:
    system_instruction: "config/prompts/binary_star.md"
    session_role_prompt: "config/prompts/session.md"
    critic_role_prompt: "config/prompts/critic.md"
    max_rounds: 2
    session_confidence_threshold: 50

  evolver:
    role_prompt: "config/prompts/evolver.md"

# ═══════════════════════════════════════════════════════════════════════════
# SNIPER — Monitoring Daemon Trigger Sensitivity
# ═══════════════════════════════════════════════════════════════════════════
sniper:

  # --- Engine Heartbeat ---
  heartbeat:
    # The frequency at which Sniper scans the exchange (0.1 = snapshot every 6 seconds).
    # WARNING: This is the physical baseline of the engine. It defines what "instantaneous" means
    # for the impulse/divergence probes. Do NOT change arbitrarily.
    pulse_interval_minutes: 2.0

  # --- Alert Muting (Cooldown) ---
  cooldown:
    # The duration the Sniper remains "muted" after successfully waking up the AI.
    # Based on the micro_context candle (usually 15m). 1.0 = strictly muted for 15 minutes post-alert.
    # 2.5 = 37.5 min. Balanced for dual BTC use: faster throughput than 45 min.
    pulse_cooldown_multiplier: 2.5
    # [Mute]: Multiplier for cooldown during extreme volatility expansion.
    # 2.0 = double the standard wait time when volatility is in 'Chaos' regime.
    # 37.5 min × 2.0 = 75 min chaos mute.
    chaos_cooldown_multiplier: 2.0
    # [State Lockout]: Prevents Phantom Triggers (spam loops) during prolonged physical stalemates.
    # Applies to: Structural Magnets, Squeeze phases, and Ambient Sentiment extremes.
    # 8.0h. Covers full Asian session; prevents retail-sentiment re-trigger spam after daemon restart.
    state_lockout_hours: 8.0

  # --- Micro-Probes (Detecting violent intra-tick action) ---
  # WARNING: The tick probes below are mathematically coupled to 'pulse_interval_minutes'.
  probes:
    # [Tick-Scale Probes]: Micro-sensitivity for intra-pulse CVD swings.
    # These measure change in the CVD ratio (net_taker / total_volume) between 2-min pulses.
    # The ratio is instrument-agnostic — 0.20 means the same directional dominance shift for BTC.
    cvd_divergence_tick_delta: 0.22     # FLOW_ASYMMETRY (CVD 背离)
    cvd_impulse_tick_delta: 0.35        # FLOW_ASYMMETRY (CVD 强度)
    # [Damping]: Minimum growth required in CVD intensity between pulses to trigger a repeat wake-up.
    # 1.0 = any increase, 1.1 = 10% growth required.
    cvd_growth_significance_ratio: 1.4
    # [Damping]: Minimum growth in volatility intensity between pulses to re-trigger ENERGY_BUILDUP.
    # Prevents sustained high-volatility from re-firing every cooldown. 1.03 = 3% growth required.
    volatility_growth_significance_ratio: 1.03
    # [Squeeze]: Multiplier for the strategy-level squeeze threshold.
    # requires market to be extremely 'silent' to trigger a sniper alert.
    squeeze_trigger_multiplier: 0.75

  # --- Structural Proximity ---
  proximity:
    # Direct ATR-distance thresholds for STRUCTURAL_APPROACH triggers.
    # Price must be within this many ATR units of the structure to fire.
    # NOTE: ATR-normalized thresholds are instrument-agnostic — kept at original values.
    proximity_vah_val_atr: 0.70   # VAH/VAL boundary test
    proximity_poc_atr: 0.50       # POC magnet / gravity test
    proximity_liq_atr: 0.40       # Liquidation cluster magnet

# ═══════════════════════════════════════════════════════════════════════════
# GUARDIAN — Position Management (Trailing Stop + Time Stop)
# ═══════════════════════════════════════════════════════════════════════════
guardian:

  # --- Trailing Stop Migration ---
  trailing:
    # Profit thresholds in ATR units that trigger stop-loss migration.
    # Level 1: SL → entry (breakeven).  Level 2: SL → entry + 0.5 ATR.  Level 3: SL → entry + 1.5 ATR.
    trailing_profit_atr_level_1: 1.5
    trailing_profit_atr_level_2: 2.5
    trailing_profit_atr_level_3: 4.0
    # SL offsets (in ATR) past entry for each level.
    trailing_sl_offset_atr_level_2: 0.5
    trailing_sl_offset_atr_level_3: 1.5

  # --- Time-Based Stop ---
  time_stop:
    # Multiplier on projected_holding_hours. Position is market-closed
    # when elapsed > projected_holding × this value.
    time_stop_multiplier: 1.5

# ═══════════════════════════════════════════════════════════════════════════
# SANDBOX — Evolution Fitness Scoring
# ═══════════════════════════════════════════════════════════════════════════
sandbox:

  # --- Significance Thresholds ---
  thresholds:
    # MAE stress level (pct) above which we consider a baseline result to be 'risky' enough for improvement
    mae_significance_threshold: 15.0
    # Minimum reduction in MAE stress (pct) required to classify a case as 'improved'
    mae_improvement_threshold: 5.0
    # Minimum reduction in trade duration (hours) required to classify a case as 'improved' (TP_HIT tie-breaker)
    time_improvement_threshold: 4.0

  # --- Fitness Scoring Ladder ---
  # Base scores for different market outcomes (TP/SL/Neutral/Neither)
  base_scores:
    tp_hit: 100.0
    neutral: 70.0
    neither: 40.0
    sl_hit: 5.0
    na: 0.0

  # --- Forensic Modifiers ---
  # Execution quality and logic integrity adjustments
  modifiers:
    # Heavy penalty for MAE >= 100% or explicit LOGIC_FAILURE categorization
    logic_failure_penalty: -40.0
    # Penalty for execution categorized as LUCK
    luck_penalty: -20.0
    # Penalty for directional trades (TP/NEITHER) holding capital for >48h
    slow_lock_penalty: -15.0
    # Reward for disciplined inaction in dead/hostile market regimes
    smart_surrender_bonus: 15.0
    # Penalty for predicting the right direction but missing the fill
    catastrophic_miss_penalty: -20.0
