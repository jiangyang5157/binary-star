system:
  default_symbol: "BTCUSDT"
  notification_confidence_floor: 50

network:
  binance:
    api_timeout_seconds: 60
    retry_count: 2
  gemini:
    api_timeout_seconds: 60
    circuit_breaker_threshold: 3
    max_tool_iterations: 5
    retry_count: 2
    retry_strategy:
      multiplier: 1
      min_seconds: 2
      max_seconds: 10

session:
  default_live_pulse_minutes: 60

backtest:
  # Session anchor for regime sampling timestamps.
  # Shifts sampled daily candles to this UTC hour to capture real session dynamics.
  # 0  = Asia open (default daily candle)
  # 8  = London open
  # 13 = New York open (recommended for max liquidity)
  session_hour_utc: 13

sandbox:
  # Minimum success rate (0.0 to 1.0) for a proposal to be 'accepted'
  acceptance_threshold: 0.8
