system:
  default_symbol: "BTCUSDT"
  notification_confidence_floor: 50

network:
  binance:
    api_timeout_seconds: 60
    retry_count: 2
  gemini:
    api_timeout_seconds: 240
    circuit_breaker_threshold: 3
    max_tool_iterations: 5
    retry_count: 4
    retry_strategy:
      multiplier: 1
      min_seconds: 2
      max_seconds: 10

session:
  default_live_pulse_minutes: 60

backtest:
  # Session anchor for regime sampling timestamps. Shifts sampled daily candles to this UTC hour to capture real session dynamics.
  # 02:00 - 06:00 (NZDT) / 13:00 - 17:00 (UTC): Peak volatility period. Momentum Riding and Retail Squeeze (Polarity Pivot) are most frequent as Western institutional capital drives sharp CVD/OI shifts and Volume Breakouts.
  # 13:00 - 21:00 (NZDT) / 00:00 - 08:00 (UTC): Asian session dominance. Volume is typically flatter; Mean-Reversion and Exhaustion Fading (DLE) strategies are most effective.
  session_hour_utc: 5

sandbox:
  # Minimum success rate (0.0 to 1.0) for a proposal to be 'accepted'
  acceptance_threshold: 0.8
