observer:
  prompt_path: src/agent/prompts/prompt_observer.md
  model: gemini-flash-latest
  temperature: 0.1
  macro_timeframe:
    interval: 1h
    limit: 336
  micro_timeframe:
    interval: 15m
    limit: 192
  vp_value_area_pct: 0.75
  vp_bins: 300
  order_flow_lookback_bars: 8
  trend_intensity_threshold: 0.8
  atr_window: 21
  bb_window: 21
  bb_std: 2.0
  kc_window: 21
  kc_mult: 1.5
  vol_ma_window: 21
  liquidation_fetch_limit: 50
  liquidation_context_limit: 10
  hvn_count: 3
  lvn_count: 3
  hvn_sensitivity: 0.15 
  lvn_sensitivity: 0.10
  node_min_separation: 10 
  structural_anchor_count: 3

strategist:
  prompt_path: src/agent/prompts/prompt_strategist.md
  model: gemini-flash-latest
  temperature_draft: 0.3
  temperature_synthesis: 0.1
  confidence_threshold: 60

critic:
  prompt_path: src/agent/prompts/prompt_critic.md
  model: gemini-flash-latest
  temperature: 0.7

review:
  prompt_path: src/agent/prompts/prompt_reviewer.md
  model: gemini-flash-latest
  temperature: 1.0
  kline_interval: 1m

coach:
  prompt_path: src/agent/prompts/prompt_coach.md
  model: gemini-flash-latest
  temperature: 0.5
