# Crypto Dual-Agent Trading System Configuration

trading:
  symbol: "BTCUSDT"
  strategy: "swing" # 1 - 14 days holding period

data:
  # Macro timeframe for trend and Volume Profile calculation
  macro_timeframe:
    interval: "4h"
    limit: 180       # 180 bars * 4H = 30 days
  # Micro timeframe for precise entry points
  micro_timeframe:
    interval: "1h"
    limit: 120       # 120 bars * 1H = 5 days
  
  # Value Area Percentage (e.g., 0.70 for 70%)
  value_area_pct: 0.70

paths:
  raw_data_dir: "data/raw"
  images_dir: "data/images"
  results_dir: "data/raw/predictions"
  reviews_dir: "data/raw/reviews"
  prompts_dir: "src/agent/prompts"

automation:
  prediction_interval_hours: 1.0  # Run Trader Agent every hour
  reviewer_interval_hours: 24.0  # Run Reviewer Agent once a day
  
notifications:
  email_enabled: true
  recipient_email: "jiangyang5157@gmail.com"
  min_confidence_threshold: 85
  smtp_server: "smtp.gmail.com"
  smtp_port: 587

agent:
  model_name: "gemini-flash-latest" # gemini-2.5-flash
