# Crypto Dual-Agent Trading System Configuration

trading:
  symbol: "BTCUSDT"
  strategy: "swing"
  review_window_days: 7 # Timeframe used by Agent B to evaluate outcomes

data:
  # Macro timeframe for trend and Volume Profile calculation
  macro_timeframe:
    interval: "4h"
    limit: 168
  # Micro timeframe for precise entry points
  micro_timeframe:
    interval: "1h"
    limit: 168
  
  # Value Area Percentage
  value_area_pct: 0.8

paths:
  raw_data_dir: "data/raw"
  images_dir: "data/images"
  results_dir: "data/raw/predictions"
  reviews_dir: "data/raw/reviews"
  prompts_dir: "src/agent/prompts"

automation:
  prediction_interval_hours: 1.0  # Run Trader Agent every hour
  reviewer_interval_hours: 16.0    # Frequency of review runs AND minimum age for a trade to be eligible for review.
  
notifications:
  email_enabled: true
  recipient_email: "jiangyang5157@gmail.com"
  min_confidence_threshold: 85
  smtp_server: "smtp.gmail.com"
  smtp_port: 587

agent:
  model_name: "gemini-3.1-pro-preview" # gemini-flash-latest
